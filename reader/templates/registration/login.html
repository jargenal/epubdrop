{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EPUBDrop • Iniciar sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    (function () {
      try {
        var mode = localStorage.getItem("appThemeMode") || "system";
        var resolved = mode === "dark" || (mode === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches)
          ? "dark"
          : "light";
        document.documentElement.classList.add("theme-" + resolved);
        document.documentElement.setAttribute("data-theme", resolved);
      } catch (_) {}
    })();
  </script>
  <script src="{% static 'reader/theme.js' %}?v=20260212b" defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,700&family=Source+Sans+3:wght@400;500;600;700&display=swap');
    :root {
      --font-ui: 'Source Sans 3', sans-serif;
      --font-reading: 'Newsreader', serif;
      --bg-grad-1: #f7faff;
      --bg-grad-2: #ffffff;
      --bg-grad-3: #edf2ff;
      --ink: #111827;
      --muted: #4b5563;
      --panel: rgba(255, 255, 255, 0.9);
      --line: #cbd5e1;
      --accent: #1e3a8a;
      --accent-soft: #e0e7ff;
    }
    .theme-dark, [data-theme="dark"] {
      --bg-grad-1: #030712;
      --bg-grad-2: #0b1220;
      --bg-grad-3: #111827;
      --ink: #e5e7eb;
      --muted: #cbd5e1;
      --panel: rgba(11, 18, 32, 0.88);
      --line: #374151;
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.16);
    }
    body {
      font-family: var(--font-ui);
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 10% -10%, var(--bg-grad-1) 0%, transparent 60%),
        radial-gradient(900px 500px at 90% 10%, var(--bg-grad-2) 0%, transparent 55%),
        linear-gradient(180deg, var(--bg-grad-2) 0%, var(--bg-grad-3) 100%);
    }
    .brand { font-family: var(--font-reading); }
    .panel {
      background: var(--panel);
      border-color: var(--line) !important;
    }
    .muted { color: var(--muted) !important; }
    .input {
      border-color: var(--line) !important;
      background: rgba(255, 255, 255, 0.95);
      color: var(--ink);
    }
    [data-theme="dark"] .input,
    .theme-dark .input {
      background: rgba(15, 23, 42, 0.65);
      color: var(--ink);
    }
    .cta {
      background: var(--accent);
    }
    .cta:hover {
      filter: brightness(1.08);
    }
    .theme-pill {
      background: var(--accent-soft);
      border: 1px solid var(--line);
      color: var(--ink);
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="mx-auto flex min-h-screen max-w-md items-center px-6">
    <div class="w-full rounded-3xl border panel p-6 shadow-sm">
      <div class="mb-4 flex items-center justify-end">
        <div class="theme-pill inline-flex items-center gap-2 rounded-xl px-3 py-1.5 text-xs font-semibold">
          <span>Tema</span>
          <select id="themeMode" class="bg-transparent text-xs outline-none">
            <option value="light">Claro</option>
            <option value="dark">Oscuro</option>
            <option value="system">Sistema</option>
          </select>
        </div>
      </div>
      <h1 class="brand text-2xl font-semibold">EPUBDrop</h1>
      <p class="mt-2 text-sm muted">Inicia sesión para continuar tu lectura.</p>

      {% if form.errors %}
        <div class="mt-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
          Usuario o contraseña inválidos.
        </div>
      {% endif %}

      <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-xs font-semibold muted">Correo electrónico</label>
          <input type="text" name="username" autofocus required
                 class="input mt-2 w-full rounded-xl border px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
        </div>
        <div>
          <label class="block text-xs font-semibold muted">Contraseña</label>
          <input type="password" name="password" required
                 class="input mt-2 w-full rounded-xl border px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
        </div>
        <button type="submit" class="cta w-full rounded-xl px-4 py-2.5 text-sm font-semibold text-white">
          Entrar
        </button>
      </form>
    </div>
  </div>
</body>
</html>
