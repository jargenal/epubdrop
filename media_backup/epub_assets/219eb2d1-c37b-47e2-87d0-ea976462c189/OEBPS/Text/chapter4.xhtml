    <p class="cn">Chapter 4</p>

    <h1 id="heading_id_2">Perfectionism and Behavior</h1>

    <h2 class="sigilNotInTOC" id="heading_id_3">The Paradox of Perfectionism</h2>

    <p class="paft">Joanne has great difficulty making choices when shopping for clothes or other items. She fears that if she only buys one item, she’ll get home and feel that she’s purchased the wrong one. As a result, when faced with several options, she tends to buy one of each. For example, if she can’t decide between six colors of a blouse, she buys one in each color. Only by purchasing one of each can she guarantee that she has the correct item.</p>

    <p>Unfortunately, she does this with everything she buys. Her home is cluttered with things she doesn’t need or use, including several hundred pairs of shoes, closets full of clothing, shelves filled with unread books and magazines, and cupboards overstocked with food. Joanne’s difficulty making decisions when shopping is one manifestation of her belief that it’s important not to make mistakes and that mistakes should always be prevented. Ironically, Joanne’s struggle to avoid making mistakes leads to many different problems, including considerable credit card debt, no time to do things other than shop, and very little empty space in her home. Joanne recognizes that her compulsive shopping is controlling her life.</p>

    <p>Reid cannot resist the temptation to correct other people when he believes they have made an error. For example, whenever someone ­mispronounces a word, he’s quick to let the person know how the word should be pronounced. If his girlfriend is telling a story to a group of friends and leaves out details that Reid believes are important, Reid feels compelled to fill in those details so their friends do not misinterpret any of the information they are hearing. Most of the people in Reid’s life (including his girlfriend, friends, family members, and coworkers) find him difficult to be around. They interpret his behavior to mean that he always needs to show people how smart he is and that he enjoys putting others down. People feel as though they need to be careful about what they say in front of Reid. In reality, his tendency to correct others has more to do with the intense discomfort that he feels when a mistake has been made, leading to a feeling of intense internal pressure to set things right. Reid understands that his need to correct others has caused problems in his relationships, but he has trouble stopping himself.</p>

    <p>These case examples illustrate the paradox of perfectionism. People who are perfectionistic often believe that, in order to maintain order and control in their lives, they must engage in various perfectionistic behaviors. Perfectionistic behaviors can be divided into two main types: behaviors designed to help an individual meet his or her unreasonably high standards and behaviors that involve <em>avoidance</em> of situations that trigger the need to be perfect. Behaviors aimed at meeting perfectionistic standards include checking and reassurance seeking (for example, to make sure that a goal is being met), correcting others, repeating actions, and dwelling too long before making decisions. Both Reid and Joanne engage in these types of behaviors. Examples of avoidance behaviors include procrastination (putting off starting a task because one’s desire for perfection is likely to make the task difficult and unpleasant) and giving up on tasks prematurely (because perfectionistic standards are unlikely to be met).</p>

    <p>Unfortunately, when performed excessively, perfectionistic behaviors can have an effect that is the exact opposite of what is desired. Instead of adding order and control to a person’s life, they actually lead to disorder and a lack of control. Perfectionistic behaviors can increase the time needed to get things done and can make others feel uncomfortable. For example, individuals who constantly correct the work of their coworkers are likely to find that others either get angry or eventually learn to stay away. People who check and recheck their reports in order to avoid making mistakes are likely to get less done than people who are able to submit a report with minimal checking.</p>

    <h2 class="sigilNotInTOC" id="heading_id_4">How Behavior Maintains Perfectionistic Beliefs</h2>

    <p class="paft">The relationship between behavior and thoughts is complex. Your beliefs, expectations, and interpretations all influence your behavior. For example, if you believe that being late for an appointment is unforgivable and that you should be able to plan ahead for all possible delays, you would likely leave the house earlier than necessary in order to guarantee a prompt arrival. People who believe that there is only one way to get a particular job done may be inclined to do the work themselves rather than allow others to help with the task. Students who believe that a term paper must be perfect may be inclined to procrastinate and put off starting their papers because they know that they cannot possibly meet the impossible standards that they have set for themselves.</p>

    <p>The relationship between thoughts and behavior can also work in the opposite direction—there are ways in which behaviors can affect thoughts. Behaviors often have the function of maintaining beliefs. For example, certain behaviors can maintain perfectionistic beliefs by preventing the individual from learning that the belief is not true. People who believe that the only way to avoid making mistakes is to check and recheck their work may never learn that they could probably get by with being somewhat less careful.</p>

    <p>Here’s another example of how perfectionistic behavior can maintain perfectionistic beliefs: some people who go into too much unnecessary detail when giving other people instructions (about how to bake a cake, how to get to the mall, and so on) may believe that such detailed information is necessary to ensure that the task is carried out correctly. By continuing to go overboard when giving other people instructions, the perfectionist never learns that these beliefs are untrue. To test out the validity of the perfectionistic beliefs, it would be necessary to leave out some of the detail and see whether the instructions are still carried out correctly.</p>

    <h2 class="sigilNotInTOC" id="heading_id_5">Appropriate Standards vs. Perfectionistic Behaviors</h2>

    <p class="paft">In order to perform effectively in the world, it is important that people set standards and work toward meeting them. For example, most of us would take the time to straighten a picture that was hanging crooked on the living room wall. For many people, straightening the picture would make spending time in the living room more pleasant than would leaving it crooked. Similarly, most students check over their exams and proofread their papers before handing them in. Checking over one’s schoolwork is likely to reduce the number of errors, ultimately leading to higher grades. It’s not unusual for people to ask others for feedback or reassurance when unsure about whether they have performed well during a presentation. Asking for feedback allows people to find out how they perform and provides them with suggestions for improvement.</p>

    <p>These are examples of methods that people use to ensure that their behavior meets certain standards. If people didn’t adhere to their standards, the quality of their work would decrease, their relationships would suffer, their work would suffer, and there would likely be other negative consequences. In moderation, behaviors such as checking your work and fixing things that aren’t quite right can be useful.</p>

    <p>Perfectionistic behaviors are similar in content to the types of behaviors that most people engage in to maintain their standards. However, they differ in frequency and intensity. As an example, consider behavior aimed at being organized. You may know people whom you perceive as disorganized. These people are chronically late, are always losing things, and have trouble getting things done. This lack of organization affects all aspects of their functioning. Friends may be reluctant to lend money (or other items) to people who appear to be disorganized, for fear of never seeing their money again. They may also avoid making plans with people whom they perceive as disorganized, for fear that the person will not follow through with his or her part of the plan (for example, showing up on time for a dinner reservation).</p>

    <p>Most people appreciate the importance of being organized. However, if a person’s level of organization is perfectionistic, it no longer has a useful function because the person may be overly concerned about organization—to the point of not being able to get things done. This type of organization can be associated with procrastination or with a tendency to spend so much time organizing and generating lists of things to do that the actual work never gets done.</p>

    <p>Consider the following examples of behaviors that might be considered either helpful or overly perfectionistic, depending on the context, frequency, and intensity of the behavior.</p>

    <h2 class="sigilNotInTOC" id="heading_id_6">Perfectionistic Styles of Behaving</h2>

    <p class="paft">As we discussed before, the term “perfectionism” means different things to different people. No one person is a perfectionist in every situation or engages in every perfectionistic behavior listed in this section. On the other hand, many people do behave like a perfectionist from time to time, and it can be helpful to identify the types of perfectionistic behaviors that may be a problem for you. As you read through the following pages, identify examples from your own experience of any perfectionistic behaviors that are problematic in your life. Keep in mind that these categories of behavior overlap considerably. A particular perfectionistic behavior may fit equally well in two or more of these categories.</p>

    <p class="bh">Overcompensating</p>

    <p>Because perfectionism is often associated with anxiety or discomfort about the possibility of not meeting their high standards, people who are perfectionistic often overcompensate in their behavior. <em>Overcompensation</em> involves overdoing some behavior to make absolutely sure that everything is “just right.” Examples of overcompensation include the following:</p>

    <p>Natasha lives about twenty minutes from work. However, she leaves ninety minutes before having to arrive at work—just in case there are unanticipated delays.</p>

    <p>To ensure that his tax return was completed correctly, Danny hired the most expensive accountant in town, even though his return was very straightforward.</p>

    <p>To make sure that his client received his communication, Thomas left the message by telephone, e-mail, fax, and regular mail. He then telephoned the client a week later to make sure that the messages were received.</p>

    <p>Oliver tends to tell stories in excruciating detail to make sure that nothing is left out.</p>

    <p>Miles believes that by keeping perfectly clean, he can avoid becoming ill. He is especially concerned about avoiding possible contamination from germs and other agents that may cause him to get sick. To be sure that he stays germ-free, he washes his hands more than thirty times a day and frequently asks his family members to wash their hands.</p>

    <p>Barry worries excessively about losing documents on his computer. Therefore, he tends to back up each document that he writes—on five separate CDs.</p>

    <p class="exh">Exercise 4.1 Overcompensating</p>

    <p class="paft">Do you sometimes overcompensate to make sure everything is perfect? If so, record some examples of your own overcompensating in your journal.</p>

    <p class="bh">Excessive Checking and Reassurance Seeking</p>

    <p>People who tend to be perfectionistic often engage in frequent or excessive checking to make sure that they have done things correctly, that no one else has made a mistake, or that some standard has been met by themselves or another person. A specific form of checking involves repeatedly seeking reassurance from others that a particular task was done well enough or that some other standard has been met. Examples of excessive checking and reassurance seeking include the following experiences:</p>

    <p>Before submitting a completed form (for instance, a credit card or job application), Dana spends hours looking it over for errors. If he is unable to check an important form to his satisfaction, he sometimes is up all night worrying about it.</p>

    <p>Patrick cannot leave the house without checking over and over again to make sure that all the appliances have been turned off and unplugged. Because of his excessive checking, he is usually late for work and sometimes doesn’t make it in to work at all.</p>

    <p>Although she is often told she looks attractive, Louise is convinced that her nose is too large for her face. She spends several hours each day looking in the mirror to evaluate whether her nose looks too big.</p>

    <p>Ken makes a point of watching his fellow coworkers each day to see who arrives on time and who is late.</p>

    <p>Karyn, a pharmacist, feels compelled to check the amounts and names of all medications that she dispenses ten to twelve times each before giving them to a customer.</p>

    <p>Although she rarely makes mistakes, Jennifer asks her supervisor and coworkers many times daily to check over her work. She does this so that she can be reassured that she has done it correctly.</p>

    <p>Even though Gus is an excellent cook, he constantly doubts his ability to cook well and, as a result, rarely cooks for other people. When he does, he requires excessive reassurance from everyone in his family that they enjoyed the meal.</p>

    <p class="exh">Exercise 4.2 Excessive Checking and Reassurance Seeking</p>

    <p class="paft">Do you check excessively to make sure that everything is perfect? In your journal, list some examples of excessive checking and reassurance seeking from your own life.</p>

    <p class="bh">Repeating and Correcting</p>

    <p>If a behavior is perceived as incorrect or a situation doesn’t “feel” right, it may seem overly important to correct the behavior or situation. At times, perfectionism can be associated with a tendency to go overboard with respect to correcting one’s own behavior or that of another person, even if the consequences of not correcting the behavior are, in reality, minimal. In fact, the consequences of repeating and correcting one’s actions are often greater than the consequences of not engaging in these behaviors.</p>

    <p>For example, an individual who constantly points out every time anyone makes a mistake—even if the “mistake” is minor (for example, how the other person chooses to complete a task)—can lead others to become angry or hurt. Furthermore, no matter how consistently people are corrected, they are going to continue making mistakes. Here are some examples of repeating actions and correcting situations:</p>

    <p>If Candace notices that a book on her shelf has a creased cover, she feels compelled to replace the book with a new copy. She spends several hundred dollars per year replacing things because of defects that most people would not even notice.</p>

    <p>If Nathan’s laundry is not folded perfectly, he tends to refold it many times until he is satisfied.</p>

    <p>When talking to people, Phyllis tends to repeat herself to make absolutely sure that she is being understood. Unfortunately, people often become bored with the conversation and listen less and less as time goes on.</p>

    <p class="exh">Exercise 4.3 Repeating and Correcting</p>

    <p class="paft">Do you tend to repeat actions and correct information to make sure that everything is perfect? In your journal, list some examples of repeating and correcting from your own life.</p>

    <p class="bh">Excessive Organizing and List Making</p>

    <p>People who are perfectionistic may spend too much time on organizational details, such as making lists of things to do, making lists of possessions, or putting belongings in a particular order. Although some level of organization is helpful (for example, it makes it easier to find things that you’re looking for), excessive organization can get in the way of completing tasks. Following are some examples of excessive organization and list making:</p>

    <p>Bruce spends several hours each week organizing his family’s music, books, movies, and computer software. In addition, he keeps a detailed inventory on his computer of all his music, books, and software. Each week, he checks to make sure that all of his CDs, DVDs, books, and software are stored in alphabetical order. If items have been misplaced or filed out of order, he becomes frustrated with his family for not being able to put things back where they belong.</p>

    <p>Each morning, Maya spends more than an hour making a list of all the chores and tasks that she needs to accomplish for the day. She spends additional time making sure that the items are listed in the most efficient order, so that no unnecessary time is lost between tasks. If she misses a task or has to complete the list out of order, she feels compelled to rewrite her list so that it accurately reflects what she is doing. She keeps her lists of things to do for years, just in case she needs them.</p>

    <p>Jeffrey cannot get any work done until his office is completely tidy and organized. As a result, he often spends more time making his office tidy and organized than he actually spends working.</p>

    <p>Dar is a student who spends many hours each week planning her strategy for studying (for example, calculating exactly how much time she should spend studying for each subject). As a result, she is left with little time to actually study.</p>

    <p class="exh">Exercise 4.4 Excessive Organizing and List Making</p>

    <p class="paft">Do you tend to spend too much time organizing and making lists? If so, list some examples of excessive organizing and list making in your journal.</p>

    <p class="bh">Difficulty Making Decisions</p>

    <p>People who are perfectionistic sometimes have a hard time making decisions. Faced with many different alternatives, perfectionistic individuals may be anxious about making a mistake that might be irreversible and potentially catastrophic. Difficulty making decisions can affect almost any area of an individual’s functioning by making it hard to do one’s work, complete tasks, and even respond to questions. Below are some examples of difficulty in making decisions:</p>

    <p>Ray finds it very difficult to make decisions about everyday activities (for example, deciding what movie to watch or deciding what to wear in the morning) because he fears making a wrong choice. As a result, it takes him longer to get things done compared to other people. His friends and family often become frustrated while waiting for him to make decisions.</p>

    <p>Because of his difficulty making decisions, Miguel changes his mind frequently. For example, after ordering a meal in a restaurant, it is not unusual for him to change his order several times before actually receiving his food.</p>

    <p>Linda prefers to have others make decisions for her so that she cannot be blamed for making a wrong choice.</p>

    <p class="exh">Exercise 4.5 Difficulty Making Decisions</p>

    <p class="paft">Do you find it hard to make decisions? Does it take you a long time to choose among several options? If so, record in your journal some examples of the types of decisions you find it difficult to make.</p>

    <p class="bh">Procrastination</p>

    <p>Because perfection can almost never be achieved, people who are constantly aiming for perfection may put off doing things for fear that they will never meet their targets or goals. By not starting things, perfectionists don’t need to deal with the possibility of doing a less-than-perfect job. In some cases, perfectionism may lead to complete avoidance of situations in which an individual may not measure up. Following are examples of procrastination:</p>

    <p>Because Michelle feels such intense pressure to do well in all her classes, she tends to take her schoolwork very seriously. With each paper that she hands in, it is very important to her that she impresses her professor. She tends to put off starting her work because she fears that the task of writing the perfect paper will be too overwhelming.</p>

    <p>In order to lose weight, Michael has come up with a very complex list of rules for what he can and cannot eat, as well as a detailed exercise plan. However, he has serious doubts about whether he is going to be able to stick to his plan. To minimize the chances of failing, he has delayed starting his new weight loss plan until the time feels “right.” So far, it’s been two years and the time has not yet felt right.</p>

    <p>Jason has been interested in getting to know a new coworker for several weeks. However, rather than just saying hello, he has been dwelling on trying to come up with the best way to introduce himself.</p>

    <p class="exh">Exercise 4.6 Procrastination</p>

    <p class="paft">Are you a procrastinator? In your journal, list some examples of procrastination from your own life.</p>

    <p class="bh">Not Knowing When to Quit</p>

    <p>In order to reach a particular goal or target, people who are perfectionistic will sometimes continue to work on a task for too long. This can interfere with their ability to complete projects and can also frustrate other people. Here are some examples of not knowing when to quit:</p>

    <p>Despite being very bright, Anne rarely finishes her exams on time. When she encounters a question for which she doesn’t know the answer, she becomes determined to get it right. As a result of her determination, she often spends too much time on these difficult items and doesn’t have time to complete later questions on the test.</p>

    <p>Alice finds it very difficult to accept others who don’t see things the way she does. When she disagrees with another person about a matter, she usually continues trying to convince the other person of her point of view, often to the point of getting into arguments and compromising her relationships with others.</p>

    <p>In preparation for his wedding, Rashad had a very difficult time deciding whom to invite. In preparing his list (which was to be no more than one hundred people), he began with his immediate family, close friends, and coworkers. However, as he continued to add names, he had great difficulty stopping. He worried that people might be offended if they were not invited. He ended up with a list of over three hundred people that included distant relatives, people at work that he hardly knew, and many friends with whom he had lost touch.</p>

    <p class="exh">Exercise 4.7 Not Knowing When to Quit</p>

    <p class="paft">Do you sometimes spend so much time on tasks that you don’t get your other work done? In your journal, list some examples of not knowing when to quit from your own life.</p>

    <p class="bh">Giving Up Too Soon</p>

    <p>This particular behavioral style is the opposite of not knowing when to quit. People who tend to be perfectionistic sometimes give up trying because of their anxiety over not being able to reach a particular goal or standard. Examples of giving up too soon include the following:</p>

    <p>Despite being told by his guitar teacher that his playing was coming along very well, Hans quit taking guitar lessons because he felt that it was taking too long to achieve the level of competence that he desired.</p>

    <p>Phyllis believed that she wasn’t living up to her supervisor’s expectations, even though her supervisor was very happy with her job performance. Phyllis decided to quit her job, rather than wait to be fired for making a mistake.</p>

    <p>Danny quit his job as an interior designer because he believed that he would never be among the top designers in the country.</p>

    <p>Because she thought that she could never find a partner that met all her needs, Keisha gave up trying and decided to stay single.</p>

    <p class="exh">Exercise 4.8 Giving Up Too Soon</p>

    <p class="paft">In your journal, list some examples of giving up too soon from your own life.</p>

    <p class="bh">Excessive Slowness</p>

    <p>Perfectionism can sometimes lead people to do things more slowly than they would otherwise. Slowness is often related to some of the other behaviors discussed earlier. For example, procrastination can cause people to take longer before starting a particular project or activity. Also, people who have difficulty making decisions often take a long time to choose among several options (things like choosing what color to paint the living room). Finally, people who check excessively sometimes take longer to complete tasks, particularly if they continually check their performance as they go along. Perfectionism can even lead to slower performance beyond these other behaviors. Some individuals who are perfectionistic have a slower style of getting things done. By doing things more slowly and carefully, they may feel less likely to make an error. Examples of excessive slowness follow:</p>

    <p>Jed tends to read very slowly so that he doesn’t miss any important information.</p>

    <p>Tia speaks more slowly than other people do so that she can think very carefully about what she says and avoid saying the wrong thing.</p>

    <p>Danielle spends much more time than most people do when she showers, washes her hands, or brushes her teeth. While cleaning herself, she wants to be absolutely sure that she has done it properly.</p>

    <p>Luke is very handy with tools. He finished his basement on his own and loves building and fixing things. He would like to have his own renovation company; however, his perfectionism slows him down. He does an excellent job, but he works much more slowly than other contractors and therefore would have a hard time earning enough money working as a contractor.</p>

    <p class="exh">Exercise 4.9 Excessive Slowness</p>

    <p class="paft">Does it take you a long time to get things done? If so, list some examples of your own excessive slowness in your journal.</p>

    <p class="bh">Failure to Delegate</p>

    <p>Perfectionism is sometimes associated with a tendency to mistrust that others can do things properly. Individuals who have trouble trusting others may avoid delegating tasks to people unless they are sure that the other person will complete them perfectly. Here are a few examples illustrating a failure to delegate.</p>

    <p>Louis insists on doing all of the cooking and cleaning at home, despite the fact that his wife and children often offer to help. Although Louis doesn’t enjoy these chores, he has very strict beliefs about how things should be done. He is therefore reluctant to let others help him, for fear that the tasks won’t be done correctly and his standards will not be met.</p>

    <p>Phil has just been promoted to a new managerial position, which includes a new, full-time secretary. Although his new secretary is very experienced and competent, Phil has trouble asking him to do any of Phil’s clerical work (typing, filing, and so on), for fear that he will not do things the way Phil likes them done.</p>

    <p>Hilary refused to leave her children with a babysitter because she was convinced that the babysitter would not enforce the household rules (things like bedtime and so on) and that her children would learn bad habits.</p>

    <p class="exh">Exercise 4.10 Failure to Delegate</p>

    <p class="paft">Do you need to do everything yourself to make sure that it’s all done correctly? If so, list in your journal some examples of your own failures to delegate.</p>

    <p class="bh">Hoarding</p>

    <p>For some people, perfectionism can be associated with difficulty throwing things away. For example, people may hold on to old newspapers, magazines, or pamphlets. Other people may keep empty jars, packages, letters, broken appliances, or other trivial items. In fact, people can hoard almost anything. Hoarding is not the same as having a collection of some kind. Nor is it the same as keeping things for sentimental value. People who have problems with hoarding often have their homes filled with various things that they don’t need or enjoy. Hoarding can lead to problems in relationships (for instance, if an individual’s partner wants to throw something away) and can make it difficult to keep one’s home clean. The most common reasons why people keep things they don’t need include the belief that the item may be needed one day, as well as a more general discomfort with the thought of throwing the item away. Examples of hoarding include these experiences:</p>

    <p>Donald has kept every bill, bank statement, and receipt that he has received in the past fifteen years. All of his papers are neatly filed in filing cabinets that fill nearly an entire room. Although he has only had to refer to an old bill or receipt a few times over the years, he keeps everything, just in case he needs them.</p>

    <p>Karla hates the thought of running out of things she needs. Therefore, she always has extra stores of food, tissues, toothpaste, cleaning products, office supplies, and other items that she uses regularly. However, whereas most people might have an extra tube of toothpaste in the house, Karla feels very uncomfortable unless she has many extras of each item she might require. For example, at any one time, she tends to have twenty tubes of toothpaste, fifty rolls of toilet paper, fifteen bottles of dish soap, and many extras of most other household items.</p>

    <p class="exh">Exercise 4.11 Hoarding</p>

    <p class="paft">Are you a pack rat? If so, describe briefly your own hoarding tendencies in your journal.</p>

    <p class="bh">Avoidance</p>

    <p>Because perfectionistic standards are often so difficult to meet, people who strive to be perfect will sometimes avoid situations in which they might feel compelled to meet these impossible standards. We described some specific examples of avoidance earlier. These include failing to delegate tasks to others, procrastinating, and giving up on tasks too quickly. Following are some additional examples of avoidance:</p>

    <p>Julie avoids weighing herself because she knows that if she has gained even one pound, it will ruin her day.</p>

    <p>Although he is very bright and competent, Darcy decided not to attend college because he believes that he could never be satisfied with his performance.</p>

    <p>Pierre, a chef, is rarely able to enjoy other people’s cooking. To avoid being disappointed, he tends not to have his partner or friends cook for him, and he rarely eats in restaurants.</p>

    <p>Lois never asks for help or advice from anyone. She worries that if she asks for help other people would notice that she is not perfect, and it is very important to Lois that others think she is flawless.</p>

    <p>Naomi tends to avoid spending time around other people at work or socially because she believes that others perceive her as not being particularly entertaining, interesting, witty, or bright. Even when other people invite her to a party or gathering, she assumes that they would not enjoy her company if she did show up.</p>

    <p class="exh">Exercise 4.12 Avoidance</p>

    <p class="paft">Do you avoid any situations because of your perfectionism? In your journal, list some examples of avoidance from your own life.</p>

    <p class="bh">Attempts to Change the Behavior of Others</p>

    <p>When people are too concerned about how things are done, they may be overly critical of the behavior of others and may frequently try to change that behavior. Examples of attempts to change the behavior of others include the following:</p>

    <p>On a daily basis, Amelia feels compelled to correct the way her boyfriend washes dishes. Despite her frequent reminders for him to use warmer water, use more detergent, and let the dishes soak, he continues to wash the dishes the way he has always washed them.</p>

    <p>Gary is uncomfortable with the fact that not everyone at work shares his religious beliefs. In hopes of converting his coworkers to his way of seeing things, he frequently brings in religious literature and invites people to attend religious services with him, even after they have declined his offer several times and haven’t expressed any interest.</p>

    <p>Lately, Jane finds that almost every little thing her fourteen-year-old daughter does gets on her nerves. She constantly reminds her daughter to hold her fork properly, sit up straight, take off her shoes in the house, and behave more or less the way Jane does whenever possible.</p>

    <p class="exh">Exercise 4.13 Attempts to Change the Behavior of Others</p>

    <p class="paft">Do you find yourself always trying to change the behavior of those around you? If so, list some examples in your journal.</p>
