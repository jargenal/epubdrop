    <p class="cn">Chapter 11</p>

    <h1 id="heading_id_2">Perfectionism and Anger</h1>

    <p class="paft">Like sadness and fear, anger is a universal emotion that is experienced by everyone. Despite the fact that all people feel anger from time to time, most people don’t enjoy feeling angry, and they may even feel embarrassed about expressing anger in front of others. The experience of anger is often associated with other feelings, such as irritation, disappointment, rage, or a feeling of hatred and dislike toward another person, a situation, or even yourself.</p>

    <p>When feeling angry, you may also experience a desire to be aggressive or destructive, or you may feel the urge to seek revenge toward another person who has let you down. Usually, anger is associated with a sense of blame. That is, when you feel angry, you are probably assigning blame to another individual or yourself for behaving in an unacceptable way. Also, anger is typically associated with strong beliefs about the way a situation <em>should</em> be.</p>

    <p>Although anger can increase the likelihood of aggression, there is little evidence to support a strong relationship between anger and aggression in general. Anger prepares you to be aggressive if the need arises, but it does not cause aggression directly. Most people, across situations, are able to control their anger and prevent it from leading to verbal or physical attacks on others. Furthermore, even when a person is aggressive, it is often not related to anger but rather to a need for dominance or control. For example, people who injure their victims during a robbery have probably not been provoked in any way and probably aren’t angry at the victim. Similarly, when children tease or hurt other children in the school yard, it probably has little to do with anger and more to do with a desire to dominate the other person or look strong in front of peers.</p>

    <p>People differ with respect to their threshold for feeling anger. An experience that might cause anger for one person may not have the same effect on another individual. Although some drivers become very angry when other drivers make mistakes—such as cutting off another car, tailgating, driving too slowly, or going through a red light (this anger toward other drivers is often referred to as “road rage” in the media)—other drivers tolerate these situations without much reaction.</p>

    <p>As we discussed in previous chapters, perfectionism puts people at risk for becoming angry more easily. If you tend to have high standards that are rigid and inflexible, you are at risk for not having your standards and expectations met. Not being able to achieve a goal is one of several common triggers for anger.</p>

    <h2 class="sigilNotInTOC" id="heading_id_3">Common Triggers for Anger</h2>

    <p class="paft">Psychologist Carroll Izard identified three common triggers for anger: restraint, interruption of goal-oriented behavior, and aversive stimulation (1991). We will consider each of these in turn.</p>

    <p class="bh">Restraint</p>

    <p>Restraint involves some force blocking your desired actions in a particular situation. Restraint can be physical or psychological in nature. Physical restraint involves actually holding a person down in order to prevent him or her from doing something or going somewhere. Studies show that even infants as young as four months old respond with anger when their arms are restrained (Sternberg and Campos 1990). Psychological restraint involves being prevented from doing something by some social or psychological force (for example, having to follow particular rules or regulations to avoid getting in trouble). You probably recognize the experience of becoming angry when you are restrained or prevented from doing something that you want to do. As a teenager, you may have become angry when your parents prevented you from going out with friends. As an adult, you may become angry when you get into your car, only to realize that the tire is flat and you are going to be late for an appointment.</p>

    <p class="bh">Interruption of Goal-Oriented Behavior</p>

    <p>Interruption of goal-oriented behavior is very similar to restraint, in that a person is prevented from reaching a particular goal. An example is feeling angry when you are interrupted while concentrating on a task, such as reading a book, watching a good movie, or filling out your income-tax forms. Although most people enjoy breaks from time to time, uninvited interruptions may be less welcome for some people, especially when there is a perceived pressure to finish a task by a certain time. Because perfectionism can often be associated with high standards for performance or a drive to finish jobs quickly, being interrupted is more likely to be a trigger for anger among perfectionistic people.</p>

    <p class="bh">Aversive Stimulation</p>

    <p>Aversive stimulation involves being exposed to an unpleasant stimulus, such as extreme cold or heat, intense pain, a loud noise, a nasty odor, or a morally offensive comment. For example, if you are shopping in a crowded shopping mall, you may become irritable following several hours of exposure to noise, crowds, and uncomfortable stuffiness (especially if you’re wearing warm clothing).</p>

    <p class="bh">Other Triggers for Anger</p>

    <p>There are many other possible triggers for anger. For example, most people feel angry when they have been deceived, treated poorly, or hurt by another person. In addition, you probably have had times when disapproval from others has led you to feel angry. You may also feel anger toward others even when their behavior is not directed at you (for instance, feeling angry at your best friend’s boss when you find out that your best friend was unjustly fired; feeling angry at a politician for making a decision that you don’t agree with).</p>

    <p>Anger can be directed at yourself as well. If you make a mistake on an important job at work, you may feel angry for not doing the perfect job that you had anticipated. You may even feel angry about feeling angry. It is not unusual for people to experience anger toward themselves if they lose control when feeling angry toward another person.</p>

    <h2 class="sigilNotInTOC" id="heading_id_4">When Is Anger a Problem?</h2>

    <p class="paft">Chronic problems with anger can contribute to high blood pressure, heart disease, excess stomach acid, and other physical problems. Interpersonally, anger can lead to less intimate relationships, as friends, coworkers, and family members learn to avoid talking about certain issues in order to prevent themselves from being the victims of your anger. In extreme cases, people may avoid you completely, leading to complete social isolation. Finally, continual displays of anger can affect your self-esteem by making you feel guilty, embarrassed, out of control, or inadequate.</p>

    <p>Although anger is a normal emotion that everyone experiences, it can be problematic when it happens too frequently, when it happens too intensely, when it leads to physical or psychological aggression, when it leads to relationship difficulties, and when it leads to any other types of significant impairment in a person’s life (for example, individuals who are so angry that they cannot work on their term paper that is due the next day; people who get fired for telling their boss what they really think of him or her).</p>

    <h2 class="sigilNotInTOC" id="heading_id_5">The Development of Anger</h2>

    <p class="paft">The experience and expression of anger is mediated by a complex interaction among various biological and psychological factors. As we mentioned earlier, there is evidence that the capacity to express anger is present from infancy. In addition, many animals are capable of expressing anger, often in ways that are very similar to the expression of anger in humans. From a biological perspective, the limbic system (including the hypothalamus and amygdala) has been implicated in the expression of anger.</p>

    <p>In addition, your learning experiences during childhood probably have a large impact on how you express anger. There is evidence that parents are more tolerant of anger in boys than in girls. Researchers have found that parents of boys tend to respond to anger with attention, which may strengthen the angry behavior. In contrast, parents are more likely to tell their daughters that their anger is inappropriate and instruct them to stop being angry (Radke-Yarrow and Kochanska 1990). This pattern seems to continue in adults. Men who express anger in the workplace are generally viewed more positively than men who express sadness, and their anger is often assumed to be related to external circumstances (for example, “He is angry because of something that happened to him”). In contrast, women who express anger in the workplace are viewed (by both men and women) more negatively, and their anger is more likely to be attributed to internal factors (for instance, “She is an angry person”).</p>

    <p>Other research has lent further support to the view that behavior by parents contributes to the expression of anger in children. For example, one study found that toddlers are more likely to express anger frequently if their parents respond to their problem behaviors with anger (Crockenberg 1985). In contrast, parents who respond to toddlers with other emotions, such as fear or sadness, are more likely to have children with fewer behavioral problems and a well-developed capacity to empathize with other people. It should be noted that behavior by parents is not the only social influence on the way a person expresses anger. There is also evidence that a child’s peer group has an impact on the development and maintenance of anger and anger-related behavior (Lemerise and Dodge 2008; Snyder et al. 2007).</p>

    <p>Because anger is a universal emotion influenced by such factors as brain functioning and childhood learning experiences, you may be tempted to assume that there is nothing you can do to change your angry behavior. Nothing could be further from the truth. More than fifty studies have investigated the effectiveness of cognitive and behavioral treatments for anger, and overall this approach to treating anger has been shown to be quite effective (DiGiuseppe and Tafrate 2007; Feindler 2006; Gorenstein et al. 2007). Learning to change the thoughts and behaviors that help to maintain your difficulties with anger is the best way to overcome the problem.</p>

    <p class="bh">The Role of Thoughts in Anger</p>

    <p>When you respond with anger, it is not the situation or event that leads you to react, but rather your interpretation of the situation or event. For example, imagine that your child arrives home from school and hands you a midterm report card. Upon examining the report card, you notice failing grades in math and science. How would you respond to this situation? What emotions would you be feeling? What thoughts might you be having? Now, imagine how other people you know might respond to this situation. Think about specific people, such as your partner, family members, coworkers, and so on. Would any of them respond differently to this situation than you? Can you imagine another parent feeling differently when confronted with this situation? There are many different ways that a parent might respond. Furthermore, the specific reaction is likely to be influenced by the person’s beliefs about the situation. The table below provides examples of thoughts that might be associated with particular emotional reactions in response to a child’s disappointing report card.</p>

    <p>In this example, you can see how the specific beliefs that you hold affect your emotional response to the situation. By examining the accuracy of your angry beliefs and trying to change them to be more realistic and moderate, you will find it easier to control your anger.</p>

    <h2 class="sigilNotInTOC" id="heading_id_6">Perfectionism and Anger</h2>

    <p class="paft">Perfectionism can lead to anger when you apply your unreasonably high expectations and standards to other people. You may also become angry at yourself when you do not meet your own specific goals or expectations. Any belief that you have about how you or other people <em>should</em> be puts you at risk for feeling angry if these expectations are not met. Beware of statements or thoughts that include words such as “should” and “must,” especially when they are accompanied by words such as “always” and “never.” Examples of perfectionistic expectations that may lead to anger when they are not met include the following:</p>

    <ul>
      <li class="ulf">I should never be late for appointments.</li>

      <li class="ul">My doctor should be able to diagnose and treat any symptom I have.</li>

      <li class="ul">My children should always dress the way I want them to.</li>

      <li class="ul">People should never tell lies—even white lies.</li>

      <li class="ul">Nice people never talk about others behind their backs.</li>

      <li class="ul">I should lose five pounds.</li>

      <li class="ul">My children must never swear.</li>

      <li class="ul">People should never eat with their hands.</li>

      <li class="ull">People should always do exactly what they say they will do.</li>
    </ul>

    <h2 class="sigilNotInTOC" id="heading_id_7">Changing Perfectionistic Thoughts and Behaviors that Contribute to Anger</h2>

    <p class="paft">Chapters 7, 8, and 9 contain many different strategies that are useful for combating the thoughts and behaviors that are associated with perfectionism, including those that contribute to anger. You may wish to review these chapters. The remaining sections of this chapter highlight a number of strategies that are especially helpful for dealing with anger.</p>

    <p class="bh">Become Aware of Your Anger Before It Becomes Intense</p>

    <p>People are often unaware of their anger, especially when it is at low levels. Therefore, the first step to reducing your anger is to increase your ability to detect anger before it gets out of hand. Be aware of subtle signs that you may be feeling angry. These may include a tendency to use sarcastic comments or put-downs, a feeling of tension in your body, being grouchy or irritable, or being overly sensitive to comments from other people. If you are in a situation where things are not going your way, be aware of whether you are becoming angry and take steps to keep the anger from getting the best of you (some possible strategies are described throughout the rest of this chapter). When anger is very intense, it may be hard to think clearly, so catching it early can be helpful.</p>

    <p>In fact, you can even deal with the anger before it happens. If you anticipate being angry in a situation, try to challenge your angry thoughts before they occur. For example, if you are expecting a negative performance appraisal in an upcoming meeting with your boss, plan how to deal with the situation before it happens. Before the meeting, brainstorm possible ways of dealing with the situation that are unlikely to be damaging to you or your situation at work.</p>

    <p class="bh">Challenge Your Perfectionistic Thoughts</p>

    <p>Rather than accepting your angry thoughts as facts, test out their validity by using the strategies discussed in chapter 7. Examine the evidence supporting your angry beliefs. Search for other ways of interpreting the situation. The following therapy vignette illustrates how to make your standards more flexible in order to become more tolerant and decrease your angry feelings.</p>

    <p class="diaf">Beth: My daughter just came home from college with a lip ring, and I’m absolutely furious.</p>

    <p class="dia">Therapist: What bothers you about the piercing?</p>

    <p class="dia">Beth: It looks repulsive. Also, I’m worried that when other people see it, it will cause problems for her. Nobody will ever find her attractive with that thing.</p>

    <p class="dia">Therapist: The thought that you just mentioned is a “worry” thought. What “anger” thoughts are you having? For example, do you believe that you’ve somehow been hurt by your daughter getting her lip pierced?</p>

    <p class="dia">Beth: Well, she knows that I don’t approve of it, and she did it anyway. We’ve talked about it in the past, and I let her know how I feel. She has completely disregarded my feelings, and I believe that she has no respect for my opinions.</p>

    <p class="dia">Therapist: So, you interpret the lip piercing as evidence that your daughter doesn’t respect your opinions. Are there other possible interpretations?</p>

    <p class="dia">Beth: Not that I can think of.</p>

    <p class="dia">Therapist: Would you say that any time a person decides to purchase a piece of clothing or adopt a new hairstyle that another person does not find attractive, it is a sign of disrespect?</p>

    <p class="dia">Beth: Of course not, but this is different. This is such a radical change.</p>

    <p class="dia">Therapist: Can you think of anything that you may have done in the past that your own parents thought was radical or inappropriate?</p>

    <p class="dia">Beth: Actually, when I got my ears pierced, my parents didn’t talk to me for a week.</p>

    <p class="dia">Therapist: Today, the role of body piercing is not very different from that of ear piercing forty years ago. If you look around the city, there are many people your daughter’s age who have a piercing in one place or another.</p>

    <p class="dia">Beth: What if she can’t find a job after graduation because of her lip ring? It’s possible that employers out there will see it the way I do!</p>

    <p class="dia">Therapist: Let me throw the question back at you. What if she can’t get a job because of the lip ring?</p>

    <p class="dial">Beth: I guess she will take out the lip ring or find a place to work where it doesn’t matter. I can see what you’re getting at. Even though I don’t like it, it’s not as bad as I thought at first.</p>

    <p>In general, asking yourself some of the following questions may help you to challenge the perfectionistic thoughts that contribute to your anger:</p>

    <ul>
      <li class="ulf">Is this situation really as important as it feels?</li>

      <li class="ul">What if this situation doesn’t go my way? Does it really matter?</li>

      <li class="ul">Do I need to control this situation?</li>

      <li class="ul">Is my way the only way to view this situation?</li>

      <li class="ul">Would another person necessarily see this situation the same way as I do?</li>

      <li class="ul">What if things don’t work out the way I want them to?</li>

      <li class="ul">Do I know for sure that things will turn out badly if I don’t get my way?</li>

      <li class="ull">Will getting angry result in the outcome that I want?</li>
    </ul>

    <p class="bh">Allow People to Be Different than You</p>

    <p>People like to be around other people who share important beliefs, attitudes, and values. People who are overly perfectionistic, however, may insist that other people conform to their way of thinking and doing things, even for matters that aren’t terribly important. To be less of a perfectionist, you will need to allow other people to be themselves, even if it means that you don’t agree with their choices in clothing, hairstyle, career, relationships, and so on.</p>

    <p>This doesn’t mean that anything goes. In all relationships, there are limitations to what people find acceptable. Most people don’t tolerate being lied to or stolen from by friends or coworkers. Similarly, parents generally don’t allow their children to do things that are very dangerous. The goal should not be to have no standards, but rather to have more flexible standards. If you can distinguish between standards that are appropriate and others that are unrealistic or excessively high, you will run less of a risk of experiencing unwarranted anger toward other people.</p>

    <p class="bh">Avoid Using Angry Language</p>

    <p>Angry language can help fuel angry feelings. For example, labeling other people as jerks, idiots, incompetent, irresponsible, and so on can make it difficult to change the way you think about them. If you are tempted to label another person, try labeling his or her behavior instead. For example, if your housemate has not taken out the garbage in a few weeks, rather than saying, “My housemate is lazy and inconsiderate,” try saying, “My housemate has not taken out the garbage in a few weeks.”</p>

    <p>In addition to avoiding labeling, it can be helpful to make it a habit to think before you speak, particularly when you’re angry. Before saying what’s on your mind, imagine hearing the words that you are about to say. Would you find the words helpful if someone said them to you? If not, keep your thoughts to yourself. You don’t have to say everything you’re thinking.</p>

    <p class="bh">Assume Responsibility for Your Actions</p>

    <p>As we discussed earlier, anger is often caused by blaming another person for a problem or holding on to rigid beliefs about how something <em>should</em> be. To overcome a problem with excessive anger, it’s important to understand all the different factors that contribute to a situation, including your own role. Situations are often complex, and rarely is a particular person entirely responsible for a problem or situation.</p>

    <p>Imagine that you confided in your friend Tom that you didn’t like his friend Alison. If Tom told Alison how you felt about her, you might feel angry and betrayed because Tom has talked about you behind your back. Although it’s true that Tom may have made a mistake in this situation, it would be important for you to assume some responsibility for what happened as well. By telling Tom about your feelings toward Alison, you would also be guilty of gossiping. Also, you would be in part responsible for the information getting back to Alison.</p>

    <p>Similarly, arguments and disagreements are rarely the fault of any one person. Rather, they are usually determined by a complex interaction of many different factors, including the specific situation that two people are arguing about, the manner in which each person is discussing the topic (tone and volume of voice, body language, use of sarcastic comments and insults, and so on), the personal state of each person (fatigue, hunger, anxious or depressed mood, previous stresses during the day, and so on), and possible miscommunication. During a disagreement, it is easy to notice all the ways in which the other person has contributed to the argument. It’s much more difficult to take responsibility for your own behaviors that may have helped fuel the disagreement.</p>

    <p class="bh">Admit When You Are Wrong</p>

    <p>People often believe that it is important, above all else, to be consistent. You may fear that if you back down on a particular issue or if you change your mind, you will appear uncertain, others will not take you as seriously, and your opinion will be less respected in the future. There are situations in which this may be true. For example, a politician who makes a commitment (for example, “No new taxes”) during an election campaign and then breaks the promise after being elected may be perceived as dishonest, manipulative, or indecisive. However, in most cases, people respect other people who are able to change in the face of new information or after realizing that they have made a mistake. If you realize that your expectations have been unreasonable, people will appreciate you admitting that you were wrong. People generally appreciate an apology when it is sincere.</p>

    <p class="bh">Practice Exposure Exercises</p>

    <p>If you tend to overreact to other people doing things differently than you, structured exposure to the situation may help you to be more tolerant. For example, if it upsets you to have your partner clean up after dinner (because it is never done to your high standards), arrange for your partner to clean up every day for a couple of weeks (of course, this will depend on your partner’s agreeing to participate). During the practices, your job will be to refrain from making any comments or criticisms. Over the course of the practices, you will probably become more tolerant of your partner’s cleaning standards.</p>

    <p>Before beginning any exposure practices, we recommend that you review the relevant parts of chapter 8 to make sure that the exercises are structured in a way that maximizes their effectiveness.</p>

    <p class="bh">Take Some Time Out</p>

    <p><em>Time out</em> involves physically or mentally taking a break from a situation. For example, you might lie down, take a walk, phone a friend, watch TV, or get involved in some other activity that gets you out of the situation. Sometimes, you won’t have the opportunity to physically get away from a situation. In these cases, just taking the time to count to ten may be enough of a break to prevent you from saying something that you might regret later. Your anger is likely to decrease if you get away from the triggers that remind you of why you are angry. After a break, you are likely to see the situation in a more realistic light. Often, by the time you return to the situation, the anger will have subsided. Time out is especially helpful when your anger is too intense to make use of some of the other anger-management strategies, such as challenging your angry thoughts.</p>

    <p>There are helpful and unhelpful ways of taking time out. It’s best to never storm out of a room or hang up the telephone on another person. Even though this may make you feel better, the other person is likely to become more angry or hurt, and the problem will escalate. If you need to take a break, explain to the other individual that you are feeling angry and that you want some time to think about things. Be specific about how much time you need (“I’ll be back in an hour” or “I’ll phone you tomorrow”). If the other person wants to continue the conversation, make an appointment to talk at a later time when your anger is likely to have decreased—and make sure you keep the appointment.</p>

    <p class="bh">Try Physical Exercise</p>

    <p>Physical exercise (for example, running, walking, cycling, swimming, aerobics, sports, and so on) is a good way to blow off steam. With regular exercise, you may also feel more energetic and healthy, which in turn will make it easier for you to tolerate situations that otherwise might be annoying or frustrating (Hassmén, Koivula, and Uutela 2000).</p>

    <p class="bh">Practice Relaxation and Meditation</p>

    <p>Research has shown that relaxation training and mindfulness meditation can be effective ways to manage anger (Deffenbacher, Oetting, and DiGiuseppe 2002; Polizzi 2008). There are many different methods that can be used to induce a state of relaxation or mindfulness. Progressive muscle relaxation involves learning to relax the muscles of the body to decrease feelings of tension, stress, and anxiety. Imagery, another method that is sometimes helpful, involves learning to imagine particular scenes that are relaxing. Meditation and mindfulness training can help you deal with anger and other negative emotions. Finally, learning to breathe slowly and smoothly can help you relax. A full description of each of these methods is beyond the scope of this book. However, there are a number of places where you can learn more about relaxation and meditation if you are interested. Check out the Further Readings at the end of this book, as well as some of the ideas suggested in chapter 9. Also, you may have access near your home to classes for relaxation training, meditation, yoga, or some other activity that includes a relaxation or mindfulness component.</p>

    <p class="bh">Use Problem-Solving Strategies</p>

    <p>When you are faced with a conflict or problem, use the following steps to solve the problem, rather than losing your temper or stewing in anger:</p>

    <ol>
      <li class="nlf">Define the problem. Until you understand exactly what the problem is, you will not be able to solve it.</li>

      <li class="nl">If the problem is complex, break it down into smaller problems. Then choose one problem to work on at a time.</li>

      <li class="nl">Brainstorm all possible solutions to the problem—even solutions that aren’t likely to work.</li>

      <li class="nl">Evaluate each solution by listing the potential costs and benefits.</li>

      <li class="nl">Choose the best solution(s) to the problem.</li>

      <li class="nl">Develop a plan for implementing the solutions (for instance, decide what steps need to be taken to make the plan work).</li>

      <li class="nl">Solve the problem by carrying out the solution you have chosen.</li>

      <li class="nll">Evaluate the effectiveness of the solution. If the solution was not effective, repeat the problem-solving steps until you find a solution that works.</li>
    </ol>

    <p>Consider the following example. Imagine you are a manager in an office where you supervise several members of the clerical staff. One of your staff members has a tendency to arrive ten or fifteen minutes late for work almost every day. As the supervisor, you believe that lateness is unacceptable and are determined to address this problem. Start by defining the problem. In this case, the problem is that one of your staff is late every day and that lateness makes you angry. Note that the problem has two parts to it—the fact that the employee is late (and the effects of the lateness on his or her work) and your reaction to the person being late. In this example, the lateness is only a problem because it bothers you.</p>

    <p>Step 2 involves breaking down the problem into smaller problems, if necessary. However, in this case, the problem is relatively simple and doesn’t need to be broken down any further. Step 3 involves brainstorming possible solutions. For example, possible solutions include: fire the employee, only pay the employee for the time spent at work, ask the employee to make up the time later, completely relax your rules regarding lateness (in other words, decide that all lateness is okay), relax your rules somewhat regarding lateness (for example, decide that being up to ten minutes late for work is acceptable), or simply ignore the problem.</p>

    <p>Next, evaluate the costs and benefits of each solution. For example, one benefit of firing the employee is that you would no longer have to be angered by the situation. On the other hand, firing the employee might lead to a wrongful dismissal lawsuit, as well as making you feel very guilty and making your other staff members unhappy. Conversely, choosing the solution of somewhat relaxing the rules may work well. This solution will accommodate the employee’s morning schedule without really affecting productivity in any way. If the employee believes that you are flexible, he or she may be more inclined to work harder. A potential cost of this solution is that other staff may start to arrive late as well. Or perhaps if you give staff members permission to arrive ten minutes late, they will start arriving thirty minutes late.</p>

    <p>Once you evaluate the costs and benefits of each solution, you may find that none of the solutions is perfect. In the end, however, you will need to choose the best solution. If no solution seems potentially useful, take a break from the problem and come back to it later. Perhaps involving another individual in the problem-solving process will help. Another person may be able to generate solutions that were not obvious to you.</p>

    <p>Once you are able to choose one or more solutions that are likely to be effective, begin to develop a plan for implementing them. For example, if you decide to relax the rules regarding lateness so that being ten minutes late is acceptable, how will you implement the rule? Will you make an announcement to all staff about the new rule? Or will you wait until someone is more than ten minutes late to tell him or her about the new rule for acceptable and unacceptable lateness? When you have chosen a plan for action, carry it out as soon as possible. The longer you wait to solve the problem, the harder it may be to make the changes.</p>
