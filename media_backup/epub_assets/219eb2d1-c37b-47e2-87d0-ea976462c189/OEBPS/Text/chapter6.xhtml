    <p class="cn">Chapter 6</p>

    <h1 id="heading_id_2">Developing a Plan for Change</h1>

    <p class="paft">Before beginning to use the strategies for overcoming perfectionism, there are several steps that should be taken to prepare for change. In this chapter, we will help you examine the costs and benefits of becoming less perfect so you can assess whether you really are motivated to work on your perfectionism at this time. We will also help you identify specific goals for change, so you can choose exercises that will help you to reach those goals, and so you can judge whether you are making the improvements that you had hoped to make.</p>

    <p>In preparation for the process of change, we also discuss ways of choosing among the various treatment strategies in this book, as well as strategies for finding additional help if the techniques described in the book are difficult to implement on your own. The chapter concludes with a discussion of some possible obstacles to overcoming perfectionism and how to deal with them.</p>

    <h2 class="sigilNotInTOC" id="heading_id_3">Costs and Benefits of Lowering Your Standards</h2>

    <p class="paft">If perfectionism is a problem for you, chances are that the high standards you hold for yourself or others are long-standing and deeply ingrained. The thought of giving up these standards may be very frightening for a number of reasons. First, although you may be aware of your tendency to be perfectionistic, it may be difficult for you to determine which beliefs are overly perfectionistic and which standards are appropriate. If overcoming perfectionism involves lowering certain standards, you may be fearful of lowering the “wrong” standards.</p>

    <p>Second, you may be reluctant to relax your standards if you believe that your performance will suffer. For example, if you believe that it is very important to be on time for appointments and therefore you always allow an extra hour to get anywhere, you may be fearful of giving up this practice in case you end up being late for appointments in the future. If you tend to be very detailed in everything you do (for example, when giving people directions, writing memos, cleaning), you may be fearful that performing tasks in a less detailed way will lead to problems. People often believe that their perfectionistic standards keep everything in their life from falling apart. They fear that giving up perfectionistic standards will lead to chaos.</p>

    <p>A third reason why people are reluctant to become less perfectionistic is because they don’t want to seem inconsistent or wishy-washy to others. If you have spent a lot of time and energy trying to have others do things your way or trying to create a certain image of yourself, the thought of changing your expectations or image may feel threatening to you. It may be very difficult to admit that you may have been too strict, or even worse, that you may have been wrong. It’s ironic that most people admire others who can admit when they have made a mistake, yet it is often very difficult for us to admit our own mistakes.</p>

    <p>Before making the decision to become less perfectionistic, you should consider the possible costs and benefits of changing. For some standards and rules that you hold, the costs of changing may outweigh the benefits. For other standards, the benefits will outweigh the costs. Examining the costs and benefits of becoming less perfectionistic can help you to decide which standards to relax.</p>

    <p class="exh">Exercise 6.1 Determining Benefits and Negative Consequences of Loosening Perfectionistic Standards</p>

    <p class="paft">In your journal, list all the possible costs of becoming less perfectionistic. Examples may include: I will make more mistakes at work; I will be more anxious while I get used to the idea of being less rigid and perfectionistic; my level of performance at school may decrease; the level of performance of others around me may decrease; others may think I am incompetent; my home won’t be as clean and organized; I won’t be able to find anything; I will gain weight; and so on.</p>

    <p>Many of the possible costs that you list will be fairly unlikely to occur. So, in addition to listing these costs, you should estimate just how likely that outcome is. To estimate the likelihood of a particular negative consequence happening, use a scale ranging from 0 (definitely will not occur) to 100 (definitely will occur). An estimate of 50 means that a consequence is equally likely to occur as it is to not occur. Go back over your list and add a number estimating the likelihood that each consequence might come true.</p>

    <p>Now, list all the possible benefits of becoming less perfectionistic. Examples may include: I will be less hurtful and critical of the people in my family; people will enjoy spending time with me; I will have time to do more things; I will be less anxious about making mistakes; work will be more enjoyable; I will be less concerned about what other people think of me; my depression will decrease; and so on. As in the earlier section on costs of becoming less perfectionistic, you should also estimate the likelihood that each positive outcome or benefit will occur if you are able to decrease your perfectionistic thinking and behavior. Use a scale ranging from 0 (definitely will not occur) to 100 (definitely will occur). An estimate of 50 means that a benefit is equally likely to occur as it is to not occur.</p>

    <h2 class="sigilNotInTOC" id="heading_id_4">Identifying Goals</h2>

    <p class="paft">Before starting to overcome any problem, it’s important to define the problem and to identify goals. It’s not enough to say that you want to “become less perfectionistic.” The only way to evaluate whether your perfectionism has improved is to set specific goals. Remember—your goals should not be too perfectionistic! They should be realistic and achievable. Also, you should think about both long-term and short-term goals. Long-term goals may include changes that you want to make over the next year or even longer. Short-term goals may involve changes that you want to make over the next few days, weeks, or months.</p>

    <p>Although it is helpful to think of a few general goals, you should also try to come up with goals that are as specific as possible. For example, the goal, “I will be less critical of my children” is not as specific as the goal, “I will not criticize the clothes that my children wear to school.” The more specific the goal, the easier it will be to come up with strategies for reaching the goal. Below are some examples of general and specific goals.</p>

    <p class="exh">Exercise 6.2 Making Your Own General and Specific Goals</p>

    <p class="paft">Now, think about what types of changes you would like to make. Specifically, think about perfectionistic ways of thinking or behaving that you would like to decrease or stop all together. In your journal, make a list of short-term goals and long-term goals. For example, you can include goals for the next month, as well as goals for the next year. Of course, you may choose other time periods if you prefer. The main point to remember is that you may have different goals for the short term and the long term. Although some goals may be realistic targets for a year or two from now, they may not be realistic goals for one week or one month from now. In your lists, include general goals, as well as examples of specific goals that fall under each general goal.</p>

    <h2 class="sigilNotInTOC" id="heading_id_5">What to Change First: Setting Priorities</h2>

    <p class="paft">Now that you have identified thoughts and behaviors that you would like to change, the next step is figuring out where to start. There are two general principles to keep in mind when deciding which aspects of your perfectionism to work on first: which thoughts and behaviors cause the most interference in your life, and which thoughts and behaviors are likely to be the easiest to change.</p>

    <p>In most cases, it’s best to start with the problem that interferes the most in your life or causes the most problems with other people. By choosing to work on the most important goals first, your efforts will have the largest possible impact on your life in the shortest amount of time. This will likely have the effect of motivating you to continue to work on other aspects of your perfectionism. In addition, you should also consider which goals are easiest to meet. By choosing to work on goals that are very difficult to meet, you may end up becoming discouraged and give up before making any significant changes.</p>

    <p>Review the short-term and long-term goals that you listed earlier. Put them in order with respect to how important each goal is, as well as how attainable. We recommend beginning with the most impairing problem, but try to choose goals that you feel are manageable and realistic. If a problem seems too big and overwhelming, it will be necessary to break it up into smaller steps.</p>

    <p class="exh">Exercise 6.3 Choosing Your Priorities for Change</p>

    <p class="paft">In your journal, list the most important goals on which you plan to work. Ten or so goals is probably a good number to start with. List the goals in the order that you want to work on them. Note that the list may change as you begin working on these issues. You may decide that a particular goal is too difficult to work on right away. Or, a goal from the bottom of your list may become more important, depending on what else is happening in your life.</p>

    <h2 class="sigilNotInTOC" id="heading_id_6">How to Choose Among Specific Strategies</h2>

    <p class="paft">Chapters 7 and 8 describe many different techniques and exercises for overcoming perfectionistic styles of thinking and behaving. It is unlikely that you will want to use each of the methods listed. Because perfectionism affects different people in different ways, this book includes a broad range of strategies that are designed to be helpful for different people. When reading the next two chapters, it’s better to choose a relatively small number of techniques and to practice them frequently. Overcoming perfectionism requires learning new skills. If you attempt to use all of the techniques described in this book, you will probably not learn any of them well enough to use them effectively. On the other hand, if you choose a small number of strategies and practice them regularly, you are more likely to notice change.</p>

    <p>We recommend that you read through chapters 7 and 8 once, taking note of the techniques that seem most relevant to you and then rereading those sections. Also, you should choose strategies that are practical, given your lifestyle and your available resources. After trying several of the strategies described in these chapters, you will quickly discover which ones are likely to help you overcome your perfectionistic thoughts and behaviors. The main point to keep in mind as you begin to implement the strategies is that it’s better to do a few things thoroughly than to attempt to do everything suggested in this book.</p>

    <h2 class="sigilNotInTOC" id="heading_id_7">The Importance of Regular Practice</h2>

    <p class="paft">The strategies and exercises described in the remainder of this book will require regular practice. Ideally, you should expect to conduct some sort of practice almost every day. Although some of these practices may be quite brief, others may last up to several hours. Exercises will include such activities as completing diaries each time you experience perfectionistic thoughts, purposely making small mistakes until the thought of doing things imperfectly is less anxiety provoking, and eliminating perfectionistic behaviors such as excessive checking.</p>

    <p>In many cases, these practices will be exercises that you can integrate into your normal activities (for example, when talking to people, working, and so on), so they need not take up much time. For other exercises, you will need to set aside blocks of time to practice. To be most effective, practices should be regular, structured, and planned in advance. You should plan to practice regardless of whether you are in the mood when the scheduled time actually comes. Also, you should have a backup plan, in case a particular practice falls through.</p>

    <h2 class="sigilNotInTOC" id="heading_id_8">Involving Others in Your Practices</h2>

    <p class="paft">Because perfectionism involves other people, it may be important to include other people in your efforts to overcome perfectionistic thoughts and behaviors. There are several ways in which involving others can be helpful. First, by reading relevant sections of this book, people who are close to you will develop a better understanding of the causes of perfectionism and the methods for changing perfectionistic habits. This should help the people in your life to be more patient and understanding with you while you work on becoming less perfectionistic.</p>

    <p>Second, some of the exercises described in the remaining chapters of the book may be difficult to do alone and may depend on the cooperation of those around you. For example, if you want to become more comfortable with people in your family doing things differently than you do, you may want to make sure that your family members understand the purpose of the exercises and ask them if they are willing to assist the process by purposely doing things that you view as imperfect.</p>

    <p>Finally, it is likely that family, friends, and coworkers have found ways of working around your perfectionism or compensating for difficulties that you may have. For example, people who fear that you will be overly critical may avoid telling you about things that they have done. If you tend to be overly critical of your own behavior, people may avoid giving you feedback for fear of offending you. If you tend to avoid certain activities (such as cooking, paying bills, certain projects at work, and so on), for fear of making mistakes, other people in your life may be doing more than their share of these activities. If the people around you have changed their behavior because of your perfectionism, you may want to have them stop behaviors that make it easy for you to continue your perfectionistic habits, such as doing things for you or purposely trying to avoid saying anything that might trigger a perfectionistic response from you.</p>

    <h2 class="sigilNotInTOC" id="heading_id_9">When and How to Seek Professional Help</h2>

    <p class="paft">You may find that it is too difficult to overcome your perfectionism alone or with the help of your family or friends. It may be that your perfectionistic beliefs are too rigid and difficult to change on your own, or it may be that your anxiety is too intense to conduct the practices described in this book by yourself. Perhaps you have other difficulties such as depression or significant anxiety that interfere with your ability or motivation to work on your perfectionism. Or, perhaps you would benefit from working with another person, such as a therapist, to discuss problems that arise during treatment or to check on your progress. For many people, a trained professional can help in ways that go beyond what a book such as this can offer.</p>

    <p>There are several advantages of seeking help from a psychologist, psychiatrist, social worker, or other mental health professional. A trained professional can help to explain various concepts, explore the causes of a problem, be involved in practices, generate appropriate exercises and practices, help solve problems that arise, and help to improve motivation. In addition, a therapist may be qualified to treat the problems that often go together with perfectionism, including anxiety disorders, eating disorders, anger, and depression. A psychiatrist, family doctor, and some psychologists can also prescribe medications that may be helpful for problems with anxiety and depression, as well as the perfectionism that can accompany these problems.</p>

    <p>If you are interested in seeking professional help, there are several places to look for a therapist or doctor. A good place to start is with your family physician. He or she may know of other professionals who can help. Most therapists who are experienced with problems such as anxiety and depression are likely to be able to help with your perfectionism. If you suffer from a particular anxiety disorder, depression, or another specific problem, there may also be clinics in your area that specialize in your problem. Some specialty clinics (particularly research and training clinics associated with universities) offer services at reduced costs. In the third section of this book, the chapters describe the types of treatments that have been shown to be effective for particular problems. Because there are so many different types of therapies available, it will be helpful for you to have an idea of the type of treatment that you are seeking.</p>

    <p>Another place to get information on treatment options is through national organizations that offer referrals to consumers. An example is the Anxiety Disorders Association of America in Silver Spring, Maryland, which has a comprehensive Web site, including referrals to professionals who can help. Additional information on where to obtain treatment is available on the Web site for the National Alliance on Mental Illness (<a href="http://www.nami.org">www.nami.org</a>).</p>

    <h2 class="sigilNotInTOC" id="heading_id_10">Obstacles to Becoming Less Perfectionistic</h2>

    <p class="paft">In order to maximize your chances of making positive changes as you start the process of overcoming your perfectionism, it will be helpful to anticipate any obstacles that might get in the way of your success. By preparing for possible roadblocks in advance, you will be less likely to be affected by these potential difficulties.</p>

    <p class="bh">If You’re Unable or Unwilling to Consider Alternative Ways of Thinking</p>

    <p>As we discussed previously, there are three reasons why it’s often difficult to change ways of thinking, even when your beliefs get in the way of life. First, the natural tendency is to assume that your thoughts are true. In other words, if you are like most people, your beliefs may be ingrained and difficult to change. Second, if you come across information that disproves your beliefs, you probably tend to view it as an exception, or even worse, you ignore the information. Instead, people tend to pay more attention to information that confirms their beliefs. Finally, even when you do begin to doubt whether a belief is true, you may still do everything you can to avoid admitting that you have made a mistake. Perfectionistic thinking is especially prone to being rigid and difficult to change. In order to become less perfectionistic, you will need to be able to make a commitment to consider the possibility that particular beliefs are not true and that particular standards are not helpful. The fact that you are reading this book suggests that you’re aware that perfectionism is a problem for you, and this awareness is the first step toward being willing to consider the possibility of changing your perfectionistic thoughts.</p>

    <p class="bh">If You Feel That Perfectionism Isn’t Causing Significant Problems for You</p>

    <p>You may feel that perfectionism is not a big enough problem to warrant spending all the time and energy needed to change your perfectionistic thoughts and behaviors. In fact, the benefits of having high standards may outweigh the costs. If this is the case, you may not want to invest too much in the strategies described in this book. Even if you feel this way, it is also possible that your high standards do cause problems of which you are unaware. For example, perhaps your perfectionism has negative effects on those who are close to you. Before assuming that your perfectionism is not a problem, you may want to get a second opinion from someone who knows you well.</p>

    <p>Even if perfectionism is currently a problem, you may find that as you practice the exercises in this book, your perfectionism gradually interferes less and less. As the problem starts to be less impairing, your motivation to work on it may decrease. You may start to think, “Why bother spending all that time and effort on the problem if it isn’t bothering me anymore?” It is important to continue to work on your perfectionism even when it starts to improve. This perseverance will help to build on the gains that you have made. Also, continuing to use the strategies in this book will help to prevent the problem from getting worse again in the future (for example, during a stressful time in your life).</p>

    <p class="bh">If You Don’t Believe That You Can Change</p>

    <p>Because perfectionism is part of your personality, you may feel as though becoming less perfectionistic is beyond the realm of possibility. You may believe that it is impossible to change a person’s personality. If you hold this belief, it may be helpful to remember that your personality is really just the sum of your beliefs, attitudes, and behaviors. Breaking perfectionism down into its parts will make it easier to make changes. On a cautionary note, remember that just having the belief that you cannot change may have a negative impact on your likelihood of making changes. Researchers have shown consistently that people’s expectations have an effect on whether they respond positively to therapy, medication, and other medical interventions. Therefore, it will be helpful if you can be open-minded and optimistic until you have had a chance to see whether the strategies described in this book are likely to be effective for you.</p>

    <p class="bh">If You Feel There Are Too Many Other Things Going On in Your Life</p>

    <p>You may find that there are other stresses or demands on your time that interfere with your ability to put forth the necessary effort for overcoming your perfectionism. Perhaps you are dealing with extreme stress at work or a serious problem in your relationship. Or perhaps you are suffering from another difficulty (for instance, excessive alcohol use, severe depression, or a serious medical problem). Or maybe you are just too busy with work, school, or taking care of your family. If this is the case, now may not be the best time to begin working on your perfectionism. If your effort is only halfhearted, you may only see a modest improvement. You may need to decide whether it’s worth beginning to overcome your perfectionism now or if it would be best to wait until you can devote more time and energy to the problem. On the other hand, if your life is always stressful and busy, now may be as good a time as any.</p>

    <p class="bh">If You Are Too Anxious to Practice</p>

    <p>Many of the exercises described in this book are anxiety provoking. They involve purposely relaxing rules and standards for how things “should” be. For example, if you are overly concerned with being neat and clean, you may need to purposely leave things messy and purposely come into contact with things that are “dirty.” The thought of allowing your standards to be lowered may be terrifying. You may fear making mistakes or having things fall apart. This fear is common among people who are using cognitive and behavioral strategies to overcome a problem. To deal with the anxiety, you need to remember that it will pass. With repeated practices, the strategies described in this book will be less scary. In fact, you will become more and more comfortable letting go of your perfectionistic thoughts and behaviors as you work.</p>
