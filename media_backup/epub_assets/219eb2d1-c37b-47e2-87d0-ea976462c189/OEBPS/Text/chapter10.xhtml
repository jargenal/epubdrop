    <p class="cn">Chapter 10</p>

    <h1 id="heading_id_2">Perfectionism and Depression</h1>

    <h2 class="sigilNotInTOC" id="heading_id_3">The Nature of Depression</h2>

    <p class="paft">You have probably experienced a period of sadness or depression following a significant loss in your life. Perhaps it was following the breakup of a relationship, death of someone close to you, loss of a job, or inability to achieve some goal. For most people, losses such as these tend to trigger periods of sadness, depression, or grieving. Most people also experience sadness from time to time, even in the absence of a significant loss. They may feel overwhelmed with work, hurt by the behavior of a significant person in their lives, or lonely for no particular reason. Sadness and depression are universal emotions.</p>

    <p>Although sadness is a normal experience for all people, sometimes feelings of depression can be so intense or chronic that they begin to interfere with a person’s ability to enjoy life or function in his or her environment. The severity of depression (for example, the intensity, frequency, and impact of feeling sad) is on a continuum from very mild to very severe. Although this chapter is written for people who experience a level of depression that interferes with their lives, people who experience depression at mild levels may still find the information helpful, particularly if their depressed feelings are related in part to not meeting their own expectations for themselves or for other people.</p>

    <p class="bh">Normal Feelings of Sadness</p>

    <p>Psychologist Sidney Blatt and his colleagues have identified three components of normal depressed mood: dependency, self-criticism, and inefficacy (Blatt, D’Afflitti, and Quinlan 1976). Although these components are present in normal depressed mood, they also tend to be present in clinical depression, often at a much greater intensity.</p>

    <p class="ch">Dependency</p>

    <p>Dependency is the perception of needing help and support from other people. When people are feeling sad, they tend to want to be around other people. So, after doing poorly on an exam or receiving a poor evaluation at work, you may feel inclined to go out with friends or to spend a quiet evening at home with your family or your partner. Or, when feeling sad, you may be inclined to phone a close friend just to talk. Of course, not everyone responds this way when feeling down. Some people may isolate themselves when feeling sad, particularly if the depression is more severe. Even so, there still may be a perception of helplessness and a desire for support from other people.</p>

    <p class="ch">Self-Criticism</p>

    <p>Self-criticism is a tendency to exaggerate one’s faults. A number of researchers have demonstrated a phenomenon known as <em>state-dependent memory</em>. In general, when people are in a particular emotional state (for example, feeling sad), they are more likely to recall previous periods when they felt the same way, as well as past events that are consistent with their low mood. For example, if you are feeling sad following the breakup of a relationship, you may tend to remember all of the problems with your previous relationships. You may also exaggerate all of your own shortcomings that you believe contributed to the breakup. Similarly, if you’re feeling sad about doing poorly on a task at work, you may dwell on all the ways that you don’t measure up to your coworkers’ performances or to your own standards.</p>

    <p class="ch">Inefficacy</p>

    <p>Inefficacy is a sense that important events are independent of your actions. In other words, you may believe at times that no matter what you do, you cannot influence the outcome of events (for example, being rejected by other people, losing close people in your life, doing poorly in school, having financial problems, or experiencing other significant life stresses). This feeling of helplessness or a lack of control often goes along with feeling sad or depressed.</p>

    <p>Although sadness is a normal part of life for everyone, some people experience levels of depression that interfere with their ability to function properly at work, at home, or in their relationships. When depression is severe enough to cause significant impairment, it is often referred to as <em>clinical depression</em>.</p>

    <p class="bh">Clinical Depression</p>

    <p>Researchers and clinicians in the mental health field have identified a number of specific problems (collectively known as <em>mood disorders)</em> that are defined in part by the presence of depression. In this chapter, we limit our discussion to two of these disorders that are most often associated with perfectionism. These are major depressive disorder and dysthymic disorder.</p>

    <p class="ch">Major Depressive Disorder</p>

    <p><em>Major depressive disorder</em> is a mood disorder in which an individual has experienced one or more major depressive episodes. A <em>major depressive episode</em> is a period lasting at least two weeks in which a person consistently experiences depressed mood or a loss of interest in almost all of his or her normal activities. In addition, the person experiences several additional symptoms, which may include changes in weight or appetite, changes in sleep, feeling very restless or very slowed down, loss of energy, feelings of worthlessness or excessive guilt, poor concentration or difficulty making decisions, and thoughts about death or suicide (American Psychiatric Association 2000).</p>

    <p>Although major depressive episodes are defined as lasting at least two weeks, they more typically last up to several months. The average age at which major depressive disorder begins is in the mid-twenties, although the problem can begin at any age, including during childhood. Some people experience only a single episode of major depression, perhaps triggered by a stressful life event. For others, depression may be long lasting or may be associated with a series of briefer episodes. For people who experience more than one major depressive episode, mood may return back to normal between episodes, or there may still be some minor symptoms of depression left over after the full-blown episode has improved.</p>

    <p class="ch">Dysthymic Disorder</p>

    <p>People with <em>dysthymic disorder</em> experience sadness and depression over a longer period, and usually at a milder level relative to people with major depressive disorder. Technically, to receive a diagnosis of dysthymic disorder, a person must experience a period of two years or longer in which he or she feels sad or depressed most of the day, on most days. Although the minimum duration is two years, people with dysthymic disorder often report having felt down and blue for many years. In addition to the low mood, people with dysthymic disorder must experience at least two additional symptoms, which may include changes in appetite, changes in sleep, low energy, poor self-esteem, poor concentration or difficulty making decisions, and feelings of hopelessness.</p>

    <p>As you can see, major depressive disorder and dysthymic disorder share many features. Nevertheless, there are important differences. Major depressive disorder is typically associated with discrete episodes, whereas dysthymic disorder is generally more long lasting. Second, a major depressive episode must be associated with depressed mood or loss of interest (in addition to the other associated symptoms) day after day for the required period of two weeks or longer. In contrast, people with dysthymic disorder do not necessarily feel down every day—just most days. Finally, the intensity of the depression tends to be much worse in major depressive disorder than in dysthymic disorder.</p>

    <h2 class="sigilNotInTOC" id="heading_id_4">Causes of Depression</h2>

    <p class="paft">If you have had significant problems with depression, you may have had one professional or another tell you that your depression is caused by a chemical imbalance in your brain, problems in the way your parents brought you up, genetics, or any number of other factors. Despite the many different theories that have been proposed to explain depression, we don’t really know <em>the</em> cause of depression. In fact, it now seems that depression is caused by many different factors and that different people may experience depression for different reasons. Although researchers are beginning to get a clearer understanding about the variables that contribute to depression, they still cannot determine the cause of depression for any one person. However, the problem does seem to be due to a complex interaction of both biological and psychological processes.</p>

    <p class="bh">Biological Factors</p>

    <p>Depression is very much influenced by our biology, including our genetic makeup, brain chemistry, and other factors. We’ll discuss the role of biology in depression in this section.</p>

    <p class="ch">Genetics</p>

    <p>A number of studies have demonstrated that depression runs in families (Sullivan, Neale, and Kendler 2000). For example, averaging across studies, a person is up to three times more likely to suffer from major depressive disorder if he or she has a parent who suffers from the problem than if there is no depression in the immediate family. Of course, the fact that depression runs in families does not, in and of itself, mean that depression is inherited genetically. It could be that depression is learned from growing up in a home with other people who are depressed. To demonstrate a genetic basis for a problem such as depression, scientists must turn to twin studies, adoption studies, and studies that directly measure the presence and absence of genes that are believed to be related to depression. In general, there is some evidence, particularly from twin studies, that depression is in part genetically based (Sullivan, Neale, and Kendler 2000). However, the evidence from other genetic research methods has been mixed. Although genetics may be important in the development of depression for some individuals, it should be pointed out that depression is not inherited in the same way as traits (for instance, eye color). Genetics may predispose people to develop depression, but it is no guarantee. Even in pairs of identical twins (who are genetically identical), it is not unusual for one twin to experience depression and the other one to be free of it.</p>

    <p class="ch">Neurotransmitters</p>

    <p>Many studies have examined the relationship between neurotransmitter levels and depression (Stahl 2008). <em>Neurotransmitters</em> are chemicals in the brain that are responsible for sending messages from one nerve cell to another. In general, the neurotransmitter model of depression that has obtained the most support suggests that depression is associated with low levels of <em>serotonin</em> and/or <em>norepinephrine</em>. Neurotransmitter models of depression are based in part on the fact that medications that raise levels of these substances seem to improve depression. In addition, there is other evidence supporting a role for these transmitters in depression. However, the relationship between neurotransmitters and depression is complex, and doctors cannot simply measure how much serotonin or norepinephrine there is in the brain to see if there is an imbalance.</p>

    <p class="ch">Other Biological Factors</p>

    <p>Numerous other biological processes are thought to be involved with depression in some people (Thase, forthcoming). Hormonal levels probably play a role in some types of depression. In addition, abuse of alcohol and other drugs can increase a person’s likelihood of developing depression. Finally, factors such as the amount of exposure to sunlight and even sleep patterns may have an effect on depressed mood.</p>

    <p class="bh">Psychological Factors</p>

    <p>Many studies have shown that psychological factors are important in the development and maintenance of depression. For example, various life stresses (for example, physical or sexual abuse, divorce, unemployment) may put certain people at risk for depression. Also, a person’s style of thinking can increase his or her chances of feeling depressed. One of the most influential psychological theories of depression describes how thinking contributes to feeling depressed. This model, proposed by Dr. Aaron Beck and colleagues (1979), is known as the <em>cognitive theory of depression</em>. Beck proposed that depression is associated with a tendency to think negatively about the <em>self</em> (for instance, “I never seem to achieve anything I set out to do”), the <em>world</em> (for example, “Nobody cares about me”), and the future (thoughts such as, “Things will never improve”). In addition to these three types of thinking, Beck also emphasized the role of other negative beliefs (for example, “I have to be perfect”) and tendencies to interpret situations in a negatively biased way.</p>

    <p>There are other psychological theories of depression as well, several of which overlap considerably with Beck’s approach, in that they propose that thoughts and interpretations play an important role in maintaining depression. You may wish to review chapter 3 regarding the role of thoughts in perfectionism. Many of the thoughts and beliefs that contribute to perfectionism are relevant to depression as well.</p>

    <h2 class="sigilNotInTOC" id="heading_id_5">Perfectionism and Depression</h2>

    <p class="paft">Recall from chapter 1 the three types of perfectionism: self-oriented perfectionism (a tendency to set unreasonably high standards for one’s own behavior), other-oriented perfectionism (a tendency to demand that others meet your unrealistically high standards), and socially prescribed perfectionism (the belief that others have impossible standards, and that you must meet these standards in order to win their approval).</p>

    <p>Researchers have examined the relationship between these types of perfectionism and the symptoms of depression and have reported a number of interesting findings:</p>

    <ul>
      <li class="ulf">People with high levels of perfectionism (particularly self-oriented perfectionism and socially prescribed perfectionism) are at a greater risk of experiencing depression than nonperfectionists, especially during periods of stress (for example, at school, work, and in their relationships) and after experiencing failure (Hewitt and Flett 1990; 1993). For example, people who operate with a high level of ­perfectionism may be susceptible to depression at a time when they have a lot of tests at school, especially if they don’t do as well on some of these tests as they would have liked.</li>

      <li class="ul">Self-oriented perfectionism increases the risk that a depressed individual will continue to feel depressed a year later if the person is under high levels of stress related to his or her work or school, but not if stress is more focused on his or her relationships (Enns and Cox 2005).</li>

      <li class="ul">Socially prescribed perfectionism is associated with feelings of helplessness and hopelessness, both of which have been shown to be components of depression (Hewitt and Flett 1993).</li>

      <li class="ul">Perfectionism appears to be related to other specific aspects of depression, such as tendencies to think negatively about oneself (Flett et al. 2003; Rudolph, Flett, and Hewitt 2007) and to believe that important events are independent of one’s actions (Hewitt and Flett 1993).</li>

      <li class="ull">Although it is normal for depression to improve over time (even without treatment), perfectionism tends to remain stable over time (Cox and Enns 2003).</li>
    </ul>

    <p>In these ways, perfectionism can put people at risk for developing depression, particularly if the person has experienced certain life stresses or failures. The relationship between perfectionism and depression is not surprising. Perfectionism is the tendency to set unrealistically high standards. Because these standards are unlikely to be met, a person who holds such high standards is bound to fall short of meeting them. Frequent experiences of failure can make a person feel helpless and inadequate and may eventually make a person feel hopeless about things ever improving. Therefore, if perfectionism and depression are both problems for you, you may find that learning to accept lower standards helps you to feel less depressed.</p>

    <h2 class="sigilNotInTOC" id="heading_id_6">Treatments for Depression that Are Supported by Research</h2>

    <p class="paft">Depression can be effectively treated using a number of approaches. In this section, we discuss three of these, including cognitive behavioral therapy, interpersonal psychotherapy, and medications.</p>

    <p class="bh">Cognitive Behavioral Therapy</p>

    <p>Chapters 7 and 8 discuss many of the components of cognitive behavioral therapy (CBT) in detail, so we will only provide a brief recap here. Basically, the “cognitive” part of CBT refers to techniques used to help people change their negative and unrealistic beliefs, attitudes, and expectations. These techniques include teaching people to identify their negative beliefs, examine the evidence supporting and refuting their beliefs, and engage in small experiments to test out the validity of their beliefs. Behavioral strategies are designed to change behaviors that maintain negative feelings and thoughts. These may include exposure to situations that are anxiety provoking, role playing or practicing difficult interactions that are likely to come up in the future, and learning to communicate more effectively.</p>

    <p class="bh">Interpersonal Psychotherapy for Depression (IPT)</p>

    <p>Interpersonal psychotherapy for depression (IPT) is one of the few psychological treatments other than CBT that has consistently been shown to be effective for depression (Weissman, Markowitz, and Klerman 2000). This approach to treatment is based on the premise that depression stems from problems in interpersonal relationships. Treatment usually lasts fifteen to twenty sessions and tends to be focused on one or more of the following areas of interpersonal functioning: <em>interpersonal role disputes</em> (for example, problems adjusting to the demands of a particular social role, such as being a father, employee, daughter, and so on), <em>interpersonal losses</em> (such as the loss of a close friend or relative), <em>interpersonal deficits</em> (for example, difficulty communicating effectively with your spouse), and <em>interpersonal role transitions</em> (things like difficulty coping with life changes such as graduation, divorce, retirement, and so on). In studies comparing IPT to medication and CBT, IPT appears to be as effective as these other approaches (Craighead et al. 2007).</p>

    <p>All of the medications listed in the table are associated with side effects, which may include such symptoms as dry mouth, headache, dizziness, upset stomach, sexual difficulties, weight gain, insomnia, or other symptoms, depending on the medication. Some antidepressant medications may interact with other prescription medications, over-the-counter medications, alcohol, illegal and recreational drugs, or even certain foods (in the case of MAOI antidepressants). We recommend that you discuss possible side effects and drug interactions with your doctor if you are interested in trying an antidepressant (or any medication, for that matter). Although side effects are relatively common, many people are able to tolerate antidepressant treatment with no side effects. Furthermore, when side effects do occur, they are often mild and tend to improve with time or adjustment of the dosage. Nevertheless, in rare cases, some medications may be associated with more severe side effects. Ask your doctor about the side effects of any specific medication that he or she recommends.</p>

    <p>With such a long list of available antidepressants, how does one choose one antidepressant over another? There are several factors that come into play. The first is effectiveness. Your doctor should recommend a medication that has been shown to be effective for your pattern of symptoms. Second, your doctor should take into account the side-effect profile of the medication as well as possible effects on medical ­conditions that you may have. Third, your doctor should consider possible interactions with other medications that you may be taking, as well as interactions with alcohol and other drugs that you may use occasionally. Fourth, the cost of the pills varies from medication to medication. If cost is an issue (for example, if you don’t have a drug plan), you should mention it to your doctor. Finally, the decision of which medication to use should be influenced by your past responses to particular medications. If one medication was effective and well-tolerated in the past, it might make sense to try it again. If you have a history of not responding to an adequate dosage of a medication in the past, perhaps this time you should try a different medication.</p>

    <p>If a particular medication does not work for you, don’t give up. First, you should make sure you are on an adequate dosage. Doctors are often concerned that patients will be unable to tolerate the specific medication, so the initial recommend dosages are often too low to be effective. If you are able to tolerate the medication, the dose will usually be increased over the first few weeks of use to a dose likely to be effective. If you’re not sure whether you are on an adequate dosage, obtain a second opinion from another family doctor or psychiatrist. Second, antidepressants take a few weeks to work. It’s not uncommon for people to take these medications for up to six or even eight weeks before noticing any benefit. Third, if a particular medication does not work for you, there are other options. There may be another medication that is effective for you, or you may benefit from a psychological treatment such as CBT or IPT. Finally, it is possible to boost the effects of some antidepressants using other medications such as lithium carbonate. Lithium is normally used to treat bipolar disorder or manic depression (a problem in which people experience both extreme highs and lows in mood). However, when used in conjunction with an antidepressant, lithium has been shown for some people to improve upon the benefits achieved by an antidepressant alone (Thase et al. 2007).</p>

    <p class="bh">Electroconvulsive Therapy</p>

    <p>Electroconvulsive therapy (ECT) is often administered after all other treatments for depression have been attempted and failed, unless the person is very seriously ill, in which case it may be recommended as an initial treatment. ECT is still very controversial and is often discussed in a negative light by the media. Today, ECT is very different than the way it has been portrayed in movies such as <em>One Flew Over the Cuckoo’s Nest</em>. The procedure is done under anesthetic and involves inducing stimulation of the brain by delivering a shock to the brain lasting less than a second. The seizures that used to be triggered during ECT are now suppressed by the use of muscle relaxants. The main side effect of ECT is confusion and loss of short-term memory that lasts for about a week or two. Despite these side effects, many individuals who do not respond to medications may find ECT to be effective for depression (Mathew, Amiel, and Sackeim 2005).</p>

    <p>A more recent development is Transcranial Magnetic Stimulation, which uses magnetic waves to stimulate the brain while the person remains fully conscious. This treatment is done as an outpatient procedure, as is ECT, and people go home or on to their workplace after the session.</p>

    <h2 class="sigilNotInTOC" id="heading_id_7">How to Change Perfectionistic Thinking and Behavior in Depression</h2>

    <p class="paft">For a detailed review of all the strategies for overcoming perfectionism, see chapters 7 through 9. In this section, we will highlight some of the techniques that may be helpful for you if you suffer from depressed mood or if you tend to feel down when your expectations are not met.</p>

    <p class="bh">Changing Perfectionistic Thoughts that Contribute to Depression</p>

    <p>You may recall from chapter 7 that we recommend following five steps for changing perfectionistic thoughts: identifying perfectionistic thoughts, listing more reasonable alternative thoughts, reassessing the advantages and disadvantages of the original thoughts and the alternative thoughts, and choosing a more realistic or helpful way of viewing situations. In addition, we suggest a variety of specific techniques that can be helpful for changing perfectionistic thoughts. Several of these will be particularly helpful for individuals who tend to feel sad or depressed. These include: examining the evidence, taking another perspective, compromising with yourself, hypothesis testing, changing your social comparison habits, and looking at the big picture. Others may be helpful as well, so it is worth looking over the material in chapter 7 for further possibilities.</p>

    <p>In the case of depression, you should pay particular attention to depressive beliefs about yourself, such as beliefs that you are worthless, incompetent, or generally deficient in some way. If you hold these beliefs, you may find it helpful to think carefully about what these labels mean. Sometimes, attempting to define labels such as “worthless” and “incompetent” will lead you to realize that these words do not really capture who you are (or who anyone is, for that matter). Consider the following therapy vignette. In this vignette, the therapist uses the strategy of taking another perspective to help Jonathon to evaluate his own worth using the same criteria that he uses to judge other people.</p>

    <p class="diaf">Jonathon: Most days, I feel completely worthless. I just sit around the house and nothing seems to get done.</p>

    <p class="dia">Therapist: Let’s look at the word “worthless.” Exactly what does that word mean to you?</p>

    <p class="dia">Jonathon: Well, I suppose that a worthless person is someone who doesn’t contribute to society and doesn’t do anything—someone like me.</p>

    <p class="dia">Therapist: Can you think of anyone else who you would describe as worthless?</p>

    <p class="dia">Jonathon: Actually, no. I can’t.</p>

    <p class="dia">Therapist: If you were to meet someone else who is worthless, how would you know it?</p>

    <p class="dia">Jonathon: I don’t really think of other people as being worthless.</p>

    <p class="dia">Therapist: What if you met a person who, like yourself, was unemployed and not spending time with friends? Would you consider that person to be worthless?</p>

    <p class="dia">Jonathon: Not at all. If anything, I would feel for that person.</p>

    <p class="dia">Therapist: It seems that you have different standards for yourself than you do for other people. Is it possible to change your view of yourself to match the view that you might have of another person who is similar to you?</p>

    <p class="dial">Jonathon: I guess it’s possible that I’m not worthless, although I still believe that there are lots of things in my life that need to change.</p>

    <p>Here is another therapy vignette that illustrates how a therapist helps Andrea to change social-comparison strategies that may contribute to her depressed feelings:</p>

    <p class="diaf">Andrea: My daughter’s report card just arrived, and it was just average. To make things worse, my nephew is doing very well in school. I know my brother is going to tell me about my nephew’s report card, and I’m going to feel terrible.</p>

    <p class="dia">Therapist: Why will you feel terrible?</p>

    <p class="dia">Andrea: My daughter should be doing at least as well as my nephew. I feel that her report card reflects badly on me.</p>

    <p class="dia">Therapist: How do your nephew’s grades compare to everyone else’s in the class?</p>

    <p class="dia">Andrea: He is always at the top of the class. That just makes it worse.</p>

    <p class="dia">Therapist: What effect does it have to compare your daughter’s report card to that of the top student in the class?</p>

    <p class="dia">Andrea: It makes me feel miserable.</p>

    <p class="dia">Therapist: People can be measured in many different dimensions, including physical appearance, intelligence, artistic talent, physical fitness, aptitude for sports, knowledge of particular topics, physical health, income, school performance—and the list goes on and on. In fact, each of these dimensions can be subdivided into other dimensions. For example, physical appearance includes such things as height, weight, hair color, complexion, and so on. Each of us performs well in some of these dimensions. In other dimensions, we may perform poorly, compared to most people. However, in most dimensions, we tend to be somewhere in between—in other words, average.</p>

    <p class="dial">Andrea: Now that you mention it, there are lots of ways in which my daughter really outshines my nephew. He just studies all the time, but my daughter has lots of outside interests and is quite good at sports.</p>

    <p>In addition to changing negative thoughts about yourself, you should also examine your negative thoughts and absolutes about the world (for instance, “People should always be interested in what I have to say”) and about the future (for example, “I will never find a relationship that makes me happy”). Not only are thoughts such as these usually untrue, but they also contribute to feelings of depression.</p>

    <h2 class="sigilNotInTOC" id="heading_id_8">Changing Perfectionistic Behaviors that Contribute to Depression</h2>

    <p class="paft">A number of strategies may be helpful for dealing with perfectionistic behaviors that are associated with depression. Exposure exercises designed to disprove perfectionistic beliefs can reduce the intensity of these beliefs. Exposure can help reduce depression in other ways as well. Often, when people are feeling depressed, they tend to become socially withdrawn and uninterested in their usual hobbies and activities. Therefore, they begin to avoid doing things because they believe that they are unlikely to enjoy themselves. The net result of the avoidance, however, is to decrease the person’s enjoyment of life, thereby contributing to the depression and the lack of motivation to do things. Exposure can have the effect of breaking that cycle. By forcing yourself to do things that normally are interesting to you, chances are that you may enjoy them more than you might expect. Going places and doing things, despite not having the energy or interest in being active, may help to increase your interest in doing things over time. For more details on how to conduct exposure practices, see chapter 8.</p>

    <p>In addition to exposure, several of the other behavioral strategies discussed in chapter 8 may be helpful. For example, if you tend to have difficulty communicating directly and assertively when you’re feeling down, you may find some of the suggestions regarding assertive communication helpful. In addition, procrastination can often be a problem for people who are feeling depressed. Check out chapter 8 for methods of overcoming procrastination.</p>
