    <p class="cn">Chapter 8</p>

    <h1 id="heading_id_2">Changing Perfectionistic Behaviors</h1>

    <h2 class="sigilNotInTOC" id="heading_id_3">Why Change Perfectionistic Behaviors?</h2>

    <p class="paft">Perhaps the most effective method of overcoming perfectionism is to change the behaviors that help to keep your perfectionistic beliefs, attitudes, and predictions alive. If you have a tendency to set very high standards for yourself or others, you probably use some of the behaviors discussed in chapter 4, either to ensure that your standards are met or to avoid situations that force you to confront your high standards. Examples of perfectionistic behaviors include overcompensating by doing much more than is necessary to deal with a situation, unnecessary checking and reassurance seeking, repeating behaviors, excessive organizing and list making, procrastination, failure to delegate tasks to others, and avoidance of anxiety-provoking situations.</p>

    <p>Behaviors associated with perfectionism help to maintain the problem. By engaging in these behaviors, you prevent yourself from testing out and disproving your perfectionistic thoughts. In other words, continuing to behave like a perfectionist makes it difficult to stop thinking like a perfectionist. For example, if you believe that only by checking and rechecking your work can you maintain your high standards, the act of repeatedly checking your work will prevent you from ever finding out whether that belief is true.</p>

    <p>Similarly, procrastinating on a project because you are worried about not being able to do an adequate job prevents you from ever finding out whether that prediction is true. In fact, procrastination often makes it more difficult to perform well because, in the end, you have less time and are under more pressure. Therefore, procrastination can end up confirming your anxiety-provoking beliefs about not being able to do a job well.</p>

    <p>In small amounts, the behaviors we are describing as perfectionistic can be helpful. For example, proofreading an important report <em>once or twice</em> is likely to improve the quality of your work. Putting off an unpleasant task <em>for a short time</em> may give you the necessary break you need to tackle the job later. On the other hand, overdoing these behaviors is likely to cause problems. For example, excessive checking gives you less time to do other things and may even increase your anxiety. Correcting other people too often may lead them to feel inadequate or angry with you for not trusting them. Including too much detail in your conversations with other people can lead the other person to become bored and to start daydreaming—therefore missing much of what you are trying to say.</p>

    <p>Changing the behavior patterns that are associated with your perfectionism is a key step toward overcoming the problem. The strategies described in this chapter are especially important for people who have difficulty identifying or changing specific thoughts using the cognitive strategies discussed in chapter 7. The techniques in chapter 7 involve trying to change thoughts by examining the evidence for and against them and by trying to replace negative thinking patterns with more realistic beliefs. In contrast, the behavioral strategies discussed in this chapter change beliefs directly by providing new learning experiences that disprove the thoughts. Therefore, changing perfectionistic behaviors leads to automatic changes in perfectionistic thoughts.</p>

    <h2 class="sigilNotInTOC" id="heading_id_4">Strategies for Changing Perfectionistic Behaviors</h2>

    <p class="paft">In this section, we discuss a range of strategies that are effective for changing your perfectionistic behaviors. We’ll begin with exposure, which involves directly confronting the situations that make you uncomfortable.</p>

    <p class="bh">Exposure-Based Strategies</p>

    <p>For the past few decades, therapies based on exposure have been used to treat anxiety problems such as social anxiety and obsessive-compulsive disorder and, to some extent, other problems such as depression and eating disorders. Basically, <em>exposure</em> involves confronting a feared object or situation over and over again until the fear decreases. For people who fear driving, we encourage them to practice driving initially in safe settings until the discomfort subsides. For people who fear heights, we have them encounter increasingly high places until they no longer experience significant fear. Exposure is the best strategy to use for dealing with situations that trigger intense negative reactions, such as fear or anger. Similarly, exposure can be especially helpful for people who avoid situations because of their perfectionism.</p>

    <p>Exposure is a very powerful strategy for dealing with unrealistic fears. In the case of certain phobias, such as animal phobias, most individuals are able to overcome their fear in a matter of hours (Antony et al. 2001; Rowa, McCabe and Antony 2006). For other fears, changes often take longer, but still a considerable percentage of people benefit from exposure-based treatments (Moscovitch, Antony, and Swinson, 2009). In our experience, exposure is also very useful for dealing with perfectionism, which is often associated with a fear of being imperfect or failing to meet some goal or standard. In dealing with perfectionism, exposure involves purposely allowing oneself to repeatedly encounter “imperfect” situations that cause anxiety, frustration, or discomfort, until they are no longer a problem.</p>

    <p>The effects of exposure on fear and anxiety are universal. Even animals appear to become less anxious after repeated exposure to a frightening situation. For example, a new puppy may be fearful of strangers or of walking near busy streets. With repeated exposure, however, these situations become easier. In our experience, even spiders respond to exposure. When we work with people who are phobic of spiders, we encourage them to confront spiders by being near them and eventually touching them. Not only do our clients become less fearful of the spiders, but the spiders seem to become less fearful of our clients. By the end of the treatment session, the spider is much less likely to run away, compared to the beginning of the session.</p>

    <p>In order to use exposure as a treatment for perfectionism, you must first identify situations that make you uncomfortable and then create exposure practices to target those particular situations. Later in this chapter, we describe exactly how to conduct exposure practices for ­particular situations that may occur.</p>

    <p class="bh">Why Exposure Works</p>

    <p>Exposure is based on the premise that people can get used to almost anything if they are given enough time. For example, people who go camping in the wilderness (as well as contestants on the TV show, <em>Survivor</em>) get used to being dirty if they don’t have access to running water for a shower or bath. During war, people may even get used to the sound of bombs going off in nearby neighborhoods.</p>

    <p>There are several different explanations for why exposure works. One of the most compelling theories is based on a cognitive model. From a cognitive view, exposure works by changing a person’s beliefs about the feared situation. In other words, after repeated experiences in the feared situation, the person gradually learns that nothing bad is going to happen and eventually comes to see the situation as nonthreatening and safe. In the case of perfectionism, exposure works in part by teaching a person that even if mistakes are made, the consequences are usually not terrible. Even if your performance is not to someone else’s liking, the situation is likely to be manageable. The same rule applies when someone else’s behavior doesn’t meet your high standards. It’s bound to happen, and when it does, it’s unlikely to be the end of the world. Exposure to situations where your standards are unlikely to be met is an excellent way to learn that these situations need not be threatening or that you may benefit from adjusting your standards.</p>

    <p class="bh">Types of Exposure</p>

    <p>There are different ways in which exposure can be implemented. For example, exposure can be conducted live (also called <em>in vivo exposure</em>) or in the imagination. Although we recommend live exposure whenever possible, exposure in imagination may be appropriate in cases where live exposure is impractical, impossible, or too frightening. For example, if you tend to be very frightened of making mistakes during presentations, we recommend first that you try live exposure by giving presentations and even making minor mistakes that are unlikely to cause any real harm (for example, purposely pausing for a few moments, as if you’ve lost your train of thought). However, if the thought of giving a real presentation is too overwhelming, you could start by imagining that you are giving a presentation and work up to the real thing.</p>

    <p>A second way in which exposure practices can vary is in terms of how gradually steps are taken. We don’t recommend that you start by practicing in the most upsetting situation that you can imagine. Rather, we recommend that you start with easier situations and gradually work up to more difficult situations. The rate at which you take steps toward more and more difficult situations is up to you. The faster you take steps, the quicker you will learn to tolerate more difficult situations. However, taking steps more quickly may also lead to more intense discomfort during the practices.</p>

    <p class="bh">How to Conduct Exposure</p>

    <p>You may be thinking to yourself, “I’m already exposed to the situation that I fear from time to time, but it doesn’t seem to help.” In fact, you may even have had experiences when your fear became worse after exposure to a situation you fear. For exposure to be effective, it has to be done in a particular way. In everyday life, exposure to feared situations tends to be unpredictable, brief, and infrequent. For example, when individuals with a spider phobia encounter a spider, it is usually a surprise (unpredictable exposure). In addition, they usually leave the situation quickly (brief exposure) and make sure it doesn’t happen again (infrequent exposure). Also, people who are anxious or uncomfortable in a particular situation tend to use subtle ways of avoiding the full impact of the situation (such as distraction, excessive checking, or other overprotective behaviors), so they don’t really benefit from the exposure.</p>

    <p>To maximize the benefits of exposure practices, there are several steps you can take. First, in preparing to conduct exposure practices, develop an exposure hierarchy. An exposure hierarchy is a list of anxiety-provoking situations that are ranked in terms of difficulty. This list can be used to help guide your practices. The items in the hierarchy should be as specific as possible and should include items that are practical and easy to set up when you are ready. In other words, you should not choose items that would be impossible to try even if you wanted to. Following are some examples of exposure practices that can be conducted to change particular types of perfectionistic concerns.</p>

    <p>Once you have identified specific exercises that may help to challenge your high standards, the next step is to develop your exposure hierarchy. First, generate a list of ten to twenty exposure exercises. They should include items that range in difficulty from mildly difficult to extremely difficult. Next, estimate (using a scale from 0 to 100) how uncomfortable you will be conducting each practice. The final step is to rank the items in the hierarchy from hardest to easiest.</p>

    <p>After developing your exposure hierarchy, you will be ready to start your exposure practices. Start with easier items, and work your way up to those that are more difficult. As you go along, you will find that some items become easy, and you may want to delete those from the hierarchy. Some steps may be too difficult, in which case you can add some in-between steps to make the process more gradual. It is okay to skip steps as you go along. The quicker you take steps, the quicker the situations will become easier. On the other hand, quicker steps will likely lead to more discomfort during your ­practices. Choose a pace that provides a balance between exercises that are manageable but also challenging.</p>

    <p>If you have several different areas of perfectionism, you can develop separate exposure hierarchies for each area. For example, if you have very high standards with respect to cleanliness and school work, you can develop a hierarchy of situations for each of these areas. Or, if you prefer, you may combine them into one hierarchy and work on them together. Deciding between these two approaches is a matter of preference. However, you should keep in mind that trying to do too many things at once may compromise your success. Here is a sample hierarchy for someone with social anxiety who is afraid of making mistakes in front of other people.</p>

    <p class="exh">Exercise 8.1 Developing Your Own Exposure Hierarchy</p>

    <p class="paft">In your journal, make a list of items that you might include in your exposure hierarchy. Next, rate your fear level for each item, using a scale ranging from 0 (no fear or anxiety) to 100 (maximum fear or anxiety). Finally, rewrite your list in order of difficulty, with the most difficult items at the top, and the easier items at the bottom. Use the sample hierarchy as a guide to help you develop your own list.</p>

    <p class="ch">Design Practices That Are Predictable, Structured, and Planned in Advance</p>

    <p>Exposure works best when it is predictable and under your control. Whenever possible, plan your practices carefully and ensure that they have predictable outcomes. For example, if you are working on becoming less perfectionistic about your physical appearance, decide in advance how you will practice breaking your standards for appearance (for example, spending less time on your hair, wearing clothes that don’t match, and so on). Ensuring the practices are predictable is most important when you first begin to practice. Later, you can purposely build more unpredictable practices into your program.</p>

    <p>For many practices, you can’t possibly know the outcome. For example, if you decide to practice arriving a few minutes late for appointments (to compensate for your belief that you always need to be early for everything), you may not be able to predict what will happen. Some people may not care, whereas others may be annoyed at having to wait for you. To deal with this situation, you can imagine several possible outcomes and think about how you can deal with them if they occur. Of course, you don’t want to choose practices that are likely to get you into big trouble, like not showing up for work at all or completely missing a final exam. If you’re not sure whether a practice is appropriate and safe, ask a few people whom you trust for their opinion.</p>

    <p class="ch">Continue the Practice Long Enough to Learn the Situation is Safe</p>

    <p>The goal of exposure is to learn that you can be in a situation and eventually feel comfortable. Exposure works best when the practice is prolonged. So, if you are nervous about being around people you don’t know because you may say something “stupid,” try spending an extended period with someone who makes you anxious (perhaps having a long lunch) until your anxiety decreases or until you learn that you can manage the situation. If you are uncomfortable leaving a mess in your house, try leaving things messy until you get used to it. Although prolonged exposure works best, some exposures are necessarily brief (things like asking a question in a meeting). In other situations, you may feel too overwhelmed to stay in the situation until the fear decreases. That’s okay. However, the best way to compensate for brief exposures is to repeat them often. If you absolutely must stop an exposure practice early, the best thing you can do is to repeat the practice as soon as possible.</p>

    <p class="ch">Practice Frequently and Schedule Your Practices Close Together</p>

    <p>Exposure works best if the practices are spaced closely together. For example, if you are afraid of speaking in front of groups because you may make a mistake, giving presentations once a year will probably never lead to a reduction in your fear. On the other hand, if you practice giving presentations for five or ten days in a row, you will notice a substantial reduction in fear over the course of the practices. Weekly practice works better than practicing once a month. Daily practice works better than once a week. We recommend that you try to practice at least four or five days a week for an extended period each time. Or, if the situation is one that comes up even more frequently, try to practice whenever you have the opportunity.</p>

    <p class="ch">Expect to Feel Uncomfortable</p>

    <p>Don’t measure the success of an exposure practice by whether you feel uncomfortable. Rather, a successful exposure practice is one that you complete, regardless of how you feel. If you chose an appropriately difficult situation, you <em>should</em> feel anxious. That’s why you are doing the exposure practices in the first place. If you feel anxious during an exposure practice, it’s a sign that you need to continue practicing rather than an indication that things are not going well. If you don’t feel uncomfortable during a practice, we recommend that you choose a more difficult practice next time.</p>

    <p>With repeated practices, your discomfort will decrease. However, that doesn’t mean that there will be a decrease in discomfort each time you practice. In fact, some practices may be more difficult than previous ones. This may be because it is a more difficult situation or because you are feeling less prepared (more tired, less confident, more stressed out, and so on). For every few steps forward, there may be a step back. Also, it’s possible that on days when you practice exposure, your overall level of stress will be higher. You may even be more irritable with people who are close to you. As your anxiety decreases, other stress-related feelings such as irritability will decrease as well.</p>

    <p class="ch">Don’t Use Subtle Avoidance Strategies</p>

    <p>Subtle avoidance strategies are techniques that you may use to make encountering an anxiety-provoking situation more bearable. These may include distraction, reassurance seeking, checking, and other “tricks” for managing the discomfort. These techniques may help you to manage your discomfort in the short term. However, like more obvious forms of avoidance, they prevent you from learning that your perfectionistic thoughts are exaggerated or untrue. In addition, subtle avoidance techniques can undo the effects of your exposure practices. Therefore, try not to use these techniques if at all possible.</p>

    <p class="ch">Use Cognitive Strategies to Cope with Discomfort During Practices</p>

    <p>What you tell yourself, or how you interpret the situation, can have a big impact on your experience during an exposure practice. Therefore, it will be helpful to use some of the cognitive strategies discussed in chapter 7 to deal with negative thoughts that occur during exposure practices. For example, you may decide to use the process of hypothesis testing as a way of dealing with negative predictions. Using this method, you can treat your exposure practices like small experiments designed to test the validity of your perfectionistic thoughts. Before an exposure practice, identify any negative predictions that you are making. Then, after your exposure practice, take note of whether your feared outcome actually occurred. By treating each exposure practice as an experiment to test out your hypotheses about what might happen, you will learn that many of your feared outcomes don’t come true. There are a few other specific strategies that can be helpful for dealing with anxiety or discomfort experienced during your exposure practices. If you are purposely entering situations where you fear that you may behave imperfectly or incorrectly, make a decision to allow yourself to be imperfect. Ask yourself the question, “Can I handle imperfection in this situation?” Also, remember that the anxiety is temporary and will gradually decrease. In most cases, the worst thing that will happen during an exposure practice is that you will feel uncomfortable.</p>

    <p class="exh">Exercise 8.2 Keeping Track of Your Exposure Practices</p>

    <p class="paft">In your journal, keep track of your exposure practices. For each practice, record (1) the date and time of the practice, (2) a description of the practice, including the specific exercise, the duration of the exercise, and other relevant details, (3) your average discomfort level during the practice (using a scale from 0 to 100), and (4) how you challenged any negative thinking that arose during the practice. You should notice a decrease in your discomfort levels as you continue to practice exposure.</p>

    <p class="bh">Response Prevention</p>

    <p>A second strategy for changing perfectionistic behaviors is <em>response prevention</em>. Response prevention involves stopping yourself from engaging in problematic perfectionistic behaviors. This strategy is related to exposure, in that it provides an opportunity to test out the accuracy of your negative predictions (in fact, it should be used along with exposure). The main difference is that exposure involves doing something anxiety provoking (such as giving a presentation), and response prevention involves preventing the behaviors that you use to protect yourself from feeling uncomfortable or to prevent bad things from happening (for instance, memorizing your presentation beforehand to ensure you don’t make any mistakes). By preventing these safety behaviors, you will learn that many of these actions serve no real function other than to decrease your anxiety or discomfort for a short time. For example, if you tend to check your work over and over, preventing the rechecking will teach you that if you stop checking excessively, the quality of your work doesn’t suffer as much as you expect it to. Other perfectionistic behaviors for which response prevention can be helpful include correcting or checking the behavior of other people, looking at your watch or clock often (to make sure that you are on time), checking your weight or physical appearance, arguing with teachers or professors to have a point or two added to your course grade, excessively washing or cleaning, or participating in any other repetitive behavior that you use to make sure that your standards are met or to reduce your anxiety about not meeting your standards.</p>

    <p>It is important to do what you can to prevent these behaviors. At first, you may find that your anxiety or discomfort increases significantly when you prevent the behaviors. You may worry about the consequences of not checking, cleaning, or correcting. However, after a while, the discomfort will probably decrease as you learn that nothing terrible happens when you start to eliminate these behaviors.</p>

    <p>The behaviors associated with your perfectionism may be so ingrained and habitual that you are not even aware of them. There are a number of ways to increase your awareness of these behaviors. First, you can record in your journal times when you engage in behaviors such as checking, repeating, correcting, cleaning, counting, or asking for reassurance. Pay special attention to the specific situations, moods, and places that trigger these behaviors, as well as the way you feel after you engage in the behaviors. This exercise should make you more aware of the perfectionistic behaviors that need to be stopped. If you still have trouble identifying these behaviors, ask someone who is close to you to help point them out. With practice, you should eventually become more aware of your perfectionistic rituals.</p>

    <p class="bh">Communication Training</p>

    <p>A third strategy for changing perfectionistic behaviors is communication training. Communication training is useful when perfectionism affects the way you communicate with other people. For example, perfectionism causes some people to communicate in a disapproving or judgmental way with others who do not meet certain perfectionistic standards. If this is a problem for you, it may be important to examine how you communicate your high expectations to other people in your life. Often, perfectionism is associated with an intense drive to change the behavior of other people so it conforms to your high standards. This drive may cause you to constantly nag, correct, or even offend other people with the message that their behavior is not good enough. This message can cause them to feel angry or hurt.</p>

    <p>For individuals who are more self-focused in their perfectionism, communication may be affected by a tendency to communicate passively and to have difficulty listening to what other people are saying. A full discussion of how to change communication patterns is beyond the scope of this book. For a more detailed discussion of this topic, there are several books on communication training listed in Further Readings at the end of this book. There are, however, a few general guidelines that we can provide for you, based in part on recommendations from McKay, Davis, and Fanning’s book <em>Messages: The Communication Skills Book</em> (2009).</p>

    <p class="ch">Be Assertive</p>

    <p>Everyone encounters situations in which the behavior of other people is inconsistent with their own expectations. However, perfectionism can lead people to communicate their disapproval in a way that is not terribly helpful. By understanding how you communicate and by working on your communication skills, you can lessen the risk of alienating others.</p>

    <p>There are three general styles of communication. The first style, known as <em>passive communication</em>, involves communicating indirectly and putting the needs and rights of others ahead of your own needs. For example, rather than expressing disagreement about a particular topic, a person who communicates passively may be more likely than others to pretend to agree, in order to avoid being criticized. Similarly, a passive communicator may find indirect ways to express his or her needs and desires. Some perfectionists (particularly people who tend to feel depressed or socially anxious) may constantly feel that they are not living up to their own standards. They may be at risk for using passive communication if they believe that other people will find what they have to say to be uninteresting or unimportant. Passive communication is usually not an effective form of communicating. Other people are unlikely to hear your message if it is communicated passively.</p>

    <p>A second style of communication is known as <em>aggressive communication</em>. Aggressive communication puts your own needs ahead of the needs of other people and may involve putting pressure on other people to do things your way. It may be associated with being hurtful or insulting to those around you and usually leads to the other person shutting down and not listening to you or becoming very angry with you. People who have perfectionistic beliefs about how other people should behave may become quite pushy and aggressive in their attempts to have other people conform to their excessively high expectations.</p>

    <p>The third and most effective style of communication is called <em>assertive communication</em>. Being assertive involves taking into account both your own rights and needs as well as the rights and needs of the other individual. Assertive communication involves three main components: describing the situation in the most objective, nonbiased, and nonjudgmental way possible; describing how the situation affects the way you feel (the emotion that you are experiencing); and describing how you would like the situation to change. Although assertive communication is not guaranteed to work, it tends to be more effective than passive and aggressive communication styles. Following are illustrations of how each of the three communication styles might be used to tell a child that his or her bedroom needs to be cleaned:</p>

    <p class="dia">Passive: Look into the room, let out a sigh and roll your eyes.</p>

    <p class="dia">Aggressive: Say to the child, “You are a complete slob. You are never going to amount to anything unless you can learn to be more organized.”</p>

    <p class="dia">Assertive: Say to the child, “Your toys are all over your floor. I feel frustrated when I have to clean your room. I would like you to clean your room before you go out today, please.”</p>

    <p>Unlike passive communication, assertive communication is likely to be heard and understood by the other individual. Unlike aggressive communication, assertive communication is less likely to lead the other person to automatically disagree or feel hurt.</p>

    <p class="ch">Listen</p>

    <p>An important part of any communication is listening to the other person. Listening involves hearing what the other person has to say and making a genuine attempt to understand his or her point of view. Perfectionism can get in the way of listening. If you are overly critical of the other person, you may tend to focus your attention on mistakes the other person makes rather than on the entire communication. If you are overly critical of yourself, you may miss important aspects of the other person’s communication if you are paying too much attention to how you are coming across or are thinking about what you are going to say next while the other person is talking.</p>

    <p>A helpful way of making sure that you have heard and understood what the other person has said is to repeat back to the person what you have heard and to ask for clarification if there is a misunderstanding. However, moderation is the key. If you happen to be a person who compulsively asks for reassurance and checks excessively to make sure you understand other people, we recommend that you cut back rather than increase this behavior.</p>

    <p class="ch">Pay Attention to Nonverbal Communication</p>

    <p>The words people say are only a small part of their communication. Nonverbal communication plays an enormous role in how others interpret what you say. Nonverbal communication includes such things as voice quality (things like tone, volume, inflection, rate of speech), facial expressions, and body posture. Even if your words are not critical of the people around you, your perfectionism may lead you to communicate your disapproval in nonverbal ways (frowning, crossing your arms, leaning back, and so on). If you can be aware of your nonverbal communication patterns, you can also take steps to ensure that you are not inflicting your perfectionistic standards on others in nonverbal ways.</p>

    <p class="bh">Prioritizing</p>

    <p>Do you have difficulty getting things done on time? Or, do you spend so much time trying to get everything done that you sacrifice other important areas in your life? A fourth strategy for changing perfectionistic behaviors involves prioritizing. Prioritizing is important for individuals who always feel like they have to get everything done right away. It may also be helpful for people who have problems deciding what to do first (in case they make a “wrong” decision). The process of prioritizing involves three steps.</p>

    <p>The first step involves generating lists of tasks that need to be completed. Ideally, this should be done on paper (for example, in your journal). You may include separate lists for things that need to be done today (take out the garbage, finish a report, get a haircut, and so on) and things that need to be done sometime, but not right away (invite neighbors over for dinner, buy a new lamp, get a new passport, take up tennis, and so on).</p>

    <p>The second step involves examining the list (or lists) and ranking the items in terms of importance. Just because it feels important that you finish a task doesn’t mean that it is important. To assess the importance of the tasks, you need to assess the possible consequences of not completing an item. When you ask the question, “What will happen if I don’t finish the task?” you will come to realize that many of the items are not as important as they seemed.</p>

    <p>The third step is to begin completing the tasks in order of importance and urgency. You should try to be realistic about what can be done and about the possible consequences of not completing certain tasks. If you have problems deciding which task to do first, it may be because it doesn’t matter which one you do first. If that is the case, pick one task (flip a coin) and start with it.</p>

    <p class="bh">Overcoming Procrastination</p>

    <p>The final strategy for changing perfectionistic behaviors is geared toward overcoming procrastination. People procrastinate for a variety of reasons, including not enjoying the particular task or job, not having time to work on the task, being fearful of not being able to complete the task well, and not knowing where to start. In the case of perfectionism, the last two reasons are particularly relevant. If you tend to procrastinate, some of the strategies that we have discussed already (for example, prioritizing, exposure) may be helpful. We recommend that you break up the task into smaller, more manageable pieces. Rather than thinking about how overwhelming the entire job is, try dividing it into smaller tasks that are easily completed. This strategy was essential in helping us write the first edition of this book. Below is a description of how we managed to divide the task of writing a book on perfectionism into smaller, manageable tasks.</p>

    <p class="ch">Steps for Writing this Book</p>

    <ol>
      <li class="nlf">Develop a table of contents</li>

      <li class="nl">Develop a list of main headings for chapter 1</li>

      <li class="nl">For each main heading, generate a list of subheadings for each topic</li>

      <li class="nl">Write a first draft of the information that belongs under the first subheading</li>

      <li class="nl">Repeat step 4 for each subheading in chapter 1</li>

      <li class="nl">Proofread and make revisions to chapter 1</li>

      <li class="nll">Repeat steps 2 through 6 for each of the other chapters</li>
    </ol>

    <p>You can use this same strategy for any task. For example, if you are procrastinating about writing a letter, you can break the task into small jobs, such as getting out the paper, addressing the envelope, developing a brief outline, writing the first paragraph, and so on. Each step in isolation is unlikely to be overwhelming. If you come across a particular step that is overwhelming, break it down into even smaller steps.</p>
