    <p class="cn">Chapter 5</p>

    <h1 id="heading_id_2">Measuring Your Perfectionism</h1>

    <h2 class="sigilNotInTOC" id="heading_id_3">The Purpose of Conducting an Assessment</h2>

    <p class="paft">Before a psychologist, psychiatrist, or other professional begins to help an individual to deal with a particular problem, there is typically a period of assessment. Assessment involves collecting information to better understand the nature and severity of a problem and to help develop the best possible treatment plan. For example, if a client visits a therapist seeking help for problems with anxiety, the therapist is likely to begin the first session (or even the first few sessions) by simply asking questions about the main problem, other difficulties the client may be experiencing, and the client’s background. The client may be asked to complete a series of questionnaires that measure anxiety and related problems. In addition, diaries may be completed to measure anxiety and other reactions throughout the week, when the person actually encounters particular anxiety-provoking situations. The assessment process helps the clinician to get to know the client and is essential for identifying and understanding the problem. In addition, the findings from the assessment are often important for choosing and recommending a course of treatment.</p>

    <p>In the same way, a detailed self-assessment will help you to understand and change your difficulties with perfectionism. Before you begin to work on changing your own perfectionism, this chapter will guide you through a detailed self-assessment with three main components: ­identifying key problem areas, measuring the severity of the problem, and measuring changes that may result from using the strategies described in this book.</p>

    <h2 class="sigilNotInTOC" id="heading_id_4">Identifying Problem Areas</h2>

    <p class="paft">An important function of the initial assessment phase is to describe the features of your perfectionism and to identify the main problem areas. These include identification of perfectionistic thoughts and behaviors as well as situations that trigger perfectionistic responses.</p>

    <p class="bh">Isolating Your Perfectionistic Thoughts and Behaviors</p>

    <p>In chapters 3 and 4, you identified your perfectionistic thoughts and behaviors. Because perfectionistic beliefs and behaviors vary across people, it is important to identify the unique ways in which your perfectionism is manifested. Reviewing the beliefs and behaviors that you identified in chapters 3 and 4 will be helpful.</p>

    <p class="exh">Exercise 5.1 Perfectionism Diary</p>

    <p class="paft">Here is an example of a diary to record episodes during which perfectionism comes up in your everyday life. You may want to photocopy this sample or develop your own. Each time you find yourself having a perfectionistic thought (such as those you listed in your journal while reading chapter 3) or engaging in a perfectionistic behavior (such as those you listed while reading chapter 4), record the information requested on your perfectionism diary. The first step to changing perfectionistic thinking is to catch yourself in the act. Completing the perfectionism diary will help you to identify times when you are thinking or behaving in a perfectionistic manner.</p>

    <p class="bh">Isolating Situations and Triggers for Your Perfectionism</p>

    <p>For many perfectionists, their overly high standards are more problematic in some situations than in others. For example, they may be very perfectionistic in their work, but fairly laid-back at home. Therefore, as part of your self-assessment, it’s important to identify the specific situations that trigger your perfectionism. For example, do your perfectionistic thoughts and behaviors occur more often with certain people, during particular activities, or in certain places?</p>

    <p class="exh">Exercise 5.2 Identifying Your Perfectionism Triggers</p>

    <p class="paft">Below is a list of people (part 1) and activities (part 2) that sometimes trigger perfectionistic beliefs and behaviors. For each item that reflects an area in which you tend to be perfectionistic, list some examples of the ways in which your perfectionism is manifested. Next, for each item in the list, estimate the degree to which perfectionism is a problem for you. You may need to think carefully about this task and to take some time to complete it. Use a scale ranging from 0 (perfectionism is not at all a problem) to 100 (perfectionism is very much a problem). For example, a score of 50 would reflect a moderate level of perfectionism. Later, these numbers will help you to choose specific areas to work on. Areas in which perfectionism is more of a problem may be those that you will choose to focus on first.</p>

    <h2 class="sigilNotInTOC" id="heading_id_5">Measuring the Severity of the Problem</h2>

    <p class="paft">Your self-assessment should include an analysis of how severe or impairing your perfectionism is. In examining the severity of the problem, you will need to take several different steps, including: deciding whether your high standards are helpful or unhelpful, identifying the areas of functioning that are impaired as a result of the perfectionism (work, relationships, emotional well-being, and so on), estimating the impact of your perfectionism on others, identifying the effects of perfectionism on your emotional functioning, and identifying the extent to which your perfectionistic beliefs are flexible versus rigid.</p>

    <p class="bh">Helpful vs. Unhelpful Standards</p>

    <p>Perfectionistic standards, as opposed to beneficial high standards, are so high that they either can’t be met or they can only be met at an enormous cost to yourself or others. Making the distinction between helpful and unhelpful standards can often be difficult for people who are perfectionists. One reason for this is that a standard that is helpful for one person may be overly perfectionistic for another person. For example, a professional squash player must meet very high standards in order to make a living at the game, while an individual who plays squash in their leisure time can afford to have lower standards. In fact, having overly high standards can lead to unnecessary anger and disappointment when a mistake is made or a game is lost. For such a person, overly high standards might be considered perfectionistic and, therefore, not especially helpful.</p>

    <p class="exh">Exercise 5.3 Reevaluating Your Standards</p>

    <p class="paft">The best way to identify whether your own standards are overly perfectionistic is to look at the impact of having these standards. For each of the following questions, record your responses in your journal:</p>

    <ul>
      <li class="ulf">Are your standards higher than those of other people?</li>

      <li class="ul">Are you able to meet your standards?</li>

      <li class="ul">Are other people able to meet your standards?</li>

      <li class="ul">Do your standards help you to achieve your goals or do they get in the way (for example, by making you overly disappointed or angry when your standards are not met or causing you to get less work done)?</li>

      <li class="ul">What would the costs be of relaxing a particular standard or ignoring a rule?</li>

      <li class="ull">What would the benefits be of relaxing a particular standard or ignoring a rule?</li>
    </ul>

    <p>Sometimes, when you are too close to an issue, it’s hard to have a realistic perspective. For example, if you have been behaving in a perfectionistic way for a long time, it may be hard to imagine thinking differently about a certain issue. If you’re unsure about how to answer any or all of the above questions, try to get some distance from the issue by imagining how someone else might look at the particular problem. You may even want to consider asking people whom you trust about their beliefs regarding the standard or rule in question. For example, if you are overly concerned about making a mistake when giving a presentation, you could try to imagine how another person might feel about the consequences of making mistakes during presentations. You might even ask a coworker what he or she thinks when a presenter makes a mistake while talking. This will help you to determine whether your concern about doing a perfect presentation is exaggerated.</p>

    <p>If you determine that a particular standard cannot be met or that the costs of having a particular standard or rule outweigh the benefits, you may want to consider loosening your standards for that particular issue. For example, during times when you are very busy at work, maybe it’s okay if your home is a bit messier than usual.</p>

    <p>If you still feel unsure about whether your standards are exaggerated or perfectionistic, or if others continue to complain about behaviors that you feel reflect appropriately high standards and your relationships are suffering as a result, it may be helpful to visit a therapist and get a professional opinion from an unbiased third party.</p>

    <p class="exh">Exercise 5.4 Evaluating the Helpfulness of Your Standards</p>

    <p class="paft">In your journal, make a list of (1) standards held by you that are helpful and worth holding on to, and (2) standards held by you that are unhelpful (that is, standards that sometimes get in the way, slow you down, or disturb people who are close to you).</p>

    <h2 class="sigilNotInTOC" id="heading_id_6">Perfectionism and Areas of Functioning</h2>

    <p class="paft">One measure of the severity of a problem is the extent to which it interferes with a person’s functioning. In chapter 2, you identified ways in which particular areas of your life are affected by perfectionistic beliefs and behaviors. On the next page is a list of areas that are often affected by perfectionism. For each relevant area, list some examples of ways in which your perfectionism interferes. Next, for each item in the list, estimate the degree to which perfectionism interferes with that specific area. Use a scale ranging from 0 (perfectionism causes no interference) to 100 (perfectionism is completely impairing). For example, a score of 50 would reflect a moderate level of interference in that domain. You may wish to refer back to the notes you made in your journal while reading chapter 2 for examples of how perfectionism affects these areas of your life.</p>

    <h2 class="sigilNotInTOC" id="heading_id_7">The Effect of Perfectionism on Others</h2>

    <p class="paft">It is important to assess the impact of your perfectionism on those around you. By doing this, you can improve your interpersonal relationships by reducing the strain that can be caused by perfectionistic criticizing and directing, as well as reducing your own irritation and anger about the actions of others that you would perform differently.</p>

    <p class="exh">Exercise 5.6 How Your Perfectionism Affects Those Around You</p>

    <p>In your journal, answer the following questions to the best of your ability:</p>

    <ul>
      <li class="ulf">How do people react to you when you impose your standards on them?</li>

      <li class="ul">How do others respond when they observe you imposing inappropriately high standards on yourself?</li>

      <li class="ul">Are there times when others become frustrated with your perfectionistic behaviors?</li>

      <li class="ul">Are some people anxious around you for fear of making a mistake in your presence?</li>

      <li class="ull">How do <em>you</em> respond to other people who tend to be perfectionistic with themselves or with other people?</li>
    </ul>

    <p>If you are not sure how your perfectionism affects other people, it might be worth asking one or two people how they are affected by your perfectionistic behaviors. Choose people who are close to you and who you can trust. Here are some questions that you might ask the other individual:</p>

    <ul>
      <li class="ulf">Have you noticed ways (for instance, situations, behaviors, and so on) in which I am overly perfectionistic or rigid?</li>

      <li class="ul">How are you affected when I do ___________ ?</li>

      <li class="ul">In what areas would you like to see me become less perfectionistic?</li>

      <li class="ull">What impact would it have on our relationship if I were to become less perfectionistic?</li>
    </ul>

    <p>After you have obtained more information about the effect of your perfectionism on other people, try to process the information in a way that is helpful. Here are some questions to ask yourself (record your responses in your journal):</p>

    <ul>
      <li class="ulf">How do you feel after hearing about the effects of your perfectionism on others?</li>

      <li class="ul">Does your perfectionism affect your relationships?</li>

      <li class="ul">Do you want to become less perfectionistic in your relationships?</li>

      <li class="ul">Which specific behaviors or standards do you want to decrease or end completely?</li>

      <li class="ull">Which specific behaviors or standards do you want to keep the same?</li>
    </ul>

    <h2 class="sigilNotInTOC" id="heading_id_8">Perfectionism and Emotional Functioning</h2>

    <p class="paft">Your self-assessment should include an examination of the ways in which perfectionism affects you <em>emotionally</em>. Sometimes perfectionism can lead to feelings of depression if a person finds that his or her high standards are never met (for example, a student who feels depressed because his grades are not high enough to be accepted into graduate school).</p>

    <p>For other individuals, perfectionism can be associated with intense anxiety, nervousness, or fear. For example, some people with unreasonably high standards for themselves report intense anxiety about being judged negatively by others if they make a mistake or do not meet their own unrealistically high standards. Finally, for some people, perfectionism is associated with feelings of frequent anger, irritability, and frustration. This is often the case for individuals who hold unreasonably high standards for those around them.</p>

    <p class="exh">Exercise 5.7 How Your Perfectionism Affects Your Emotional Functioning</p>

    <p class="paft">Take a few moments to consider the ways in which perfectionism contributes to your emotional states. Can you think of times when your perfectionistic beliefs or standards led to feelings of depression, anxiety, or anger?</p>

    <p><strong>Part 1</strong>: Think about times when your perfectionism has caused you to feel sad or depressed. In your diary, record all relevant details, including (1) the situation or trigger, (2) your reaction in the situation (your perfectionistic thoughts and behaviors), and (3) the intensity of the sadness or depression (using a scale from 0 to 100).</p>

    <p><strong>Part 2</strong>: Think about times when your perfectionism has caused you to feel anxious. In your diary, record all relevant details, including (1) the situation or trigger, (2) your reaction in the situation (your perfectionistic thoughts and behaviors), and (3) the intensity of your anxiety (using a scale from 0 to 100).</p>

    <p><strong>Part 3</strong>: Think about times when your perfectionism has caused you to feel angry, irritable, or frustrated. In your diary, record all relevant details, including (1) the situation or trigger, (2) your reaction in the situation (your perfectionistic thoughts and behaviors), and (3) the intensity of your angry feelings (using a scale from 0 to 100).</p>

    <h2 class="sigilNotInTOC" id="heading_id_9">Flexible vs. Rigid Perfectionistic Beliefs</h2>

    <p class="paft">Another important aspect of your perfectionism to consider is the extent to which your perfectionistic attitudes are flexible and therefore easily changed. Your self-assessment should include an evaluation of how rigid your perfectionistic beliefs are. The less rigid you are with yourself and your beliefs, the easier it will be to change. Just recognizing your rigidity in particular areas may motivate you to become more flexible.</p>

    <p class="exh">Exercise 5.8 Assessing the Flexibility of Your Perfectionistic Beliefs</p>

    <p class="paft">The extent to which you answer yes to the following questions may be an indication that your perfectionistic beliefs are relatively inflexible. If this is the case, you will need to work especially hard at changing these beliefs and behaviors. You may also need to remind yourself from time to time about the costs and benefits of changing your standards (chapter 6 discusses this issue in more detail). If you answer no to most of these questions, you will likely find it easier to change your beliefs and behaviors using the exercises described in upcoming chapters. Record your responses to each of the following questions in your journal:</p>

    <ul>
      <li class="ulf">Is it difficult for you to recognize when you are being overly perfectionistic? If so, list examples.</li>

      <li class="ul">Do you find it difficult to relax your standards? If so, list examples.</li>

      <li class="ul">Typically, are you unwilling to consider the possibility that you are being overly perfectionistic (even when your ­relationships are suffering and others blame your perfectionism)? If so, list examples.</li>

      <li class="ul">Do you often find yourself disagreeing with other people when they tell you that your standards are too high or too rigid? If so, list examples.</li>

      <li class="ul">Do you become very upset when you are unable to meet your own standards? If so, list examples.</li>

      <li class="ull">Do you become very upset when others are unable to meet your standards? If so, list examples.</li>
    </ul>

    <p class="exh">Exercise 5.9 Putting It All Together</p>

    <p class="paft">Throughout this chapter (as well as chapters 3 and 4), you have recorded a large amount of information about your perfectionism. Now it’s time to compile the information into one handy summary. You may wish to refer to your responses throughout chapters 3, 4, and 5 when completing this summary. Record your responses to the following items in your journal:</p>

    <p class="ch">Styles of Perfectionistic Thinking</p>

    <p>List (from chapter 3) the styles of perfectionistic thinking (all-or-nothing thinking, filtering, and so on) that are most problematic for you. Give an example of each from your own life.</p>

    <p class="ch">Styles of Perfectionistic Behavior</p>

    <p>List (from chapter 4) the styles of perfectionistic behavior (overcompensating, excessive checking, and so on) that are most problematic for you. Give an example of each from your own life.</p>

    <p class="ch">People with Whom You Tend to Be Overly Perfectionistic</p>

    <p>List (from this chapter) the people with whom you tend to be overly perfectionistic (partner, coworkers, and so on).</p>

    <p class="ch">Activities That Tend to Trigger Your Perfectionism</p>

    <p>List (from this chapter) the activities that are most likely to trigger your perfectionistic thoughts and behaviors (work, relationships, and so on) and are the most problematic for you.</p>

    <p class="ch">Helpful and Unhelpful Standards</p>

    <p>List the most important helpful standards, rules, or preferences that you recorded earlier in this chapter, which you may wish to maintain. Then list the most unhelpful (perfectionistic) standards that are problematic for you and that you may wish to change.</p>

    <p class="ch">Areas of Functioning That Are Most Impaired Because of Your Perfectionism</p>

    <p>List (from this chapter) the areas of functioning that are most impaired because of your perfectionism (relationships, hobbies, and so on). Note that these areas are likely to overlap somewhat with the ­activities that trigger your perfectionism.</p>

    <p class="ch">The Effect of Your Perfectionism on Others</p>

    <p>List examples of how your perfectionism affects other people.</p>

    <p class="ch">Perfectionism and Emotional Functioning</p>

    <p>List examples (see earlier section in this chapter) of how your perfectionism causes you to feel depressed, anxious, or angry from time to time.</p>

    <h2 class="sigilNotInTOC" id="heading_id_10">Measuring Improvement and Change</h2>

    <p class="paft">In addition to helping you understand the origins and nature of your perfectionistic beliefs and behaviors, another function of assessment is to measure changes in perfectionism over time. Therapists sometimes ask their clients to repeat the initial measures (for example, questionnaires, diaries, and so on) periodically during their treatment. This is a helpful way to assess whether a person’s problem is improving.</p>

    <p>By continuing to use the assessment strategies discussed in this chapter throughout the process of changing your thoughts and behaviors, you will be able to determine whether you are in fact making progress. Here are some specific recommendations for how to continue to assess your perfectionism as you work through this book. Note that these are only suggestions. You can pick and choose among these recommendations based on your own needs:</p>

    <ul>
      <li class="ulf">Examine the responses in your perfectionism summary (exercise 5.9) from time to time to assess whether there have been changes in the types of perfectionistic thoughts and behaviors you experience, the intensity of your perfectionism, and the ways it impacts your day-to-day functioning. When you examine the summary, you may add items if you notice new triggers for your perfectionism, or perfectionistic thoughts or behaviors, that were not recorded initially.</li>

      <li class="ul">Note any items on the summary that no longer belong on the list (in fact, you can complete a new summary periodically, to assess how things have changed).</li>

      <li class="ul">Initially, you should reexamine the summary weekly. After six to eight weeks, when things have begun to improve, you may decrease the frequency of looking at the form to once every two weeks. When your perfectionism has decreased even further, you may reduce the frequency further (for example, monthly). When you are no longer working on your perfectionism, you can stop the formal assessments. You may still want to conduct an informal assessment from time to time, by just asking yourself how things are going with respect to your perfectionistic thoughts and behaviors.</li>

      <li class="ull">Continue using the perfectionism diary, described in this chapter, as long as you are working on changing your perfectionistic beliefs and behaviors.</li>
    </ul>
