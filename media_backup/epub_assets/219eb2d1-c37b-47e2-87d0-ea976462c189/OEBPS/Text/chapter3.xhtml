    <p class="cn">Chapter 3</p>

    <h1 id="heading_id_2">Perfectionism and Thoughts</h1>

    <p class="paft">Research from around the world has consistently found a relationship between people’s emotions and their beliefs, thoughts, expectations, and interpretations. Negative thinking seems to be related to experiences of anxiety, anger, and sadness. Perfectionism, which is often part of these emotional states, is also associated with these negative styles of thinking. In this chapter, we will explain the styles of thinking that contribute to perfectionism; in later chapters, we will discuss how changing these styles of thinking can have a dramatic effect on the tendency to engage in perfectionistic behaviors.</p>

    <h2 class="sigilNotInTOC" id="heading_id_3">How Beliefs Affect Emotions</h2>

    <p class="paft">Here is an exercise to illustrate how beliefs can affect emotions:</p>

    <p class="exh">Exercise 3.1 The Link Between Your Beliefs and Emotions</p>

    <p class="paft">Imagine that you have arranged to have a close friend pick you up at home and drive you to dinner at a restaurant where you have made a reservation for 7:00 p.m. Because you live about fifteen minutes from the restaurant, your friend was scheduled to pick you up at 6:45 p.m. Imagine that your clock says 6:45, and your friend has not yet arrived. How might you feel at this point? What emotion do you think you might be experiencing, if any? What thoughts would be running through your head? In your journal, record (1) any emotions that you think you might be experiencing at 6:45 p.m., and (2) any specific thoughts that might be going through your head at that time.</p>

    <p>Now, imagine that you continue to wait for your friend for another twenty minutes. It’s 7:05, you are late for your reservation, and your friend has still not arrived. You try calling your friend’s cell phone, but there is no response. What emotion would you be feeling at this point? What thoughts might be going through your head? In your journal, record (1) any emotions that you think you might be experiencing at 7:05 p.m., and (2) any specific thoughts that might be going through your head at that time.</p>

    <p>Imagine that another forty minutes go by. It’s now 7:45, and you are very hungry. Still no friend at your door. You phone your friend’s home and there is no answer. What would you be feeling and thinking now? Would your feelings or thoughts have changed from earlier? In your journal, record (1) any emotions that you think you might be experiencing at 7:45 p.m., and (2) any specific thoughts that might be going through your head at that time.</p>

    <p>Finally, at 7:55 p.m., your friend shows up covered in grease from having to change a flat tire on the highway, which, as it turns out, is the reason your friend was late. He had forgotten to pick up his cell phone when he left in a hurry to meet you and couldn’t get in touch with you. Your friend apologizes for the delay and clearly seems quite frazzled about the whole situation. You agree to stay home and order in food. How would you be feeling now that your friend has arrived? Would your feelings or thoughts be different than they were ten minutes earlier? In your journal, record (1) any emotions that you think you might be experiencing at 8:00 p.m., shortly after your friend arrives and explains why he or she is late, and (2) any specific thoughts that might be going through your head at that time.</p>

    <p class="bh">Interpretation and Emotions</p>

    <p>When working with people who experience problems with anxiety, depression, and related difficulties, we ask them to imagine scenarios such as this one to help illustrate the relationship between thoughts and emotions. Although the scenario we describe is often the same, the responses we get from people to these questions differ dramatically from person to person. Some individuals tell us that they would be unlikely to react negatively to their friend’s lateness. Rather, they might simply have a small snack to tide them over and keep busy with various chores around the house until the friend shows up. Other individuals tell us that they would become increasingly angry with the friend as they waited. These feelings might be associated with thoughts that the friend was being inconsiderate. This behavior might be seen as contradicting a particular value or attitude, such as the belief that “people should not be late.” When the friend arrives and it becomes clear that the delay was beyond his or her control, these feelings of anger might be replaced by feelings of guilt for assuming the worst about the friend.</p>

    <p>Other people tell us that they would probably feel very worried if their friend hadn’t arrived on time. As the evening progressed, they would be having increasingly frequent thoughts that something terrible had happened to their friend. When the friend finally arrives, these feelings of anxiety and worry might be replaced by feelings of relief.</p>

    <p>Still other people tell us that they would feel sad if their friend did not show up on time. They might believe that the friend doesn’t care enough about them to show up on time, and as a result, they might question their own self-worth as they waited for their friend. As with people who respond to this scenario with anxiety and worry, individuals who predict that they would feel sad often report that they would likely feel relieved when the person finally showed up and the reason for the friend’s lateness became clear.</p>

    <p>This scenario illustrates how the same situation can lead to a full range of emotions depending on an individual’s interpretation of the events. Despite all the possible interpretations of this scenario, the actual situation is the same in all cases: a friend is late for dinner because of a flat tire. Yet, the reaction of the person waiting for the friend may be anger, anxiety, sadness, or any of a range of emotions, depending on how the situation is interpreted.</p>

    <p>The key idea here is that, in general, people do not respond to <em>events</em> in their lives, but rather to their <em>interpretations</em> of events. The same event can lead to very different reactions from different people, depending on the meaning the event holds for them. It is your beliefs, thoughts, ­interpretations, predictions, assumptions, and other cognitive patterns that determine how you react to situations and events.</p>

    <p>People who are perfectionistic tend to have specific patterns of beliefs that help to maintain their perfectionism. For example, someone who tends to be perfectionistic might believe that there is only one correct way to wash the dishes. Most people believe that they know how to wash the dishes properly. But if you actually take the time to watch how different people wash dishes, it quickly becomes apparent that there are many different ways to get the job done—all of which work pretty well. For example, some people fill the sink with water and let the dishes soak. Other people let the water run continuously and wash each dish separately under the tap. People may use various kinds of scrubbers and sponges, or they may use only their hands. Some people insist on a particular brand of soap, whereas other people will use any kind of dish soap, and still others may not use any soap at all. Some people will only use very hot water to ensure that all germs are killed; others prefer to use warm or cold water. Some people don’t even bother with water and just wipe off the dishes. Some people wash their dishes right after they are used, and others let them sit for a few hours, days, or weeks before washing them.</p>

    <p>You get the idea—there are many different ways to wash dishes. If a person adheres too rigidly to beliefs about how tasks should be completed, he or she is likely to run into problems with other people who also have strong opinions about how things should be done. Perfectionism can affect your interpretations (“That’s the wrong way to wash dishes”) which, in turn, affects your emotions (“Now I’m irritated”).</p>

    <h2 class="sigilNotInTOC" id="heading_id_4">Automatic and Unconscious Perfectionistic Thoughts</h2>

    <p class="paft">People are often unaware of the thoughts and interpretations that lead to their intense reactions to situations. Often, these thoughts occur so quickly and automatically that they are outside of your conscious awareness. In fact, there are many situations in which you process information outside of your awareness. When you walk, you don’t have to think, “Right foot … left foot … right foot … left foot.” Rather, you walk without thinking about it. If there is a pole in the way, you automatically walk around it. In fact, a minute later, you might forget that there was a pole to be walked around.</p>

    <p>In situations that are very familiar, such as walking, you are able to process information with limited cognitive resources or attention. You even process information while you sleep. For example, people are more likely to wake up to the sound of their own name than to other sounds. Many parents with a new baby report that they are more likely to wake up to the sound of their own baby’s crying than to other sounds.</p>

    <p>Given that you often process information outside of your awareness, many of the beliefs that are associated with perfectionistic thinking may be hard to identify. With practice, identifying perfectionistic beliefs will become easier. One way of doing this is to notice situations in which you experience a negative emotion such as anxiety, sadness, anger, frustration, or a feeling that something is not “right.” Once the emotion has been identified and labeled, it is sometimes easier to identify the thoughts and interpretations that might be contributing to the negative feeling. There may even be contradictory beliefs leading to a mixture of emotions. For example, if a supervisor feels frustrated because an employee is not doing a job “properly,” the supervisor might notice frustration-producing thoughts such as, “It’s very important that my employees do the job my way.” At the same time, the supervisor may still recognize on some level that there are different ways of doing the job and that it might be okay to have employees do the job their own way.</p>

    <p class="exh">Exercise 3.2 Identifying Perfectionistic Thoughts</p>

    <p class="paft">Before you can learn to change perfectionistic patterns of thinking, it is important to identify these thoughts, interpretations, and beliefs. Using a thought monitoring form, such as the example provided here, can help you monitor such thoughts. The next time you find yourself feeling inadequate because you think you haven’t performed well enough on a task or are frustrated by the behavior of someone around you, try completing this form. You will probably want to create your own form on a full-sized sheet of paper because there isn’t much space on the sample provided in this book. After reading the completed example, use the first column of your blank form to record the situation that triggers your perfectionistic thoughts or brings these thoughts to your awareness. In the second column, record the emotion that you are experiencing (for example, fear, anxiety, anger, sadness, frustration, and so on). Also, record the intensity of the emotion using a scale ranging from 0 to 100, where 0 means nonexistent and 100 equals emotion as intense as you can imagine. Finally, in the third column, record your perfectionistic beliefs and thoughts. By stepping back and observing your reactions in situations, perfectionistic thoughts are likely to become more evident. Becoming more aware of your perfectionistic thoughts is the first step toward changing them—a topic that will be discussed in more detail in chapter 7.</p>

    <h2 class="sigilNotInTOC" id="heading_id_5">Trying to Confirm Perfectionistic Beliefs</h2>

    <p class="paft">Everyone likes to be correct. Therefore, people tend to seek out experiences that confirm their beliefs. In other words, people seek information in a biased way, in an effort to support their assumptions, interpretations, and thoughts. They prefer to spend time with people who think the way they do. If they are politically active, they may go to rallies for their own side—to hear what they already believe. If they are active in their religion, they may seek out experiences that bolster their religious beliefs (for instance, attending services at a church or some other place of worship) rather than seeking out experiences that challenge their beliefs.</p>

    <p>Unfortunately, this tendency to seek out information that confirms one’s beliefs can sometimes get people into trouble. For example, a person who has a fear of flying is likely to pay extra attention to stories in the media about airline crashes, compared to the attention paid to all the airplanes that take off and land safely. People who are feeling depressed are more likely to remember all the mistakes that they have made in the past, rather than their successes. People who are socially anxious and believe that others are judging them negatively are more likely to interpret ambiguous social information (something like being given an ambiguous look from another person) as confirming their feelings of inadequacy.</p>

    <p>People who are particularly perfectionistic are in danger of paying more attention to events that confirm their perfectionistic beliefs than to information that contradicts these beliefs. For example, students who are afraid to hand in term papers without checking them over repeatedly might remember stories they have heard about students who handed in exams without checking them over and happened to forget to answer an entire page of questions. They might ignore the fact that there are also many people who hand things in after rechecking their work once, twice, or not at all—without any negative consequences.</p>

    <h2 class="sigilNotInTOC" id="heading_id_6">Perfectionistic Thinking Styles</h2>

    <p class="paft">People do not think like computers. Computers use complex mathematical formulas to process information and solve problems. In contrast, people often interpret their environments using what psychologists call <em>heuristics</em>. A heuristic is a rule that people use to make a decision or interpret an event. For example, if an individual sees an unleashed dog while walking on the sidewalk, he or she might rely on various stereotypes about various dog breeds to help guide the decision of whether to cross the road and get away from the dog. If the dog is from a large breed known for biting, the individual might be more likely to avoid the dog than if it’s a smaller breed that is unlikely to do any serious damage. This rule of thumb (that is, “Avoid big, unleashed dogs that have a reputation for biting, but not dogs that are not known for biting”) is an example of a heuristic. Following this rule may improve one’s chances of not being bitten. However, it’s not always going to lead to a correct decision. Many large dogs with reputations for biting are perfectly safe, and some small dogs bite. Heuristics are quick ways of interpreting the environment and making decisions, and they often lead to correct decisions, which is why the human mind continues to rely on these strategies for processing information.</p>

    <p>However, sometimes people process information incorrectly or in ways that are biased. Psychologists sometimes refer to styles of thinking as <em>cognitive distortions</em>, particularly when they are biased in a negative direction. Proponents of cognitive therapy have identified a number of cognitive distortions that make people more likely to experience feelings of anxiety, depression, anger, and other negative emotional states.</p>

    <p>In this section, we will highlight some of these cognitive distortions and other styles of thinking that are especially relevant to perfectionistic thinking. We are indebted to people such as Aaron T. Beck, Albert Ellis, and David Burns for identifying these distortions. Note that these categories of negative thinking styles are not necessarily as distinct as they might seem on the surface. They overlap considerably, and a particular perfectionistic thought may fit into several of these categories.</p>

    <p class="bh">All-or-Nothing Thinking and Excessively High Standards</p>

    <p><em>All-or-nothing thinking</em> (also known as “black-and-white thinking,” “categorical thinking,” or “polarized thinking”) is a tendency to see things as either right or wrong, without recognizing that situations are often complex and that there are often many points on the continuum between the extremes of “right” and “wrong.” This is one of the most common cognitive distortions among people who are perfectionistic. All-or-nothing thoughts focused on the behavior of others (for example, “People can do things my way or the wrong way”) may be associated with anger, whereas all-or-nothing thoughts focused on one’s own behavior (for instance, “If I lose my temper with my children, I am a bad parent”) are more often associated with feelings of anxiety, depression, or inadequacy.</p>

    <p>Here are some examples of statements reflecting all-or-nothing thinking:</p>

    <ul>
      <li class="ulf">Anything less than sticking to my diet perfectly is a failure. If I eat one cookie, I may as well have eaten ten cookies.</li>

      <li class="ul">I always need to look perfect in front of other people.</li>

      <li class="ul">If I don’t get an A+ in this course, I don’t deserve to be in this program.</li>

      <li class="ul">My reports are never good enough.</li>

      <li class="ul">I seem to be the only person in this house who knows how to clean things properly.</li>

      <li class="ull">There is a right way and a wrong way to do everything.</li>
    </ul>

    <p>All-or-nothing thinking may also be thought of as being related to having excessively high standards. People who are perfectionistic often have standards, either for themselves or for others, that are unrealistic or excessively high. Although it is sometimes helpful to have standards that are slightly higher than your current level of performance (this gives you a goal that you have a good chance of reaching), perfectionism is often associated with having standards that are extremely ­difficult, if not impossible, to attain. Consider the following examples.</p>

    <p>Deborah feels inadequate if she is not able to manage all the demands in her life, which include working full time, taking a night course two evenings a week, being attentive to her partner, cooking for her family, spending several hours a day with her children, visiting her parents weekly, spending time with several of her close friends, and finding time to nurture herself.</p>

    <p>All of his life, Mark has wanted to be an attorney. In fact, there is nothing else that he can imagine doing. Unfortunately, he is a senior in college, his average is a C, and he is very unlikely to be accepted into law school.</p>

    <p>Louis is constantly correcting his seven-year-old son’s use of language, to the point that his son is sometimes afraid to speak in front of him. The son cannot understand why he is always being corrected by his father, since his grades are among the highest in his class and he is often told by his teachers, friends, and other family members that he speaks very well.</p>

    <p>Alexis weighs 130 pounds and is five feet, four inches in height. Although her doctor insists that she is not overweight, and her friends tell her she looks great, Alexis feels guilty because she cannot seem to reach her goal weight of 110 pounds.</p>

    <p class="exh">Exercise 3.3 All-or-Nothing Thinking</p>

    <p class="paft">In your journal, record examples of all-or-nothing thinking that you engage in from time to time, as well as standards you hold that others might consider excessively high.</p>

    <p class="bh">Filtering</p>

    <p><em>Filtering</em> is a tendency to selectively focus on and magnify negative details at the expense of positive information, which is dismissed as less important. Here are some examples of filtering:</p>

    <p>Ella receives a two-page performance evaluation at work that is very positive overall, emphasizing that she is among the most valued ­employees in the company. However, she feels angry and hurt over one criticism suggesting that she try to participate more in meetings.</p>

    <p>When people tell Rico that he looks good, he assumes that they are being insincere and that they actually feel sorry for him or are trying to manipulate him in some way. In contrast, when someone tells Rico that he looks tired, he assumes that they find him unattractive, and he feels extremely self-conscious.</p>

    <p>Carrie is a tenth-grade student who has gained five pounds. She is sure that everyone at school finds her unattractive now, despite the fact that she is often asked out on dates and her friends tell her that she looks great.</p>

    <p>Mia’s daughter has become much better at putting away her toys in recent months. However, on one occasion when she left a toy on the steps, Mia became very angry.</p>

    <p class="exh">Exercise 3.4 Filtering</p>

    <p class="paft">Do you engage in filtering from time to time? In your journal, record examples of filtering from your own life.</p>

    <p class="bh">Mind Reading</p>

    <p><em>Mind reading</em> involves assuming that you know what other people are thinking and that their thoughts about you are negative. This style of thinking is common in people who are perfectionistic and may contribute to feelings of depression and anxiety. Examples of mind reading include the following:</p>

    <p>When Evelyn’s supervisor does not give Evelyn feedback on her report for over a week, Evelyn assumes this is because her supervisor thought that the report was not good enough.</p>

    <p>After cooking dinner for several friends, Jack is convinced that his guests are not enjoying their food when one of them excuses himself from the table to visit the bathroom.</p>

    <p>Ricardo is hurt and angry when a woman he is attracted to fails to return his phone call. He is certain that she is either irresponsible or uninterested in him, and he wonders if he’ll ever find a partner who meets his high standards.</p>

    <p class="exh">Exercise 3.5 Mind Reading</p>

    <p class="paft">Do you engage in mind reading from time to time? In your journal, record examples of mind reading from your own life.</p>

    <p class="bh">Probability Overestimations</p>

    <p>Perfectionism is often associated with a tendency to predict that negative events are more likely to occur than they really are. We call these predictions <em>probability overestimations</em>. Here are some examples:</p>

    <p>Alex is a straight-A student, yet before every exam, he believes that he is definitely not going to pass.</p>

    <p>Francesca is sure that she is going to come across as unprepared and dull during her presentation, even though she is well-prepared and her coworkers usually enjoy her talks.</p>

    <p>Mary rarely misses work and is highly regarded by her supervisors. Yet, when she must take off a few days due to illness, she believes that her boss will not believe she is sick and that she will receive a negative performance appraisal.</p>

    <p class="exh">Exercise 3.6 Probability Overestimation</p>

    <p class="paft">Do you engage in probability overestimation from time to time? In your journal, record examples of probability overestimation from your own life.</p>

    <p class="bh">Tunnel Vision</p>

    <p><em>Tunnel vision</em> is a cognitive style in which people pay too much attention to detail and therefore miss the big picture. This can also be thought of as “missing the forest for the trees.” Tunnel vision can slow people down and get in the way of task completion. Following are a few examples of tunnel vision:</p>

    <p>Peter spent many hours reading and taking hundreds of pages of notes in preparation to complete his ten-page paper on World War II.</p>

    <p>Before making any new purchase, no matter how small, David spends many hours reading past issues of <em>Consumer Reports</em>, talking to sales people, and discussing his options with friends.</p>

    <p>When taking multiple-choice exams at school, Amy obsesses about the meaning of each question and often does not finish the exam before she runs out of time.</p>

    <p>Susan spends so much time organizing (making lists, filing, putting things in order) that she is often not able to finish her work.</p>

    <p class="exh">Exercise 3.7 Tunnel Vision</p>

    <p class="paft">Do you have tunnel vision from time to time? In your journal, record examples of tunnel vision from your own life.</p>

    <p class="bh">Interpersonal Sensitivity</p>

    <p>People who are perfectionistic are often overly concerned about the opinions of others. Most people prefer to be liked by others. However, perfectionism may be associated with an extreme need for approval from others. Examples of beliefs reflecting exaggerated interpersonal sensitivity include:</p>

    <ul>
      <li class="ulf">It is very important that everyone likes me.</li>

      <li class="ul">If others think I am incompetent, then I am incompetent.</li>

      <li class="ul">If someone doesn’t love me, then I am unlovable.</li>

      <li class="ull">It is very important not to make mistakes so that others will approve of me.</li>
    </ul>

    <p class="exh">Exercise 3.8 Interpersonal Sensitivity</p>

    <p class="paft">Is interpersonal sensitivity a problem for you? In your journal, record examples of interpersonal sensitivity in your own life.</p>

    <p class="bh">Catastrophic Thinking</p>

    <p><em>Catastrophic thinking</em> (also known as <em>catastrophizing</em>) involves incorrectly assuming that one could not cope with a negative outcome if it were to occur. This style of thinking also includes predictions that particular events would be unmanageable if they were to occur. Catastrophic thinking is common in people who are prone to experiencing problems with anxiety, depression, and anger. Examples of catastrophic thinking include:</p>

    <ul>
      <li class="ulf">I couldn’t handle making a mistake in front of the class.</li>

      <li class="ul">It would be absolutely terrible if I missed a deadline.</li>

      <li class="ul">If this deal doesn’t go through, I don’t know how I will manage.</li>

      <li class="ul">If I do not stay thin, nobody will ever be attracted to me.</li>

      <li class="ul">If I back down or change my mind, I will be perceived as weak.</li>

      <li class="ull">It would be unmanageable to develop an illness that caused me to miss even a day of work.</li>
    </ul>

    <p class="exh">Exercise 3.9 Catastrophic Thinking</p>

    <p class="paft">Do you engage in catastrophic thinking from time to time? In your journal, record examples of catastrophic thinking from your own life.</p>

    <p class="bh">Excessively Rigid Standards and Inflexibility</p>

    <p>Everyone has standards that not only influence their own behavior, but also help them to decide whether to attempt to influence the behavior of others (for example, providing constructive feedback to coworkers to improve their performance on a project). When people cannot achieve a particular goal or are unable to influence someone else, they may either keep trying or lower their standards or expectations. Perfectionistic people sometimes view a decision to lower their standards as giving up or settling for less than they should. This view may make it difficult to be flexible with respect to one’s standards for oneself or for others. It may be very hard for people who have developed an inflexible style or are critical of themselves or others to know when it is okay to break rules. Following are some examples of excessively rigid standards:</p>

    <p>Laura always arrives home before her midnight curfew. On the weekend of her high school prom, Laura asked her parents for permission to come home at 1:00 a.m., since the prom ended at midnight. Her parents refused to allow her to come home later, explaining that her curfew was midnight and that there could be no exceptions.</p>

    <p>Graham was used to winning when he played squash. When he lost to a friend from work, he was quite angry and found it difficult to accept that he had lost the game.</p>

    <p>Jonathan had just made a very nice dinner for his girlfriend. However, she refused to eat the dinner because she noticed that he had forgotten to wash his hands before cooking it.</p>

    <p>Paul is accustomed to running five miles each day to keep fit. One week, he comes down with a bad case of the flu and ends up feeling like a failure because he was unable to run for three days.</p>

    <p>Angela gets very upset whenever plans are changed. For example, if she and her husband decide to see a movie and the movie ends up being sold out, Angela becomes very angry and disappointed at the prospect of having to find something else to do.</p>

    <p class="exh">Exercise 3.10 Rigid Standards and Inflexibility</p>

    <p class="paft">Are rigid and inflexible standards sometimes a problem for you? In your journal, record examples of times when you were unwilling or unable to settle for less.</p>

    <p class="bh">Over-Responsibility and an Excessive Need for Control</p>

    <p>Often, people who are perfectionistic believe that they have more control over events in their life than they actually do. This may lead people to feel overly responsible for events that, in reality, they cannot control. Feelings of over-responsibility can lead people to spend too much time on tasks, to engage in excessive checking and rechecking, or to go to great lengths to protect themselves from making a mistake or from being harmed. Perfectionistic individuals may also believe that it is important to control the behavior or thoughts of other people in their lives in order to prevent them from making mistakes or encountering harm. These beliefs can lead to relationship problems if individuals are frequently critical of the behavior of their loved ones. Some example statements reflecting a sense of over-responsibility or an exaggerated need for control include:</p>

    <ul>
      <li class="ulf">If I spend a long time double checking the content of my letter before I send it, I can make sure that there is nothing in there that might be offensive.</li>

      <li class="ul">If I practice this talk enough times, I can ensure that everyone in the audience will like it.</li>

      <li class="ul">I can prevent my daughter from getting sick if I constantly remind her to dress warmly, eat her vegetables, wash her hands, get enough sleep, and so on.</li>

      <li class="ul">I can control whether others like me by being very careful about how I phrase things when I speak.</li>

      <li class="ul">It’s important for me to be able to convince people to do things my way at work.</li>

      <li class="ull">I need to correct other people when they make mistakes, no matter how small.</li>
    </ul>

    <p class="exh">Exercise 3.11 Over-Responsibility and Need for Control</p>

    <p class="paft">Do you have an inflated sense of responsibility or a high need for control? If so, record some examples in your journal.</p>

    <p class="bh">Should Statements</p>

    <p><em>Should statements</em> are arbitrary rules for how things ought to be. If others break these rules, a person may feel angry or resentful. If individuals break their own rules, feelings of guilt, sadness, inadequacy, or anxiety often occur. Statements containing the words “should” or “must” are often a sign that one is engaging in this style of thinking. Following are a few examples of “should” statements:</p>

    <ul>
      <li class="ulf">My children should always do what I tell them to do.</li>

      <li class="ul">My coworkers should never be late for work.</li>

      <li class="ul">I should never make mistakes at work.</li>

      <li class="ul">I should never come across as nervous or anxious.</li>

      <li class="ul">I should be able to anticipate problems before they occur.</li>

      <li class="ul">I should be assertive and, at the same time, never upset other people.</li>

      <li class="ull">I must never get a grade lower than an A.</li>
    </ul>

    <p class="exh">Exercise 3.12 Should Statements</p>

    <p class="paft">Do you have a lot of shoulds in your life? In your journal, record examples of your shoulds.</p>

    <p class="bh">Difficulty Trusting Others</p>

    <p>Perfectionism is often associated with a difficulty in trusting others to complete tasks. People who are perfectionistic might have difficulty delegating tasks to others or may feel the need to watch people closely when they are completing tasks at work or in other situations. Examples of statements reflecting difficulty trusting others include:</p>

    <ul>
      <li class="ulf">If I let my partner cook dinner for me, I will not enjoy my food.</li>

      <li class="ul">I have to do everything myself because other people just don’t know how to get the job done properly.</li>

      <li class="ul">If I send my husband to pick up a new telephone, he will probably get the wrong one.</li>

      <li class="ull">I don’t like other people to buy me gifts because they couldn’t possibly know what I want.</li>
    </ul>

    <p class="exh">Exercise 3.13 Difficulty Trusting Others</p>

    <p class="paft">Do you find it difficult to trust others? In your journal, record some examples.</p>

    <p class="bh">Inappropriate Social Comparisons</p>

    <p>One strategy that we all use to evaluate our performance is to compare ourselves to other people. Everyone engages in social comparisons from time to time in order to see how they measure up compared to others whom they perceive as similar to them. For example, if you receive a raise at work, you might be interested in knowing whether other individuals doing similar jobs received comparable raises. Following a test in school, students often try to find out how other people in the class performed on the exam. Usually, people compare themselves to others whom they perceive to be similar or slightly better than them in the dimension being compared. So, following a term test, average students are likely to compare themselves to other average students. This would tell them more about their own performance than making comparisons to the top student or the weakest student in the class.</p>

    <p>People who are particularly perfectionistic might find themselves making social comparisons more frequently than other people and may be more likely to experience negative emotions following these comparisons. Perfectionistic individuals may also compare themselves to others in a manner that serves to maintain their perfectionistic attitudes. Thus, they may compare themselves to others who are much stronger in a particular dimension, thereby strengthening their beliefs that they have to meet an almost impossibly high standard. In fact, in any particular dimension you choose to measure (for instance, intelligence, sense of humor, creativity, athletic ability, physical appearance, and so on), there will likely always be someone else who you perceive as being “better.” Comparing yourself to others whom you perceive as much better in a specific dimension may help to maintain perfectionistic beliefs and foster a negative self-image or feelings of inadequacy. Following are examples of inappropriate social comparisons:</p>

    <p>Neil compares his athletic ability to that of a professional athlete and feels pressure to meet that standard.</p>

    <p>Sheila feels inadequate after reading a new fashion magazine and thinking that she will never be as thin or attractive as the models in the magazine.</p>

    <p>Danielle feels like a failure after finding out that her friend received a higher exam grade than she, even though her friend usually receives the highest grades in all her classes.</p>

    <p class="exh">Exercise 3.14 Inappropriate Social Comparisons</p>

    <p class="paft">Do you tend to compare yourself to others in a way that makes you feel worse? In your journal, record some examples.</p>

    <h2 class="sigilNotInTOC" id="heading_id_7">Looking Ahead</h2>

    <p class="paft">In summary, identifying your perfectionistic thoughts and understanding the relationship between thinking and perfectionism are important steps in overcoming excessively high standards. Later in the book, we will discuss strategies for changing your perfectionistic thoughts. First, however, we will provide an overview of the ways in which certain types of behaviors can help to maintain your perfectionism. As we explain in the next chapter, perfectionistic thoughts and behaviors are closely related in that perfectionistic beliefs can lead to perfectionistic behaviors and perfectionistic behaviors can help to maintain perfectionistic beliefs. It is difficult to overcome perfectionism without addressing both the thoughts and behaviors that contribute to the problem.</p>
