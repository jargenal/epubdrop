    <p class="cn">Chapter 13</p>

    <h1 id="heading_id_2">Perfectionism and Worry</h1>

    <p class="paft">Everyone worries from time to time, particularly about events over which they have little control. We all endure daily stresses that affect our jobs, school performance, relationships, and other areas of our lives. In these circumstances, it’s common to worry about possible negative outcomes. Just like sadness, anger, and other emotional states, worry is a normal part of life. However, worry can become a problem when it interferes with functioning (for example, making it difficult to concentrate or sleep), causes a lot of distress, or continues even in situations where there is no realistic reason to be worried.</p>

    <p>This chapter is written primarily for people who find that they worry often, for long periods of time, and with such intensity that they experience problems such as appetite loss, headaches, or sleeplessness as a result. The information here may also be of value to people who find themselves getting overly tense, irritable, and restless when they are faced with real problems to solve.</p>

    <h2 class="sigilNotInTOC" id="heading_id_3">What Is Worry?</h2>

    <p class="paft">Worry involves running over some possible future event in your mind over and over again. Worry is a natural response to feeling anxiety, apprehension, foreboding, or uneasiness. Normally, people worry when there is a reason to be concerned about the outcome of some situation or problem. Most people deal with this sort of worry by assessing the problem they face, getting advice if they need it, and solving the problem if they can. If the problem can’t be solved right away, they can usually put the problem out of their minds, at least temporarily, while they go about their business. They may say to themselves, “I will worry about that later; there’s nothing I can do about it right now.” This type of self-talk can be helpful and is one strategy that many people use to deal with normal, day-to-day worries.</p>

    <h2 class="sigilNotInTOC" id="heading_id_4">Generalized Anxiety Disorder</h2>

    <p class="paft">Although most people are able to put their worries aside when necessary, some people have difficulty turning their worries off. In a condition called <em>generalized anxiety disorder</em> (GAD), worry is experienced as difficult to control, and it occurs at an intensity and frequency that leads to significant interference in people’s lives. Among people with GAD, worry is excessive, unrealistic, or out of proportion to the actual threat. In addition, the worry is present most days and lasts for an extended period of time. In fact, many people with GAD report that their worry has been a problem for as long as they can remember. Along with the worry, people with GAD experience a range of other symptoms, including feeling restless, keyed up, or on edge; being easily fatigued; having difficulty concentrating or having their mind go blank; experiencing irritability; having muscle tension; and experiencing sleep problems (including trouble falling asleep, problems staying asleep, or not feeling rested in the morning). Often, it’s the physical complaints, such as insomnia, muscle pain, and headaches that bring people with GAD to seek help from their doctor or another professional.</p>

    <p>GAD affects about 5 to 6 percent of the general population and is slightly more common among women than men (Kessler et al., 2005; Wittchen and Hoyer 2001). It often has a gradual onset, beginning quite early in life. However, for some people, the problem begins after some significant life stress, such as a death in the family or the loss of a job. The intensity of the worry may fluctuate over time. As you might expect, the worry is often worse during times of stress or when there is some realistic threat. Paradoxically, however, some people with GAD describe themselves as very calm and capable during actual emergencies or when there is a real threat to be confronted.</p>

    <h2 class="sigilNotInTOC" id="heading_id_5">What Do People Worry About?</h2>

    <p class="paft">Most worriers tend to be anxious across different areas of their life, rather than worrying about just one or two topics. In fact, when asked what they worry about, people with GAD often report that they worry about “everything.” Common worry topics for people who are prone to worry include:</p>

    <ul>
      <li class="ulf">Work or school performance (for example, worries about getting fired, failing exams, and so on)</li>

      <li class="ul">Household chores (for instance, excessive worry about not being able to get everything done)</li>

      <li class="ul">Money and finances (for example, anxiety about going bankrupt or not being able to pay the bills)</li>

      <li class="ul">Health and safety of self (for instance, fear of contracting an illness)</li>

      <li class="ul">Health and safety of family and friends (for example, worry about the children’s health)</li>

      <li class="ul">Relationships (for instance, unnecessary anxiety about spouse being unfaithful)</li>

      <li class="ull">Other minor matters (for example, worry about finding a parking spot when driving to work)</li>
    </ul>

    <h2 class="sigilNotInTOC" id="heading_id_6">The Nature of Worry</h2>

    <p class="paft">We now know that worry is something that people do in order to <em>reduce</em> their anxiety. There is evidence that people worry to distract themselves from physical feelings associated with anxiety, as well as from mental imagery that they find frightening (for instance, the image of one’s family dying in a car accident). In fact, a significant number of people who worry excessively believe that worry is a good thing. They may believe that being a worrier prepares them for possible danger, helps them to prevent bad things from happening, and makes them a caring person. Of course, there is no evidence that worry prevents negative events or that worriers are more caring people than those who don’t worry excessively.</p>

    <p>In addition, research has consistently shown that people who worry excessively pay more attention to threat-related information than people who are less prone to worry (Mogg and Bradley 2005). In other words, if you are a worrier, chances are that you frequently look out for possible cues that something is about to go wrong. This tendency to be on guard for threat contributes to other problems that are associated with worry, including difficulty concentrating or thinking clearly and difficulty falling asleep at night. For a perfectionist, there may be the added demand of having to scan the environment well enough to catch <em>each and every</em> indicator of possible threat or danger.</p>

    <p>Where does this tendency to always be on guard come from? There is evidence that a history of unpredictable negative events may play a role. Several studies demonstrated that the ability to predict the onset of stressful events affects whether an organism will experience chronic arousal later on (Kandel 1983). In this series of classic experiments, two different groups of sea slugs were exposed to mild electric shocks. In one group, the sea slugs were exposed to shock only when a light was turned on, but not when the light was off (the presence of the light made the shock predictable). In the second group of sea slugs, shocks were administered randomly, regardless of whether the light was on or off (the shock was unpredictable). The purpose of the study was to evaluate the effects of predictable versus unpredictable shock on arousal.</p>

    <p>After experiencing the predictable shocks, the first group of sea slugs developed a pattern of arousal that was linked to whether the light was on or off. When the light was on, they showed signs of arousal; when the light was off, they were in their normal resting state. In contrast, after only a few shocks, the sea slugs that received unpredictable shocks became aroused constantly, regardless of whether the light was turned on or off. This group also showed measurable nervous-system changes (sea slugs have neurotransmitters too!) that were not present in the sea slugs that received predictable shocks. The chronic arousal seen in the “unpredictable shock” group is analogous to the chronic arousal reported in people suffering from GAD. Muscle tension is an indirect indicator of arousal and is perhaps the most characteristic physical symptom among chronic worriers. Instead of having peaks and valleys of muscle tension, people with GAD have heightened tension that tends to change relatively little over time.</p>

    <p>The implication of Kandel’s research for humans is that a history of predictable stressful events may make it easier to turn off worry when the danger or threat has passed. In contrast, for people who experience a series of unpredictable stressful events, there may be increased risk for developing problems with chronic anxiety and worry. Although it may seem like a bit of a leap to generalize from sea slugs to humans, there is also evidence from research on people showing that unpredictable and uncontrollable negative events are a risk factor for developing problems with anxiety (Barlow 2002).</p>

    <h2 class="sigilNotInTOC" id="heading_id_7">Perfectionism and Worry</h2>

    <p class="paft">Frequently, the basis for excessive worry is a need to completely predict and control negative events combined with a belief that failing to control events will lead to some disaster that might otherwise have been avoided. People who worry excessively also have difficulty tolerating uncertainty. If they don’t know exactly what is going to happen in an uncertain situation, they often assume the worst. Because perfectionism is associated with standards and expectations that are impossible to meet, people who are perfectionistic are at risk for having events not turn out as desired. For example, if you believe that everyone should always be fifteen minutes early for every appointment, it may be difficult for you to deal with a partner or child who is always running five minutes late. The more intolerant you are of lateness, the more likely you are to be disappointed by other people, and the more likely you are to have a perceived reason to worry.</p>

    <p class="bh">Procrastination and Worry</p>

    <p>Worriers have difficulty sorting out real problems from a background of possible problems that might come along. As a consequence, they may procrastinate and avoid solving problems that arise. It is hard to settle down to sort out one difficulty if you are predicting that there will be other problems that will demand your attention. In fact, you may believe that your attempt to solve one problem will lead to several new problems that will just make things worse. For example, a perfectionistic student may be frightened to ask for help with an assignment, fearing that this request will result in the teacher thinking he or she is lazy or incompetent. The student may therefore avoid working on the assignment completely, and in the end create even more problems as a result. In this example, perfectionistic worry is associated with the belief that “It is better to do nothing than to take a risk and fail.”</p>

    <p>Avoidance and procrastination are often reinforced or rewarded, especially in the short term. By avoiding an anxiety-provoking situation, you may temporarily feel relief from not having had to deal with the problem. You may be rewarded further if the person who had asked you to do the job forgets to check that the work was completed or changes his or her mind about needing it done. Nevertheless, despite the short-term benefits, procrastination may well lead to negative consequences down the line. For example, you may be left with having to complete your work in a much shorter time than was originally available and under a lot more pressure. In these circumstances, it is unlikely that you will do your best work, and you will probably feel dissatisfied in the end. The need to feel perfectly in control over the outcome and the tendency to avoid taking certain risks may actually make it harder to do a good job.</p>

    <p class="bh">Overcompensation and Worry</p>

    <p>Overcompensating involves taking steps above and beyond those that most people might take to prevent some dreaded event from occurring (see chapter 4 for a more detailed description). For example, parents who are constantly worried about the health of their children may insist on checking their child’s temperature at the first sign of any physical symptoms and may even take the child out of school whenever another child in the class is ill. Consider the following case examples.</p>

    <p>Joan had two female friends who were both diagnosed with breast cancer several years ago. Although both friends were successfully treated for the illness, Joan subsequently developed intense worry about the possibility of developing cancer herself or of a family member becoming seriously ill. She began to ask for constant reassurance from her husband and children. She was married to a physician, who initially agreed to examine her and their children as often as Joan requested in an effort to reassure her that they did not have cancer. Eventually, Joan’s husband lost patience with her daily requests for reassurance. Her children also refused to answer her continual questions about their health. Joan began to worry that her husband’s refusal to examine her was because he had found something wrong with her health and was hiding it from her. Joan avoided seeing her family physician for fear that the doctor might confirm her fear that she was seriously ill. As a result of Joan’s constant requests for reassurance, there was considerable strain in the family and she worried that her husband was losing interest in their marriage.</p>

    <p>Randall was the father of two daughters in their late teens, both of whom were very successful students. Randall had always worried about how well they did in school and kept very close tabs on their homework. He was also concerned about their safety when they were walking home after school (a total of two blocks). When they were accepted into college, they both decided to move to a city on the other side of the country. Randall tried to get a transfer in his company to be near his children, but his wife didn’t want to interrupt her career. She also felt that their daughters should have the freedom to spend some time away. When they left home, Randall found he could not stop worrying about their safety and became very distracted at work. He tried to cope with his anxiety by calling his children as many as three times a day, though his frequent phone calls irritated his daughters and didn’t really help to reduce his anxiety for more than a few minutes.</p>

    <h2 class="sigilNotInTOC" id="heading_id_8">Treatments for Worry, GAD, and Perfectionism</h2>

    <p class="paft">A number of treatment approaches have been successfully used to treat GAD and excessive worry, including medications, relaxation training, challenging anxiety-provoking thoughts, exposure to feared imagery, preventing safety behaviors, acceptance and mindfulness-based strategies, and problem-solving training. If your perfectionism appears to be related to GAD and excessive worry, you may find these strategies useful.</p>

    <p class="bh">Treatments Using Medication</p>

    <p>The earliest medications shown to be effective for treating GAD were the benzodiazepines (also known as tranquilizers), which are also used sometimes as muscle relaxants or sleep medications (Roy-Byrne and Cowley 2007).The benzodiazepines include such drugs as diazepam, lorazepam, alprazolam, clonazepam, and others. These drugs work very quickly and tend to be quite effective in the short term. Although some people find that these drugs are useful for long-term treatment, their effectiveness may decrease as time goes on unless the dosage is increased. Increasing the dosage of these medications puts people at risk for marked side effects, including drowsiness. In addition, because the withdrawal symptoms for these drugs can include intense anxiety, many people have difficulty discontinuing benzodiazepines. Today, physicians often avoid prescribing these drugs for more than a few weeks at a time.</p>

    <p>Another type of anti-anxiety medication is a drug called buspirone. This medication is derived from a completely different family than the older tranquilizers and does not produce drowsiness or dependence. It takes a few weeks to have an effect and therefore is not used for acute anxiety. It is as effective as the benzodiazepines and may work better for people who have not previously used traditional anti-anxiety medications.</p>

    <p>Finally, as is the case for other anxiety problems, antidepressants are an effective treatment for GAD and chronic worry. In fact, they are often the treatment of choice for this problem. People who are anxious are often very sensitive to the side effects of antidepressants and can become very agitated with the first few doses. Therefore, these medications should be started at very small doses which then are slowly increased. Treatment should continue for at least several months, and there is a strong risk of relapse after stopping the medication. See chapter 10 for additional information on antidepressant medications. The table below provides a summary of medications that have been shown to be effective for treating GAD. Brand names are in parentheses.</p>

    <p class="bh">Relaxation Training</p>

    <p>Chronic worry can be lessened by learning to relax. Several relaxation methods are available. <em>Progressive muscle relaxation</em> involves learning to relax the muscles of the body to decrease feelings of tension, stress, and anxiety. A second method, known as <em>imagery</em>, involves learning to imagine particular scenes that are soothing. Finally, learning to breathe slowly and smoothly can help a person to relax. For more information on relaxation training, check out Further Readings at the end of this book.</p>

    <p>The main difficulty with relaxation training is that people often forget to practice. Scheduling regular periods to practice at the same time each day will increase the chances of benefiting from this approach. For example, you could try scheduling the practices just before or after other activities that commonly happen throughout your day (for instance, having a drink of water, going to the bathroom, traveling to and from work, and so on). Even taking a few minutes two or three times a day to breathe slowly from the abdomen is a very useful way of breaking up the seemingly never-ending stream of tension and anxiety.</p>

    <p class="bh">Challenging Anxiety-Provoking Thoughts</p>

    <p>One way of combating anxiety is to challenge the thoughts, beliefs, and predictions that contribute to your anxiety. Chapter 7 provides a detailed description of these strategies, and in this section we describe how to apply these strategies to GAD and excessive worry.</p>

    <p class="ch">Examining the Evidence</p>

    <p>Worry is usually associated with two main types of thoughts. The first type of thought is a tendency to overestimate the probability of some unlikely event. In the case examples we presented earlier in this chapter, Joan overestimated the likelihood of developing a serious illness. Randall overestimated the likelihood of something bad happening to his children.</p>

    <p>The second common style of thinking involves overestimating just how bad it would be if a negative event were to occur. An example of such a thought is, “It would be an absolute disaster if I arrive at the movie theater and there is nowhere to park.” In reality, this situation would probably be manageable if it actually occurred.</p>

    <p>In order to combat negative thinking that contributes to worry, it can be helpful to examine the accuracy of your beliefs. This process involves asking yourself a series of questions that help you to assess the situation in a more realistic way. Following are some anxious thoughts and some questions that you might ask yourself to challenge anxious thoughts:</p>

    <p class="ch">Anxiety-Provoking Thoughts</p>

    <ul>
      <li class="ulf">I am going to fail the exam.</li>

      <li class="ul">I haven’t studied enough for this exam.</li>

      <li class="ul">I don’t know the material for this test.</li>

      <li class="ull">If I fail the test, I will never get into graduate school, and I will never amount to anything in life.</li>
    </ul>

    <p class="ch">Questions for Examining the Evidence</p>

    <ul>
      <li class="ulf">Do I know for sure that I will fail the exam?</li>

      <li class="ul">Have I done well on past exams, even when I thought I would fail?</li>

      <li class="ul">Did I study less than I usually do for similar exams?</li>

      <li class="ul">What is really likely to happen if I fail the exam?</li>

      <li class="ul">Are the results of a single exam likely to have a huge impact on my overall average?</li>

      <li class="ull">Is it possible for a person to fail a single exam and still do well in life?</li>
    </ul>

    <p>Attempting to answer questions such as these is a powerful method for challenging the perfectionistic beliefs that contribute to your worry. Following is an illustration of how Zack’s therapist helped him to use this method for challenging anxious thoughts about money and finances:</p>

    <p class="diaf">Zack: I am constantly worried about not having enough money to pay the bills. It drives my wife crazy, because I’m always trying to control the way she spends her money.</p>

    <p class="dia">Therapist: Specifically, what are you predicting will happen?</p>

    <p class="dia">Zack: I’m afraid that I won’t have enough money to pay the rent or to make my car payment. I also worry about my credit-card bills getting out of hand. Sometimes I even think that I will go bankrupt. I worry that the whole family will end up living on the street.</p>

    <p class="dia">Therapist: Do you have any evidence to support these predictions?</p>

    <p class="dia">Zack: No, not really. In fact, I pay off my credit-card balance each month. I’m even two payments ahead on my car loan.</p>

    <p class="dia">Therapist: Can you think of any evidence that contradicts your worries about money?</p>

    <p class="dia">Zack: To start, I have never been in debt before. Also, I’ve never missed a bill payment in the past, even though I worry about it all the time.</p>

    <p class="dia">Therapist: What if you were short for several of your bills on a particular month?</p>

    <p class="dia">Zack: That would be terrible.</p>

    <p class="dia">Therapist: What would actually happen?</p>

    <p class="dia">Zack: I imagine that my debts would start to double and triple. I might never get out of debt.</p>

    <p class="dia">Therapist: Do you know anyone who once missed a bill payment?</p>

    <p class="dia">Zack: My brother misses payments from time to time.</p>

    <p class="dia">Therapist: What happens when he misses a payment?</p>

    <p class="dia">Zack: Nothing seems to happen. He usually just makes it up the next month.</p>

    <p class="dia">Therapist: Do you know anyone who has declared bankruptcy?</p>

    <p class="dia">Zack: Someone I work with declared bankruptcy about a year ago.</p>

    <p class="dia">Therapist: Did this coworker end up living on the street?</p>

    <p class="dial">Zack: No. In fact, she was under much less stress after the bankruptcy than before. (pause) I guess even if I had a temporary financial setback, I could manage it.</p>

    <p class="ch">Shifting Perspectives</p>

    <p>It is often easier to solve another person’s worries than your own. Therefore, a helpful strategy for dealing with your own worries is to imagine that you are giving suggestions to a close friend or relative who has similar worries. Consider the following dialogue as an example:</p>

    <p class="diaf">Emily: I am terrified to go to sleep at the end of the day. I lie in bed worrying that a stranger is going to come into my home in the middle of the night. It’s even worse when my partner and children are away.</p>

    <p class="dia">Therapist: When you get into bed, how likely do you think it is that someone will break into your home?</p>

    <p class="dia">Emily: Realistically, I know the chances are low. It’s never happened before. But, when I’m lying there, trying to fall asleep, it feels much more likely. Maybe 50 percent likely.</p>

    <p class="dia">Therapist: Do you worry that people might break into your friends’ and neighbors’ homes?</p>

    <p class="dia">Emily: No, not really. It feels like it’s more likely to happen in my home, although I know that doesn’t make any sense.</p>

    <p class="dia">Therapist: What would you say to neighbors who were fearful of having someone break into their house?</p>

    <p class="dia">Emily: I would probably say that it is unlikely. I would remind them that they have lived there for several years, and there has never been a break-in before.</p>

    <p class="dial">Therapist: Can you apply that same logic for your own situation?</p>

    <p class="ch">Tolerating Uncertainty and Ambiguity</p>

    <p>Learning to tolerate uncertainty can combat your tendency to worry about unpredictable and uncontrollable situations. There are many situations that you can’t predict or control. Fortunately, however, it’s not terribly important that you be able to control most situations. A helpful way of tolerating unpredictable events is to generate a list of possible outcomes and to consider ways of dealing with each outcome. For example, if you are stuck in traffic and are late for a job interview, you have two options. You can worry about how terrible it is that you are late, or you can accept the fact that you are late, even though you don’t know what the outcome will be. Perhaps the interviewer will be understanding and squeeze you in at a later time. Perhaps the interviewer will reschedule the appointment for another day. Perhaps the interviewer will confront you about being late and send you home without the opportunity to ­interview again. Regardless of what happens, chances are that the outcome will be manageable.</p>

    <p class="ch">Hypothesis Testing</p>

    <p>If you tend to make unrealistic predictions about negative things that might happen, testing the validity of your predictions using mini-experiments can be a helpful way of challenging your anxious thoughts. Before conducting the experiment, make one or more explicit predictions regarding the outcome. Then, conduct the experiment and evaluate the outcome. Did your predictions come true? If so, was it as bad as you expected? For example, if you are worried about an airline losing your luggage on your next trip, check your luggage at the gate and see what happens. If your luggage doesn’t get lost, you will have gained valuable information about the likelihood of losing your luggage. If your luggage does get lost, you may learn that the situation is not as bad as you feared it would be (lost luggage is often found a few hours later).</p>

    <p class="bh">Exposure to Feared Imagery</p>

    <p>As we mentioned earlier, worry is often used as a strategy to avoid experiencing frightening mental imagery. You learned in chapter 8 that one of the most effective ways of overcoming fear is to expose oneself to feared objects and situations. For examples, if you fear heights, your fear will gradually decrease as you begin to spend more time in high places. People who worry excessively often fear experiencing certain images and feelings. Therefore, treatments for GAD have begun to include exposure to these images and feelings as a component of therapy.</p>

    <p>Imagery exposure involves a few steps. First, it is important to come up with an image that is disturbing to you. For example, if you are anxious about an upcoming exam, you might imagine being in the exam and not knowing the answers to any of the questions. It’s helpful to write out an imagery script describing all the details. As you develop your script, be sure to describe the situation in as much detail as possible. Continuing with the example of an upcoming exam, your script might include a description of the room, the color of the exam paper, who else is in the room, where the teacher or professor is standing, and so on. You should include details related to all senses. In addition to describing what you <em>see</em> in the room, your script should include a description of what you <em>hear</em>, <em>smell</em>, and <em>feel</em>. For example, is the room warm or cold? Can you hear the buzz of the lights? Also, be sure to include a description of your own responses in the script, including any thoughts running through your head and any physical feelings you are experiencing in the imagined situation.</p>

    <p>Often, people read their script into a recorder and then listen to it repeatedly for about thirty minutes per day, until it no longer arouses anxiety. A detailed description of how you can use imagery exposure to combat anxiety is described elsewhere (Antony and Norton 2009).</p>

    <p class="bh">Preventing Safety Behaviors</p>

    <p>Try to ride out your worry without engaging in perfectionistic behaviors such as checking or seeking reassurance. As discussed in chapter 4, these behaviors block you from learning that your anxious thoughts are unrealistic. By preventing these behaviors, you will learn to tolerate uncertainty and imperfection. For more details on prevention of safety behaviors, see chapter 8. Antony and Norton also discuss this strategy in more detail (2009).</p>

    <p class="bh">Acceptance and Mindfulness-Based Strategies</p>

    <p>As we reviewed in chapter 9, the more you try to control your anxiety, the worse it’s likely to get. Learning to be aware of your experiences without judging them and learning to accept your thoughts and feelings will likely make it easier to manage your anxiety. Strategies such as mindfulness meditation and those used in acceptance and commitment therapy have been found to be helpful for GAD. Chapter 9 describes these strategies. For an even more detailed description, check out the <em>Mindfulness and Acceptance Workbook for Anxiety</em> (Forsyth and Eifert 2007).</p>

    <p class="bh">Problem-Solving Training</p>

    <p>In chapter 11, we discussed how learning to solve problems effectively can help to combat feelings of anger. Problem-solving training is also sometimes useful for dealing with excessive worry and GAD. We recommend that you check out the section on problem solving in chapter 11.</p>
