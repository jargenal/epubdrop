    <p class="cn">Chapter 14</p>

    <h1 id="heading_id_2">Perfectionism and Obsessive-Compulsive Behavior</h1>

    <p class="paft">There are two psychological problems that include obsessive-compulsive behavior as a core feature. The first is <em>obsessive-compulsive disorder</em> (OCD), which is an anxiety disorder associated with persistent disturbing thoughts (obsessions) and repetitive behaviors aimed at decreasing the discomfort caused by these thoughts (compulsions). Many people diagnosed with OCD have perfectionistic standards for certain activities. The second problem, called <em>obsessive-compulsive personality disorder</em> (OCPD), is characterized by a tendency to be overly perfectionistic, orderly, and inflexible. Although these are two different conditions, they overlap to some extent, and it is not unusual for a person to experience features from both disorders. Even if you don’t have all of the symptoms of either disorder, you may still experience some symptoms from one or both of these problems.</p>

    <h2 class="sigilNotInTOC" id="heading_id_3">Obsessive-Compulsive Disorder</h2>

    <p class="paft">Obsessions and compulsions, the core features of OCD, may not be what you think they are. In this section, we start by defining each of these terms.</p>

    <p class="bh">What Is an Obsession?</p>

    <p>To most people, the word “obsession” refers to any persistent thought, desire, or drive that controls a person’s behavior. Die-hard fans of a music group or celebrity are often said to be obsessed with their idols. A doctor who works around the clock to discover a cure for a serious disease may be considered obsessed with his or her work. Even people who love a particular food so much that they eat little else are often said to be obsessed with that food. In contrast to this common use of the word “obsession,” mental health professionals have a very specific meaning for this term that is somewhat different.</p>

    <p>An <em>obsession</em> is defined as a recurrent and persistent thought, image, or impulse that is experienced as intrusive and inappropriate and causes significant anxiety or distress. In other words, people who have obsessions (according to this psychological definition of the word) are very distressed by these thoughts and do not want to have them. In this way, obsessions are different than other types of repetitive thoughts that a person may have (for examples, fantasies). To be considered a true obsession, the thought cannot simply be an exaggerated worry about everyday problems in such realms as job performance, money, or relationships. The person must also try to make the disturbing thoughts go away by ignoring them, pushing them out of consciousness, or undoing their effects by some other thought or action.</p>

    <p>Obsessive thoughts are very common in the general population. In fact, up to 90 percent of people experience intrusive obsessive thoughts from time to time. Common themes for these thoughts include concerns about having things organized in a particular way (for example, urges to organize books, CDs, and DVDs in alphabetical order), worries about becoming contaminated by some object or substance (for instance, germs, cleaning products, bodily fluids), urges to do something aggressive or hurt another person (for example, stabbing a close relative, shouting obscenities at someone in public), thoughts about accidentally harming another person, disturbing religious thoughts, disturbing sexual ideas, and repetitive doubts about whether a task has been completed correctly (for instance, whether the stove has been turned off, whether a mistake was made in a report or term paper). Typically, people who experience obsessions usually realize that the thoughts are not realistic. Also, even though the person may fear acting on the obsession, obsessive urges are almost never actually acted upon. For example, it would be highly unusual for a person with aggressive obsessions to actually carry out the thought, unlike a person who actually has problems with aggressive behavior.</p>

    <p class="bh">What Is a Compulsion?</p>

    <p><em>Compulsions</em> are behaviors that are repeated over and over again in response to an obsession or according to rigidly applied rules. Compulsions are aimed at preventing harm from occurring or at decreasing anxiety or distress. They may include physical behaviors, such as washing, or mental behaviors, such as silently repeating words in your head. Like obsessions, compulsions are very common in the general population. Most people engage in compulsive behaviors from time to time.</p>

    <p>The types of compulsions that people have are often closely related to the content of their obsessive thoughts. For example, people who have obsessions about contamination or cleanliness typically engage in compulsions to prevent themselves from becoming contaminated or dirty. These may include frequent hand washing and cleaning, as well as avoiding situations or locations where contamination may occur, such as public restrooms. Other common compulsions include checking (for example, appliances, locks, accuracy of work), counting, repeating actions, putting things in order, asking for reassurance, praying when you don’t really want to, repeating certain words, explaining or confessing, and hoarding.</p>

    <p class="bh">What Is OCD?</p>

    <p>For most people in the general population, intrusive thoughts and compulsive behaviors don’t cause significant problems. For example, you may avoid certain situations because of concerns about contamination (for example, eating a candy that has fallen on the floor, sitting on a public toilet seat) or you may check your locks and appliances a couple of times. Or perhaps you have distressing thoughts that come and go occasionally. Most people experience these symptoms from time to time with little distress or interference in their life.</p>

    <p>In contrast, people with OCD experience obsessions and compulsions more frequently and more intensely than the average person. They are also bothered more by their obsessions and take greater pains to resist or suppress their upsetting thoughts. To be diagnosed with OCD, the obsessions or compulsions must be bothersome, time consuming (for instance, they take up more than an hour per day), or interfere with a person’s life. For example, it’s not unusual for a person with OCD to experience obsessions throughout the day. For some people, compulsive behaviors such as washing or checking can take up so much time that the person is unable to work, socialize, or be involved in other important activities. OCD affects between 1 and 3 percent of the general population and appears to be about equally prevalent in men and women. Although the problem tends to begin in early adulthood, it is not unusual for people with OCD to have the problem begin in childhood.</p>

    <p class="bh">OCD and Perfectionism</p>

    <p>Perfectionism is often a feature of OCD. For example, Amanda had contamination fears related to eating foods that may have gone bad. She was afraid that if she ate something that was contaminated, she might become ill. As a result, she had strict standards for what she was willing to eat. There were many different foods that she avoided eating completely (including all foods containing meat, certain fruits and vegetables, and certain dairy products). In addition, if an item looked anything less than perfect (for example, if there was a small spot on a piece of fruit), she refused to eat it. Her fear was worse when eating in restaurants than at home, because she could not be sure about the quality of the food or of the chef’s standards for cleanliness. She realized that her fears were excessive and unreasonable, and yet she had difficulty putting them aside. Her approach to food was perfectionistic, in that she had inflexible rules about which foods she could and could not eat and she refused to eat anything that didn’t meet her strict standards.</p>

    <p>Juan was worried that other people might misunderstand what he told them and that something terrible might happen as a result. For example, when making plans with friends, he was fearful that either he or his friends would show up at the wrong location or time. As a result of his fear, he needed to repeat things several times when he spoke to other people. Also, he tended to check that the other person understood everything properly. After speaking to someone, he often phoned them back several times to ensure that all the details from their conversations were clear. Whereas most people are able to tolerate the possibility that a mistake may have occurred during a conversation, for Juan, mistakes were unacceptable. His perfectionistic beliefs were manifested in his unwillingness to risk making an error or being misunderstood.</p>

    <p class="bh">Causes of OCD</p>

    <p>As is the case for all psychological problems, the causes of OCD are complex and involve both biological and psychological processes.</p>

    <p class="ch">Biological Factors</p>

    <p>Three different lines of research support a role for biological factors in the cause and maintenance of OCD. First, there is indirect evidence of altered functioning in the brain neurotransmitter called serotonin. For example, medications that increase levels of serotonin in the brain appear to be effective for many people who suffer from OCD, whereas most medications that affect other brain neurotransmitters don’t have much of an impact on OCD symptoms (Stewart, Jenike, and Jenike 2009). Second, there is evidence that genes inherited from parents play a role in OCD (van Grootheest et al. 2005). Finally, there appear to be differences in brain functioning in people with OCD compared to people without OCD (Britton and Rauch 2009).</p>

    <p>Studies using <em>positron-emission tomography</em> (PET) and <em>functional magnetic resonance imaging</em> (fMRI) (methods of measuring brain activity) show that OCD is associated with increased blood flow in the brain areas known as the prefrontal cortex and basal ganglia. Medications that increase levels of serotonin appear to reverse this abnormality. Interestingly, psychological treatments (including cognitive behavioral therapy) also seem to cause the blood flow in brains of people with OCD to return to normal. Thus, it may be the case that the abnormal brain activity that shows up in PET and fMRI studies is a result of the disorder rather than a cause.</p>

    <p class="ch">Psychological Factors</p>

    <p>A person’s learning experiences and beliefs also influence the onset and course of OCD. From a cognitive perspective, OCD is not so much a problem with obsessions as it is with people’s interpretation of their obsessions. Remember that most people experience thoughts that are obsessional in nature from time to time. The difference between people who experience the occasional obsessional thought without being bothered by it and those who become very distressed by their obsessional thoughts has to do with what people think the obsessional thought means. People who are bothered by obsessional thoughts often have lots of negative beliefs about what the thought means. For example, they may believe that their obsessional thought will come true unless they do something to counter it, or they may believe that their thoughts are morally wrong and that thinking about doing something terrible is as bad as actually doing it. People with OCD also often believe that they should have absolute control over their thoughts (Purdon and Clark 2002).</p>

    <p>Beliefs such as these cause people to feel that they must do something about the thought, such as washing, checking, or other such rituals. At the very least, they cause the individual to want to suppress the thought. Behaviors such as compulsions and suppression of frightening thoughts are sometimes helpful in the short term, but over time, they actually serve to increase the frequency of obsessions and subsequent compulsions. When the thought is suppressed, exposure to the thought is terminated. This means that the person doesn’t get the chance to get used to the thought, and the thought remains upsetting. In fact, suppressing upsetting thoughts seems to either increase the frequency of the thoughts later, or at least to make the thoughts more upsetting next time they occur (Marcks and Woods 2007; Purdon 2004; Purdon, Rowa, and Antony 2005).</p>

    <p>Because behaviors that reduce anxiety are more likely to be repeated, the more a person engages in the compulsion, the more he or she is likely to continue engaging in the compulsion. The sense of relief associated with anxiety reduction can lend credibility to the idea that the ritual is the only thing that keeps the thought from becoming harmful in some way. Finally, by engaging in the ritual, the individual never has the opportunity to learn that the obsessional thought is not, in fact, dangerous. Thus, the thought continues to be upsetting, and the ritual continues to be used as a means of coping with that distress.</p>

    <p class="bh">Treatment of OCD</p>

    <p>Two general treatment approaches have been shown in controlled studies to be effective for helping people who suffer from OCD: medications and cognitive behavioral therapy. Medications that increase serotonin levels in the brain have been shown to decrease OCD symptoms. These include the tricyclic antidepressant clomipramine (Anafranil), the serotonin and norepinephrine reuptake inhibitor (SNRI) venlafaxine XR (Effexor XR), and selective serotonin reuptake inhibitors (SSRIs) such as citalopram (Celexa), fluoxetine (Prozac), fluvoxamine (Luvox), paroxetine (Paxil), and sertraline (Zoloft).</p>

    <p>In studies comparing these medications to one another, they appear to be equally effective for treating OCD (Dougherty, Rauch, and Jenike 2007). The decision to choose one medication over another should be based on factors such as side effects, cost, and a history of response or nonresponse to one or more of these medications in the past. Although these medications are all antidepressants, they appear to be effective for people with OCD, even if depression is not a significant problem. For more information on these and other antidepressant medications, see chapter 10.</p>

    <p>In addition to medications, cognitive behavioral strategies have been shown to be effective for helping people overcome OCD. Specifically, exposure to feared situations and prevention of compulsive rituals (together known as “exposure and response prevention”) seems to be the treatment of choice for this problem. Some researchers have also found that teaching people to challenge their unrealistic thoughts using cognitive techniques (such as those described in chapter 7) is sometimes helpful.</p>

    <p>Studies that have compared medication treatments to exposure and response prevention have generally found that both approaches are equally effective in the short term. However, after treatment ends, the effects of exposure and response prevention tend to be longer lasting than those for medication. For more details on how to conduct exposure and response prevention, see chapter 8. In addition, the end of this chapter includes a section on how to apply these strategies to obsessive-compulsive symptoms in particular.</p>

    <h2 class="sigilNotInTOC" id="heading_id_4">Obsessive-Compulsive Personality Disorder</h2>

    <p class="paft">The second type of problem discussed in this chapter is obsessive-compulsive personality disorder, or OCPD. This problem shares a number of features with OCD and can occur in people with OCD. However, OCPD and OCD are viewed as different conditions.</p>

    <p class="bh">What is OCPD?</p>

    <p>The hallmark of OCPD is an excessive concern with order, organization, rules, lists, and trivial details. People with OCPD are often perfectionistic to the point of not getting anything done. For example, they may spend so much time making lists of things that need to get done (and refining their lists), that the tasks on the list don’t get completed. Or they may devote so much energy to including every small detail when they tell a story that the main message of the story is lost.</p>

    <p>In addition, people with OCPD typically spend excessive amounts of time and energy on their work, often at the expense of other important aspects of their life such as having fun and enjoying time with friends and family. People with OCPD tend to be overly conscientious, rigid about their views, and inflexible about issues related to ethics and morals. They have difficulty delegating jobs to other people for fear that tasks will not be completed correctly. They may also have difficulty throwing things away, just in case they are needed in the future. In many ways, OCPD is the psychological disorder that is most closely related to perfectionism.</p>

    <p class="bh">Research on OCPD</p>

    <p>Compared to OCD, very little research has been conducted with people suffering from OCPD. Therefore, we know very little about the causes of this problem and almost no controlled studies have tested the effects of specific treatments for OCPD. In fact, we do not even have reliable data on the prevalence of this disorder. Despite the lack of adequate research, it is likely that both biological and psychological factors contribute to OCPD. The limited literature available on treatment suggests that the cognitive and behavioral strategies discussed in chapters 7 and 8 are likely to be effective (Bailey 1998; Ng 2005).</p>

    <h2 class="sigilNotInTOC" id="heading_id_5">Overcoming Perfectionism Associated with Obsessive- Compulsive Behavior</h2>

    <p class="paft">Strategies for dealing with obsessive-compulsive behavior include response prevention and exposure, each of which is discussed in this section.</p>

    <p class="bh">Response Prevention</p>

    <p>As we mentioned earlier, exposure to feared situations combined with prevention of compulsive rituals is the key to overcoming obsessions and compulsions. This approach is likely to be helpful for OCPD behaviors as well, such as excessive organizing and list making. Recall that rituals have a number of negative effects that serve to maintain the fearfulness of the obsession and are self-perpetuating. Thus, the first step toward decreasing your obsessive-compulsive behavior is to stop all rituals. This is because any rituals that are performed during or following an exposure practice can “undo” the benefits of the exposure. For example, if you are learning to overcome obsessive fears of contamination from germs, touching “contaminated” objects will do you no good if you wash your hands after every exposure practice. To benefit from exposure, you must first cut out all rituals.</p>

    <p>Ben had an intense fear that he might lose something or accidentally throw something important away. Over time, his doubts broadened to include thoughts that he might purposely throw something away and then forget that he had done it. As a result of these fears, he engaged in a broad range of checking behaviors, particularly when going from one place to another. Before getting out of his car, he checked throughout the car for items that he may have left in the trunk, under the seats, between the seats, or anywhere else that he could think of. He even checked under the hood, even though he knew rationally that he had not opened the hood. Before entering his home, he checked outside his house and behind the bushes in his front yard. Before leaving his home, he checked in all drawers, cupboards, closets, and garbage cans in each room. In addition to spending many hours per day checking, he also asked people for reassurance. For example, he typically asked his partner whether she had emptied the garbage cans in the house, fearing that some important papers may have been thrown out.</p>

    <p>As illustrated in this example, the rituals may be quite complex. Before you can begin to prevent your rituals, you will need to become aware of the specific rituals that you use and the situations and feelings that trigger your rituals. What types of repetitive behaviors do you engage in? These may include checking, cleaning, washing, counting, list making, reassurance seeking, repeating certain behaviors, purposely thinking a particular thought (for example, a prayer, a safe word), or engaging in any other behavior that you feel compelled to do.</p>

    <p>Are there particular situations where you are most likely to engage in these rituals? Are they more likely to happen when you are in a particular mood (perhaps feeling anxious, sad, angry, bored)? When you are tired or hungry? When you are in a certain place (like home, work, outside)? When you are with certain people (for instance, strangers, relatives, children, coworkers, alone)? In your journal, keep track of your rituals, as well as the situations that trigger your rituals.</p>

    <p>Once you have identified the rituals that you want to stop, the next step is to find ways to prevent the rituals. At first, this task may be very difficult. The urges to do the ritual may be very intense. Over time, however, the urges will gradually decrease. Anything you can do to prevent the rituals in the beginning will pay off in the long run. Remember, the worst thing that is likely to happen if you don’t complete a ritual is that you will feel uncomfortable. Below are some strategies that you can use to prevent yourself from engaging in your compulsive rituals. Remember, if you can get through the first few days, resisting the urges should become easier.</p>

    <p class="ch">Strategies for Resisting Rituals</p>

    <ul>
      <li class="ulf">You will experience anxiety when you begin resisting your rituals. Remind yourself that the anxiety is unpleasant but not dangerous.</li>

      <li class="ul">Do something that makes it impossible for you to perform the ritual. For example, turn off the water from the main source in your basement so you won’t be able to wash your hands. Or, mail a letter immediately after writing it so you cannot check what you wrote.</li>

      <li class="ul">Remind yourself that your anxiety will decrease eventually, and that the more frequently you resist the ritual, the easier it will be to resist it.</li>

      <li class="ul">Remind yourself when you are doing fine and are not experiencing the obsession—or performing the rituals—that this proves that the ritual really doesn’t help. By focusing on your successes when you’re not performing the rituals, you will be better able to see that your desire to perform the ritual is driven by anxiety rather than by genuine necessity.</li>

      <li class="ul">Ask friends and family members to point out when you are performing a ritual or compulsive behavior.</li>

      <li class="ul">Ask friends and family members not to participate in your rituals. For example, ask them not to give you reassurance, even when you ask for it, but rather to remind you that performing the ritual is not a good idea.</li>

      <li class="ul">If you “slip” and actually perform a ritual, try to undo the effects of the ritual as soon as possible. For example, if you are practicing learning to tolerate having a less organized desk and you give in to your urges and spend four hours organizing your desk, mess it up again as soon as possible and continue your practice.</li>

      <li class="ull">If the urge is completely overwhelming and you feel as though you are about to give in and perform the ritual, take yourself out of the situation. Go for a walk, watch TV, or do something else until the urge subsides.</li>
    </ul>

    <p class="bh">Exposure Exercises</p>

    <p>After you have successfully resisted performing your compulsive rituals for a few days, the next step is to begin exposure to situations that you find anxiety provoking or uncomfortable. Exposure may be conducted gradually. That is, you can begin with easier situations and work your way up to more challenging situations.</p>

    <p>Chapter 8 is worth reviewing because it discusses in detail exactly how to conduct your exposure practices. However, the main principles to keep in mind include: continue your exposure practice session until your anxiety or discomfort has decreased significantly or you have learned that your feared predictions don’t come true (this can take a few minutes to several hours); if your anxiety decreases quickly, move on to a more difficult practice; repeat exposure practices frequently (conduct longer practices at least four to five days per week, as well as mini-practices throughout the day); expect to feel uncomfortable—over time, your discomfort will decrease; and continue to try more and more challenging practices until you can comfortably handle the situations near the top of your hierarchy.</p>

    <p class="bh">Setting Time Limits</p>

    <p>Most people have been told at one time or another that they didn’t take their time to do a job properly. In general, the more time that is spent on a project, the better the quality of the work. However, there is a point at which the benefits of spending more time on a job become fewer and fewer. For example, spending two minutes brushing your teeth will clean your teeth much more effectively than spending only ten seconds. However, for every additional minute that you spend brushing beyond the first two minutes, the benefits become smaller and smaller. In fact, if you spend too long brushing, you can destroy the enamel that protects your teeth and actually put yourself at greater risk for developing dental problems.</p>

    <p>Another cost of spending too much time on a particular task is that it leaves you too little time to do other things. Taking the time to do very good work is not worth much if you never complete the job or if it interferes with your ability to get other important things done. On the other hand, rushing through a task so that the quality of your work is very poor can also lead to negative consequences. Ideally, you should try to balance the quality of your work with the amount of work that you get done. There may be times when it is better to do a fair job on several different tasks than an outstanding job on only one task. You will need to evaluate your priorities to decide whether it’s worth spending less time on certain activities.</p>

    <p>Do you tend to spend too much time completing certain tasks, such as washing, cleaning, writing a letter, filling out a form, or even telling a story? If so, setting time limits for specific activities will be very helpful. This can be done in two ways. You can gradually decrease the time that you allow for the activity. For example, if you normally spend an hour in the shower each day, you can reduce the allowed time by ten minutes per day until you reach the point of spending no more than ten minutes in the shower. Alternatively, you can make the change more abruptly by immediately reducing the allowed time to a more typical level (for example, ten minutes for a shower, fifteen minutes to write a short letter, and so on). To help you end tasks at the proper time, set a timer or have a friend let you know when the time has ended. When time is up, stop what you are doing—even if the task feels incomplete. Next time, you will have the opportunity to pace yourself differently if you need to work more quickly. If you are not sure what an appropriate time is for a particular task, ask several people how long they would take.</p>

    <h2 class="sigilNotInTOC" id="heading_id_6">Using Cognitive Strategies to Change Obsessional Beliefs</h2>

    <p class="paft">In chapter 7, we described a number of techniques that are useful for changing perfectionistic thoughts. The techniques that are most likely to be effective for changing thoughts that are associated with OCD and OCPD include: evaluating the evidence for your beliefs, learning to compromise, taking another person’s perspective, hypothesis testing, looking at the big picture, using coping statements, and learning to tolerate uncertainty (see chapter 7 for detailed descriptions).</p>

    <p>Following is an example of how learning to change thoughts can reduce obsessive-compulsive thinking:</p>

    <p class="diaf">Meg: It seems like all of my spare time is spent doing housework.</p>

    <p class="dia">Therapist: Why do you spend so much time cleaning?</p>

    <p class="dia">Meg: I grew up in a home where cleanliness was very important. I guess I worry that if the house is not clean, guests will think I’m a slob.</p>

    <p class="dia">Therapist: How much cleaning do you actually do?</p>

    <p class="dia">Meg: On weekdays, I clean for about an hour before work and for about three hours after dinner. On weekends, I spend up to six hours a day cleaning. Each day, I try to wash the floors, vacuum my carpets, dust the entire apartment, and clean inside and under the stove and fridge. On weekends, I do bigger jobs like cleaning the windows and cleaning out the fireplace.</p>

    <p class="dia">Therapist: Do your friends spend as much time cleaning as you do?</p>

    <p class="dia">Meg: No. In fact, when I visit friends there are often dishes in the sink and sometimes the floors are quite dirty.</p>

    <p class="dia">Therapist: What do you think of friends who have homes that are not as clean as your apartment?</p>

    <p class="dia">Meg: It doesn’t really bother me, as long as it’s someone else’s home.</p>

    <p class="dia">Therapist: Do you think that other people are offended when they visit your friends and see dishes in the sink?</p>

    <p class="dia">Meg: Probably not.</p>

    <p class="dia">Therapist: Then how likely is it that people will be offended or judge you negatively if your floors are not washed daily or if there is a dish or two in your sink?</p>

    <p class="dia">Meg: I guess it’s unlikely. It just doesn’t feel right to have people over without spending the day cleaning first.</p>

    <p class="dia">Therapist: Is it possible that your tendency to be overly clean might make people uncomfortable?</p>

    <p class="dia">Meg: Actually, several people have commented on how clean my apartment is and how they were fearful of spilling a drink or making a mess. I have several friends who seem less relaxed at my apartment than when we get together at another home.</p>

    <p class="dial">Therapist: Perhaps you could test out the accuracy of your predictions by inviting several friends over after a few days of not vacuuming, dusting, or cleaning the floors. Leave some dishes in the sink, and leave the couch cushions messy. Seeing how people react to this change will help you to determine whether all your cleaning really makes a difference in what people think of you.</p>
