    <p class="cn">Chapter 12</p>

    <h1 id="heading_id_2">Perfectionism and Social Anxiety</h1>

    <h2 class="sigilNotInTOC" id="heading_id_3">The Nature of Social Anxiety</h2>

    <p class="paft">If you’ve ever felt uncomfortable in the presence of another person or nervous about making a negative impression on other people, you’ve experienced social anxiety. Most people experience anxiety or fear in certain social situations, at least some of the time. Perhaps you have felt uneasy in a situation where you were the center of attention (for example, getting married, acting in a play, or giving a formal presentation at work). Or perhaps you have felt uneasy at a big job interview or meeting your partner’s parents for the first time. Like any situation that triggers anxiety and fear, social situations can be uncomfortable when they are perceived as threatening or dangerous in some way. In other words, you’re more likely to be anxious when you believe that you have something to lose if you say the wrong thing, behave inappropriately, or seem uncomfortable.</p>

    <p>Social anxiety exists on a continuum. Some people may appear to never experience anxiety in any social situations, whereas other people avoid all social contact, including going to work and spending time with their family. Most people are in between these two extremes. You may be tempted to avoid social situations that make you uncomfortable. If you don’t avoid these situations, you may rely on certain coping ­strategies to help get you through the situation. For example, a client seen in our clinic was a university professor who had an extreme fear of public speaking—including teaching her classes. Although she was unable to avoid teaching, she found subtle ways to get through her classes. For example, she always taught her students in the dark, using overhead transparencies, so they wouldn’t notice her anxiety symptoms. Also, she always wore turtleneck sweaters so that the blushing on her neck wouldn’t be visible.</p>

    <p>Most social situations that trigger anxiety can be categorized into two main types: performance situations and social-interaction situations. Performance situations are situations in which you are likely to be observed while performing some task. Social-interaction situations involve speaking or interacting with another person. Below are some examples of each:</p>

    <p class="ch">Performance Situations that Sometimes Trigger Anxiety</p>

    <ul>
      <li class="ulf">Public speaking (for instance, formal presentations)</li>

      <li class="ul">Participating in meetings at work, answering questions in class, and so on</li>

      <li class="ul">Singing, acting, dancing, or reading aloud</li>

      <li class="ul">Using a public restroom with someone else in the room</li>

      <li class="ul">Doing aerobics or playing sports</li>

      <li class="ul">Writing with other people watching</li>

      <li class="ul">Eating or drinking with other people watching</li>

      <li class="ul">Going out in public without dressing “nicely”</li>

      <li class="ull">Being sexually intimate</li>
    </ul>

    <p class="ch">Social-Interaction Situations that Sometimes Trigger Anxiety</p>

    <ul>
      <li class="ulf">Going to parties (especially when the other guests are strangers)</li>

      <li class="ul">Being introduced to new people</li>

      <li class="ul">Talking with people in positions of authority (for example, a boss or teacher)</li>

      <li class="ul">Being assertive</li>

      <li class="ul">Initiating casual conversations</li>

      <li class="ul">Maintaining casual conversations</li>

      <li class="ul">Going out on a date</li>

      <li class="ul">Going to job interviews</li>

      <li class="ul">Sharing private details about your life with another person</li>

      <li class="ul">Talking on the telephone</li>

      <li class="ull">Confronting another person about a problem</li>
    </ul>

    <p>In anxiety-provoking social situations, people are typically apprehensive about two different aspects of the situation. First, they have anxiety-provoking thoughts about the situation itself. For example, they may worry that others will find them to be incompetent, unattractive, unintelligent, or boring, despite the fact that they are actually unlikely to be judged negatively in the situation. Second, they have anxiety-provoking thoughts about looking nervous in front of other people. For example, they may worry that other people will notice specific anxiety symptoms (for instance, shaky hands or a sweaty forehead). People who are socially anxious often see their anxiety as a sign of weakness and take great pains to make sure that other people don’t notice the symptoms.</p>

    <p>Because people who are socially anxious often avoid social situations, they may lack certain skills to perform well in these situations. For example, a person who is uncomfortable talking to other people may lack certain conversational skills that others take for granted (for example, how to make appropriate eye contact, how to ask questions of the other person, and so on). Similarly, people who completely avoid sports or dancing are unlikely to be extremely accomplished at either of these activities until they have opportunities to practice and develop their skills.</p>

    <p>Like other emotional states, social anxiety may be thought of as having three main components: the physical, the cognitive, and the behavioral. The <em>physical component</em> includes all the physical symptoms that people experience when anxious, including racing heart, irregular breathing, dizziness, shaking, sweating, blushing, or an unsteady voice.</p>

    <p>The <em>cognitive component</em> includes the beliefs, interpretations, and predictions that contribute to the anxiety (for instance, “This person will think I’m an idiot”). This component also includes a tendency to pay too much attention to information that confirms the anxiety-provoking beliefs. For example, if you are nervous while giving a presentation, you are more likely to notice the people in the audience who seem bored or unhappy than the people who seem interested in your talk. Also, when confronted with an ambiguous situation (something like a person who seems uninterested in what you’re saying), you are more likely to interpret the situation in a way that is consistent with your anxiety (for example, “This person finds me boring”) than with a more neutral interpretation (such as, “This person seems very distracted”).</p>

    <p>The <em>behavioral component</em> of social anxiety usually involves avoidance of the feared situation. This may include complete avoidance (such as not going to a party), or more subtle forms of avoidance (for example, going to a party but only talking to certain “safe” people). In addition, social anxiety may be associated with other behaviors, such as checking your appearance in the mirror and constantly trying to figure out whether people are reacting negatively to your behavior.</p>

    <h2 class="sigilNotInTOC" id="heading_id_4">Social Anxiety Disorder</h2>

    <p class="paft"><em>Social anxiety disorder</em> (also called <em>social phobia</em>) is a term used to describe social anxiety that is extreme enough to greatly bother a person or cause significant interference in the person’s life. The criteria that professionals use to define social anxiety disorder include the following (American Psychiatric Association 2000):</p>

    <ul>
      <li class="ulf">The person experiences an intense fear of one or more social or performance situations in which the person fears that he or she will do something embarrassing or show signs of anxiety.</li>

      <li class="ul">The person becomes very anxious or panicky when exposed to a feared social situation.</li>

      <li class="ul">The person recognizes that the fear is out of proportion to the real danger.</li>

      <li class="ul">The person avoids the situation or endures it with intense discomfort.</li>

      <li class="ul">The social anxiety bothers the person or leads to significant interference in functioning.</li>

      <li class="ul">If the person is under eighteen years old, the problem has lasted at least six months.</li>

      <li class="ull">The social anxiety is not due to another problem (for example, the person is not avoiding social situations simply because he or she is feeling depressed and is uninterested in socializing).</li>
    </ul>

    <p>Note that social anxiety disorder may involve many different situations or as few as one situation (for example, public speaking). The main difference between social anxiety disorder and normal levels of social anxiety and shyness are that in social anxiety disorder, the anxiety usually occurs more frequently and more intensely, and the anxiety causes problems for the person by interfering with work, relationships, or other activities. In many cases, a fear of public speaking would not meet criteria for social anxiety disorder because such fears often don’t impact on people’s lives in any meaningful way, because many people only rarely have to speak in public. However, for a person who has to make frequent presentations for work, a fear of public speaking may well meet criteria for social anxiety disorder.</p>

    <p>Recent epidemiological studies have estimated that up to 13 percent of the general population meets the clinical criteria for social anxiety disorder at some time in their life (Kessler et al. 2005). In addition, social anxiety disorder is often associated with other problems, including depression, eating disorders, and substance abuse. Fortunately, social anxiety disorder often responds quite well to treatment. We will review the treatment options for this problem later in this chapter.</p>

    <h2 class="sigilNotInTOC" id="heading_id_5">Causes of Social Anxiety and Social Anxiety Disorder</h2>

    <p class="paft">Social anxiety disorder seems to run in families. People who have an immediate family member with social anxiety disorder are two to three times more likely to develop social anxiety disorder compared to people without social anxiety disorder in the family. The fact that social anxiety disorder runs in families is probably related to both the genetic heritability of social anxiety, as well as the process of learning anxious behaviors from parents or other family members. In fact, evidence is now pointing to the fact that social anxiety disorder probably stems from an interaction of both biological and psychological processes.</p>

    <p class="bh">Biological Factors</p>

    <p>Twin studies that have attempted to separate out the effects of learning and genetics have yielded inconsistent results, with some studies showing that genetics plays a moderate role in the development of social anxiety disorder and other studies finding a relatively small genetic contribution. Nevertheless, two personality traits that are associated with social anxiety have been shown to be highly heritable. These include neuroticism—a tendency to feel anxious, tense, and worried, as well as to react emotionally to a variety of stresses—and introversion—a tendency to be relatively quiet and socially withdrawn compared to other people (Birley et al. 2006; Jang, Livesley, and Vernon 1996). Although research on the biological basis of social anxiety is still in its infancy, we are beginning to learn about the role of the brain in social anxiety. For example, a part of the brain known as the amygdala may be involved in social anxiety (as well as other anxiety-based problems). Studies examining patterns of blood flow in the brain have found that people with elevated levels of social anxiety show more activity in their amygdala and that treatment with either medication or cognitive behavioral therapy tends to decrease this activity. In addition, there is evidence that certain brain neurotransmitters (in particular, serotonin) are involved in social anxiety (Stein and Stein 2008).</p>

    <p class="bh">Psychological Factors</p>

    <p>Although a person’s biology plays a role in the development and maintenance of social anxiety, psychological factors are also very important. A psychologist by the name of S. Rachman (1976) identified three different pathways to developing fear: <em>traumatic conditioning</em>, which involves experiencing some negative event that triggers the fear (for example, being teased after a class presentation may induce a fear of public speaking); <em>observational learning</em>, which involves developing a fear by watching someone else behave fearfully in the situation (for instance, developing social anxiety by growing up in a family of shy parents and siblings); and <em>informational learning</em>, which involves developing a fear by being told that a particular situation is dangerous (such as being told to “watch your back” when around other people).</p>

    <p>A number of research studies support the view that these methods of learning can influence the development of social anxiety (for a review, see Bruch 1989). Compared to people who are comfortable in social situations, people with social anxiety disorder are more likely to grow up in homes where other family members are socially anxious (an example of observational learning), parents use shame as a means of discipline (traumatic conditioning), family members place great importance on the opinions of other people (informational learning), and children are discouraged from socializing (informational learning).</p>

    <p>In addition, many researchers believe that people’s beliefs play an enormous role in whether they feel anxious in social situations (Clark and McManus 2002). Common beliefs held by people who are socially anxious include (notice that many of these beliefs reflect perfectionistic standards and beliefs):</p>

    <ul>
      <li class="ulf">I should not appear anxious in front of other people.</li>

      <li class="ul">I should always appear to be brilliant.</li>

      <li class="ul">I should always be entertaining when I’m talking to other people.</li>

      <li class="ul">It is awful to blush, shake, or sweat in front of others.</li>

      <li class="ul">People can tell when I am anxious.</li>

      <li class="ul">I will not be able to speak if I am too anxious.</li>

      <li class="ul">People find me unattractive.</li>

      <li class="ul">I will look incompetent if I speak to my boss.</li>

      <li class="ull">People will become angry with me if I make a mistake.</li>
    </ul>

    <h2 class="sigilNotInTOC" id="heading_id_6">Perfectionism and Social Anxiety</h2>

    <p class="paft">Compared to all other types of anxiety and fear, social anxiety may be the most closely linked to perfectionism. Research from our clinic and elsewhere has found that people who are socially anxious are more likely than other people to be overly concerned about making mistakes, particularly in social situations (Antony et al. 1998). For example, they may hold the belief that if they make a mistake or fall short of their standards, they are complete failures. In addition, social anxiety is associated with a tendency to doubt one’s abilities in social situations, including one’s ability to make a good impression on other people.</p>

    <p>If you have a tendency to set overly high standards for yourself, it is likely that you will be unable to meet your strict expectations. If you can’t accept the possibility of another person finding you boring, unattractive, or incompetent, you put yourself at risk for feeling anxious when interacting with other people who you perceive as threatening. In addition, if your perfectionism causes you to avoid certain social situations, you prevent yourself from ever finding out whether your anxious predictions are correct.</p>

    <h2 class="sigilNotInTOC" id="heading_id_7">Effective Treatments for Social Anxiety</h2>

    <p class="paft">Although professionals may use many different treatments to help people overcome social anxiety, only two main types of strategies have been tested out in controlled research studies. These include medication treatments and a variety of different cognitive and behavioral techniques (Antony and Rowa 2008; Rodebaugh, Holaway, and Heimberg 2004). In the few studies that have compared these two general approaches, both seem to work equally well in the short term. However, there is ­evidence that ­cognitive and behavioral treatments have longer-lasting effects compared to medications, once treatment has ended. Studies on combining medications and psychological treatments have generally found little benefit of combined treatments over medication or psychological treatment alone.</p>

    <p class="bh">Cognitive Behavioral Therapy</p>

    <p>Many studies have now established that cognitive behavioral therapy (CBT) is effective for helping people overcome social anxiety disorder (Antony and Rowa 2008). These treatments include three main approaches: using cognitive techniques to identify and change anxious thoughts and predictions regarding social situations, using behavioral techniques (primarily exposure) to help a person confront feared situations until they are no longer frightening, and using social-skills training to teach individuals the skills needed to perform effectively in social situations. Some of the skills that may be taught during social-skills training include how to be more assertive, effectively using eye contact and nonverbal communication, and learning to get close to new people. Cognitive and behavioral methods for dealing with perfectionism are described in chapters 7 and 8 in detail.</p>

    <p>You may notice that many of the medications that have been shown to be effective for social anxiety disorder are actually antidepressants. Antidepressant drugs appear to be helpful for most types of clinical anxiety, even in people who do not feel depressed. Chapter 10 discusses various issues related to taking antidepressant medications (how to choose from the various options, side effects, and so on).</p>

    <p>Many of the medication-related issues discussed in chapter 10 are also relevant to the anti-anxiety medications (for example, clonazepam, alprazolam), although there are a few important differences between antidepressants and anti-anxiety medications. First, anti-anxiety medications typically start working within a half hour or so after taking the pill, whereas antidepressants usually take up to four weeks before they start having an effect. In addition, the side effects of anti-anxiety medications are typically different than those for antidepressants. For anti-anxiety medications, the most common side effect is fatigue, which usually improves during the course of treatment. Finally, compared to most antidepressants, anti-anxiety medications are often more difficult to stop taking because they tend to be associated with withdrawal symptoms, particularly when stopped too quickly. Withdrawal symptoms typically include symptoms of increased anxiety and arousal (for instance, racing heart and dizziness). These symptoms can be minimized by decreasing the dosage gradually.</p>

    <h2 class="sigilNotInTOC" id="heading_id_8">Changing Perfectionistic Thoughts and Behaviors in Social Anxiety</h2>

    <p class="paft">In this section, we discuss strategies for challenging anxiety-provoking thoughts and changing anxiety behaviors associated with social anxiety. For a more detailed discussion of strategies for overcoming social anxiety, check out our <em>Shyness and Social Anxiety Workbook</em> (Antony and Swinson 2008).</p>

    <p class="bh">Challenging Perfectionistic Thoughts</p>

    <p>Rather than assuming that your perfectionistic thoughts are true, it is important to treat your beliefs as possibilities or guesses. Unless you are able to accept the possibility that your standards for performance are too high, it will be difficult to shift your expectations to be more realistic. Chapter 7 describes methods of changing your perfectionistic thoughts. Several of these strategies are likely to be helpful for dealing with your anxiety in social situations, including examining the evidence supporting your thoughts, changing perspectives, hypothesis testing, changing social-comparison habits, and using coping statements. We suggest that you review the techniques described in chapter 7 to help replace your anxious thoughts with more realistic thoughts. The following examples illustrate how to replace anxious thoughts with more neutral, realistic thoughts.</p>

    <p class="bh">Changing Perfectionistic Behaviors</p>

    <p>Chapter 8 includes a number of strategies for changing perfectionistic behaviors. In the case of social anxiety, communication training may be a useful method for improving important interpersonal skills. However, the most important strategy for decreasing social anxiety is exposure to feared situations. Repeated exposure to anxiety-provoking social situations will eventually lead to a decrease in anxiety. Exposure practices should be frequent (at least several times per week) and should last long enough to experience a decrease in anxiety or to learn that your feared predictions don’t come true.</p>

    <p>You may need to be creative to come up with appropriate situations in which you can practice. For example, if you are fearful of giving presentations, there are a number of different places where you can conduct exposure exercises. You can join an organization called Toastmasters, which gives members opportunities to improve their public-speaking skills (check out <a href="http://www.toastmasters.org">www.toastmasters.org</a>). Or, you can take a public-speaking course or an acting class. Another possibility is volunteering to speak about your career in front of a group of students in a high school or college. You can even ask a group of friends or family members to be your audience.</p>

    <p>If a situation is too frightening, you can begin by conducting <em>role-play simulations</em>. A role-play simulation is essentially a “rehearsal” exposure in which you practice a social interaction in a safer context, rather than in the real situation. For example, if you are frightened of going to a job interview, you can practice simulated interviews with a friend or family member. You can even ask your “interviewer” to purposely be difficult so that the real interview will seem like a piece of cake in comparison. After practicing in simulated interview situations, you can work your way up to interviewing for jobs that don’t interest you especially. These practices will help you be more comfortable in interview situations, so that when the interview for the job you really want comes up, you’ll be ready.</p>

    <p>If you are afraid of drawing attention to yourself, practice doing just that during your exposure practices. For example, if you are anxious about having your hands shake while you are holding a drink or writing, let your hands shake on purpose. Let your glass shake until you spill your water. Or, when you are filling out a comment card in a restaurant, let your hand shake enough that the card is unreadable and has to be rewritten. If you are afraid that other people will see you sweat when you’re feeling anxious, purposely wear warm clothes so that you are more likely to perspire. The goal of exposure is to learn that the situations that you fear are not dangerous. Even if someone sees you shake or sweat, there are no long-term consequences.</p>

    <p class="bh">Taking Frequent Risks in Social Situations</p>

    <p>People who are fearful of social situations often fear rejection from other people. If you are fearful of rejection, one of the best things you can do is take social risks more frequently. You may end up being rejected from time to time, but you will learn not to care about the rejection as much.</p>

    <p>For example, if you tend to fear rejection when applying for a job or asking someone out on a date, you may find that it takes you months or years to get up the courage to do these things. You may fear that the person you ask out or the employer who reads your application will find you unappealing or unacceptable. When you finally do find the courage to take the risk, you may end up feeling very discouraged if you are rejected. You may take this as evidence that your anxious beliefs were true. The experience may “prove” that you are not good enough, just as you believed.</p>

    <p>There is a problem with this logic. The truth is that most dates do not lead to long-term relationships and most job applications do not lead to jobs. Most people occasionally have the experience of being rejected in social situations such as these. To have the experience of not being rejected, a person has to take risks frequently. For example, if the probability of getting a job is one in twenty (for every twenty jobs that you apply for, you get one job offer), it will take you years to get an offer if you only apply for a job every few months. On the other hand, if you apply for several jobs per week, it probably won’t be long before you have an offer.</p>

    <p>More frequent social risks will lead to more frequent rejection. However, frequent risks will also lead to things working out from time to time. Remember, if you are looking for a job, you only need one offer. The number of rejections is not important in the long run. The same is true of dating. Therefore, we recommend that you expose yourself to anxiety-provoking social situations as often as possible. It won’t always go smoothly. However, over time the situations will become easier, you will become more skilled at dealing with people in these situations, and your chances of success will increase.</p>
