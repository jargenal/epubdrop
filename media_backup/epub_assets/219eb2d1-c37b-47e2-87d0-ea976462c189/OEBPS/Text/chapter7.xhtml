    <p class="cn">Chapter 7</p>

    <h1 id="heading_id_2">Changing Perfectionistic Thoughts</h1>

    <p class="paft">In chapter 3, we discussed the ways in which beliefs, interpretations, and predictions contribute to negative emotions such as anxiety, depression, and anger. We also discussed how negative thoughts contribute to perfectionism. You may recall from earlier chapters that people don’t respond to what is actually occurring around them. Rather, they respond to their interpretations of what is happening around them. For example, if you fear making mistakes at work, it’s not the possibility of making mistakes that makes you anxious. Instead, it’s your beliefs about the meaning of making mistakes that cause you to feel upset or nervous. Perhaps you assume that making mistakes will lead to some terrible consequence that can’t be corrected or undone (such as being fired or ridiculed by others). Or you may believe that making mistakes is a sign of weakness or incompetence.</p>

    <p>Sometimes your thoughts are correct, and at other times they are incorrect. Sometimes standards are appropriate, and sometimes they are too strict. Most people’s standards are not universal, and therefore, other people may not share them. In other words, everyone creates their own standards for performance based on their upbringing, past experiences, and beliefs about what kinds of behavior are appropriate. Beliefs and standards vary among individuals and across groups, including people from different cultures, ages, sexes, occupations, education levels, ­geographical locations, and so on.</p>

    <p>Although standards and beliefs are subjective, people usually take for granted that their interpretations, beliefs, predictions, and standards are true. In other words, people assume that their beliefs are facts. They may also believe that other people share their beliefs and high standards. Even if they recognize that others have lower standards, they may believe that it is important to keep their own standards from slipping. Becoming less perfectionistic will involve relaxing your standards and changing your perfectionistic beliefs. It will involve treating your standards and beliefs as <em>possibilities</em> or <em>guesses</em> about the way the world should be—rather than as hard facts.</p>

    <p>Of course, you don’t need to change all beliefs and standards. Some expectations are appropriately high, and there can be costs to letting go of all standards that you have for yourself or others. The task will be trying to identify which beliefs are unrealistic or excessive and to work on changing those beliefs.</p>

    <h2 class="sigilNotInTOC" id="heading_id_3">Using Thought Records to Change Perfectionistic Thinking</h2>

    <p class="paft">Learning to change your perfectionistic thoughts and standards is usually easier if you work through the process on paper, at least at the beginning. You can use your journal for this purpose, or you can develop a form to record and change your thoughts (we provide an example of such a form later in this chapter). With practice, the process of changing your thoughts will become more automatic, and you will no longer need to use diaries or forms.</p>

    <h2 class="sigilNotInTOC" id="heading_id_4">Steps for Changing Perfectionistic Thoughts</h2>

    <p class="paft">Changing thoughts involves four basic steps: identifying perfectionistic thoughts, listing possible alternative thoughts, considering the advantages and disadvantages of the original perfectionistic thoughts and the alternative thoughts, and choosing a more realistic or helpful way to view the situation. Although the process may seem easy as we describe it here, it is often more difficult in practice. Mastering these strategies will require perseverance and repetition.</p>

    <p class="bh">Identifying Perfectionistic Thoughts</p>

    <p>Before your perfectionistic thoughts can be changed, you must first identify them. This can be difficult for two reasons. First, you may incorrectly view your perfectionistic thoughts as appropriate and accurate. Second, you may be completely unaware of your perfectionistic assumptions—these thoughts may be so familiar and automatic that you don’t even notice them.</p>

    <p>It may be easier to identify times when you are engaging in perfectionistic thinking if you pay attention to three particular situations. First, notice when you feel that you are not living up to your own expectations (for instance, you’re not performing well at work or school; other people are judging you to be unattractive, incompetent, or overly anxious; you are unhappy about some aspect of your body, such as your weight; you are anxious about saying the wrong thing, and so on). Second, notice when you feel that other people are not living up to your expectations (for example, people at work make too many careless mistakes, your children’s grades never seem to live up to your expectations, people don’t know how to drive properly, and so on). Finally, take note when you find yourself engaging in perfectionistic behaviors (such as checking and rechecking your work, apologizing too much for minor mistakes, exercising excessively to stay thin, spending too much time cleaning, and so on). If you find yourself engaging in perfectionistic behaviors or holding on to standards that are not being met, you may need to ask yourself, “Am I thinking like a perfectionist?” If you aren’t sure, ask someone you trust for their opinion.</p>

    <p>If you have difficulty identifying your perfectionistic thoughts, we recommend that you read chapter 3 again. That chapter lists types of perfectionistic thinking styles and provides several examples of each.</p>

    <p class="bh">Listing Possible Alternative Thoughts</p>

    <p>Once you have identified a particular perfectionistic belief, the next step is to consider possible alternative beliefs or thoughts. This can be ­difficult because perfectionistic thoughts and standards are often ingrained and automatic, and it can feel almost impossible to even consider other ways of viewing a situation. One way of helping with this process is to ask yourself the question, “How might someone else view this situation?” You can even think about particular people in your life (for instance, your spouse, best friend, boss, daughter, father, and so on) and ask yourself how they might view the situation. This strategy, which involves taking another person’s perspective, is discussed in more detail later in this chapter.</p>

    <p class="bh">Considering the Advantages and Disadvantages of the Original and Alternative Thoughts</p>

    <p>The next step involves identifying the advantages and disadvantages of holding on to your original perfectionistic thoughts and standards versus adopting the alternative thoughts and standards. Strategies to use here include evaluating the evidence for and against particular beliefs or standards and testing out the accuracy of your beliefs using mini-experiments (also known as <em>hypothesis testing</em>). These and other techniques are described later in this chapter.</p>

    <p class="bh">Choosing More Realistic or Helpful Ways to View the Situation</p>

    <p>After you have evaluated the advantages and disadvantages of changing your beliefs and standards, you will be in a position to choose a more realistic and helpful way of thinking about the situation. Changing your thoughts will lead to a reduction in anxiety, depression, anger, or other negative feelings associated with perfectionism.</p>

    <p class="exh">Exercise 7.1 A Diary for Changing Your Perfectionistic Thoughts</p>

    <p class="paft">Here is a diary that you can use to help you work through the four steps for changing perfectionistic thoughts. We include two examples of ­completed diaries as well as a blank diary that you can complete whenever you find yourself thinking or behaving in a perfectionistic way. You can either develop a similar form to complete whenever you experience perfectionistic thinking, or you can record your responses in your journal. If you are unable to complete the diary at the time that you notice your perfectionism getting the best of you, you may complete it later.</p>

    <p class="th">Perfectionism Diary (Example 1)</p>

    <p><em>Date:</em> July 17 <em>Time:</em> 2:00 P.M.___________</p>

    <p><em>Situation:</em> <em>My husband is fifteen minutes late picking me up</em></p>

    <p>from work.</p>

    <p><em>Emotions:</em> <em>Anger, impatience, frustration</em></p>

    <p class="ch">Perfectionistic Thoughts</p>

    <ul>
      <li class="ulf">My husband should never be late to pick me up.</li>

      <li class="ul">I should not be kept waiting, even for a few minutes.</li>

      <li class="ul">My husband cannot be counted on for anything.</li>

      <li class="ull">My husband is always late with everything I ask him to do for me.</li>
    </ul>

    <p class="ch">Alternative Thoughts</p>

    <ul>
      <li class="ulf">It’s okay for my husband to be late sometimes.</li>

      <li class="ul">It’s okay to be kept waiting sometimes.</li>

      <li class="ul">My husband can be counted on most of the time.</li>

      <li class="ull">Sometimes he does do things when I would like him to.</li>
    </ul>

    <p class="ch">Evaluating Perfectionistic Thoughts and Alternative Thoughts</p>

    <ul>
      <li class="ulf">My expectation that my husband <em>always</em> pick me up on time only causes me to get angry and frustrated. It doesn’t seem to change the situation at all.</li>

      <li class="ul">If I were more willing to be picked up a bit late from time to time, I would probably be less upset when it happens. The time I waste arguing and being angry is much more than the time I spend waiting for my husband when he is late.</li>

      <li class="ul">If I plan ahead, I can deal with his being late by using the time to relax, read a book, or make a telephone call.</li>

      <li class="ul">Even though my husband is sometimes ten or fifteen minutes late when he picks me up from work, he tends to be very responsible and considerate in most areas of our relationship.</li>

      <li class="ul">Just because I am early for everything I do, that doesn’t mean that everyone else should always be early.</li>

      <li class="ull">The worst thing that will happen if I am kept waiting is that I will arrive home a few minutes later.</li>
    </ul>

    <p class="ch">Choosing a More Realistic and Helpful Perspective</p>

    <ul>
      <li class="uls">Perhaps being picked up late from work is more manageable than I originally thought.</li>
    </ul>

    <p class="th">Perfectionism Diary (Example 2)</p>

    <p><em>Date:</em> December 29 <em>Time:</em> 8:00 P.M. ___________</p>

    <p><em>Situation:</em> I told a joke at a party and nobody found it funny. In</p>

    <p><em>Emotions:</em> <em>Embarrassment, sadness, anxiety</em></p>

    <ul>

      <li class="ul">If I am not entertaining, people won’t like me.</li>

      <li class="ull">People find me to be awkward, anxious, and boring.</li>
    </ul>

    <p class="ch">Alternative Thoughts</p>

    <ul>
      <li class="ulf">It’s okay not to be entertaining all the time.</li>

      <li class="ul">People won’t judge me on the basis of one uncomfortable interaction.</li>

      <li class="ull">People find me interesting to be with.</li>
    </ul>

    <p class="ch">Evaluating Perfectionistic Thoughts and Alternative Thoughts</p>

    <ul>
      <li class="ulf">Nobody is entertaining all the time. Everyone has awkward moments from time to time.</li>

      <li class="ul">My friends know me well and are unlikely to judge me based on one conversation. In fact, some of my friends are not terribly good at telling jokes, and I still enjoy being with them.</li>

      <li class="ul">For the rest of the evening, people seemed to talk to me normally, suggesting that they found me interesting and enjoyed my company.</li>

      <li class="ull">People probably find me interesting because they continue to invite me to spend time with them.</li>
    </ul>

    <p class="ch">Choosing a More Realistic and Helpful Perspective</p>

    <ul>
      <li class="uls">Perhaps I need to give myself permission to make mistakes when I am talking to other people. I don’t judge other people when they say something unusual or awkward. Perhaps they are not judging me when I make mistakes.</li>
    </ul>

    <h2 class="sigilNotInTOC" id="heading_id_5">Strategies for Changing Thoughts</h2>

    <p class="paft">There are many different ways to change thoughts. In this section, we describe methods that are often helpful. As you will see, these methods overlap with one another to some extent and aren’t completely separate or distinct. Ideally, you should practice using strategies such as these each time you find yourself engaging in perfectionistic thinking. You may even use these strategies before the thought occurs. For example, if you are about to enter a situation or get involved in some activity (for example, a hobby, sport, or task at work) that usually leads to perfectionistic thinking, you can anticipate the thoughts and challenge them before they even occur. If you forget to use these strategies, or if it’s not practical to use these techniques before or during the episode of perfectionistic thinking, they may be used later.</p>

    <p class="bh">Examining the Evidence</p>

    <p>One of the most useful methods of challenging perfectionistic beliefs is to examine the evidence that confirms and contradicts your beliefs. This process may involve examining your previous experiences in a given situation. For example, if you are a student who believes that it would be terrible to receive less than an A on a paper, you could try to recall what happened in the past when you received a lower grade on a paper or exam. Did you survive the experience? What happens when other people receive grades that are lower than an A? Do terrible things necessarily occur as a result? The following conversation between a therapist and Maureen illustrates how examining evidence for and against perfectionistic beliefs can be a helpful way of changing them.</p>

    <p class="diaf">Maureen: It really bothers me when my children lie. Yesterday at dinner, my four-year-old son fed his broccoli to the dog. When I asked him what happened to his broccoli, he said that he ate it. I was up all night worrying that my son was going to grow up to be a pathological liar.</p>

    <p class="dia">Therapist: Rather than automatically assuming that your prediction is true, let’s look at the evidence. Can you think of any evidence to support your prediction that your son is going to become a pathological liar?</p>

    <p class="dia">Maureen: Well, I imagine that most people who lie a lot begin their lying in childhood.</p>

    <p class="dia">Therapist: Are there reasons to think that your prediction may not come true?</p>

    <p class="dia">Maureen: I guess my son doesn’t lie that often. In fact, sometimes when he does lie, he feels so guilty that he admits his lie a day or two later.</p>

    <p class="dia">Therapist: Can you think of times when you lied to your parents?</p>

    <p class="dia">Maureen: I remember when I got into a minor accident in my father’s car. I told him that the car was hit in a shopping-mall parking lot, while I was shopping.</p>

    <p class="dia">Therapist: Did you grow up to become a pathological liar?</p>

    <p class="dia">Maureen: No, I guess I didn’t.</p>

    <p class="dia">Therapist: No one likes to be lied to, but most people do hide the truth from time to time. Perhaps we can find ways of helping you to be more accepting of others when they tell small lies.</p>

    <p class="dia">Maureen: But isn’t it wrong to lie?</p>

    <p class="dia">Therapist: Being lied to can lead others to feel hurt and lose trust in the person who lies. Nevertheless, the severity of the lying can be looked at on a continuum. For example, there is a big difference between telling a small lie to avoid hurting a person’s feelings (like when you tell someone you like their new haircut even when you don’t) versus cheating on your partner and then lying about the affair.</p>

    <p class="dial">Maureen: I guess I have been treating all lying as the same. I was thinking that if someone told a small lie, they were likely to lie about anything and everything. I can see how that isn’t very realistic.</p>

    <p>Examining the evidence for your beliefs can combat many of the perfectionistic thinking styles that are described in chapter 3. For example, examining the evidence for and against a particular thought can be used to combat filtering (paying attention only to information that confirms or supports a perfectionistic thought). Similarly, catastrophic thinking (the tendency to assume that things would be terrible if a particular event were to occur) can be combated by asking questions such as, “What if that event did occur?” and “How could I cope with that if it were to happen?”</p>

    <p class="bh">Education</p>

    <p>One reason why people sometimes maintain perfectionistic beliefs is a lack of accurate information. Seeking accurate information on a given topic can help change perfectionistic or rigid beliefs. Becoming educated is one way of examining the evidence that supports and refutes perfectionistic beliefs.</p>

    <p>For example, education can be a helpful method of changing unrealistic standards with respect to weight and physical appearance. Many people are overly concerned about maintaining a weight that is actually below what is normally considered to be healthy. In Western cultures, this tends to be a more frequent issue for women than men. These unrealistic standards are probably related in part to constant exposure to models and celebrities who themselves are underweight. To help people change their overly stringent beliefs about how much body fat is acceptable, health professionals often educate their patients and clients about their ideal weight range—that is, the weight range that has been shown to be predictive of living longer and having fewer health problems.</p>

    <p class="bh">Taking Another Perspective</p>

    <p>Taking the perspective of someone else is a powerful way of changing perfectionistic beliefs. This can be achieved by asking the question, “How do other people view this situation?” Allowing yourself to view the situation as other people might can help to change unrealistic beliefs. Consider the following conversation between a therapist and Enrico.</p>

    <p class="dia">Enrico: If people notice how anxious I am during my presentation, they will surely think I’m a complete idiot.</p>

    <p class="dia">Therapist: How would they know you’re anxious?</p>

    <p class="dia">Enrico: I tend to blush when I’m nervous. Also, they would notice me losing my train of thought and forgetting words.</p>

    <p class="dia">Therapist: Put yourself in the shoes of the audience members for a moment. Can you think of a time when you have seen other people blush or lose their train of thought?</p>

    <p class="dia">Enrico: I have a good friend who often blushes.</p>

    <p class="dia">Therapist: What do you think of this person when you notice them blushing?</p>

    <p class="dia">Enrico: Actually, I rarely notice. If I do notice, I don’t really give it much thought. I suppose that I might think he’s embarrassed.</p>

    <p class="dia">Therapist: Do you think he is an idiot?:</p>

    <p class="dia">Enrico: No, but that may be because he’s my friend.</p>

    <p class="dia">Therapist: When you see another presenter blushing, forgetting words, or looking anxious, do you think he or she is an idiot?</p>

    <p class="dia">Enrico: No.</p>

    <p class="dia">Therapist: Do you think others would view the presenter as an idiot?</p>

    <p class="dia">Enrico: I suppose it is possible, but probably not.</p>

    <p class="dia">Therapist: Then how likely is it that you will be viewed as an idiot if you blush or forget a few words during your presentation?</p>

    <p class="dia">Enrico: I guess it’s pretty unlikely. But, it’s still a possibility. That’s what bothers me.</p>

    <p class="dia">Therapist: What if one or more people in the audience actually did think you were an idiot? Would there be any real consequences?</p>

    <p class="dia">Enrico: I always assumed that it would be terrible, but as I think about it now, I can’t think of any real consequences. I guess nothing would happen.</p>

    <p class="dia">Therapist: Is it okay for some people not to like you?</p>

    <p class="dia">Enrico: I would prefer to always make a good impression, but I imagine that it wouldn’t be the end of the world if I made a less-than-perfect impression sometimes.</p>

    <p>One way of making it easier to take the perspective of other people is to actually ask other people how they think about a particular situation. For example, Katie believed that it was essential that her house be completely dusted, cleaned, and vacuumed daily. Her parents kept a very clean home, and she intended to do the same. This belief led Katie to spend several hours a day cleaning, at the expense of being able to look for work or enjoy other hobbies or activities. It also led to frequent arguments with her family because they refused to help. From their perspective, it was enough to vacuum and dust once a week. As a homework assignment, Katie was instructed to ask several friends and neighbors how often they dusted and vacuumed. She was surprised to discover that nobody—not even people whose homes she considered to be spotless—cleaned as often as she did. After surveying her friends’ cleaning habits, she was willing to try cleaning less often and her family began to help more frequently.</p>

    <p class="bh">Compromising with Yourself and Others</p>

    <p>Rather than being unwilling to accept anything less than perfection, try asking the question, “What level of imperfection is acceptable?” You may believe that if you lower your standards regarding a particular dimension or issue, chaos will ensue. If the thought of ­lowering your standardstoo much is frightening, perhaps you can consider lowering them somewhat. This is a good technique for dealing with all-or-nothing thinking. If you tend to view situations in terms of black and white or right and wrong, it can be helpful to compromise by viewing situations in shades of gray and realizing that there are different ways of doing things. Viewing situations as either right or wrong can lead you to miss out on important complexities that are inherent in most situations.</p>

    <p>You can also compromise with others when your standards are different than those of people around you. For example, if you have difficulty discarding or giving away old objects (things like clothing, magazines, household items, and so on) and your family asks you to reduce the clutter, perhaps you could agree to throw out items that you haven’t looked at or used for a certain length of time (one year, five years, and so on). This might be a good compromise between keeping everything (which is what your perfectionism may be telling you to do) and throwing out everything (which is what your family may be telling you to do).</p>

    <p class="bh">Hypothesis Testing</p>

    <p>An excellent way to test the accuracy of your perfectionistic thoughts and predictions is to carry out small experiments, a process also known as hypothesis testing. Carefully designed experiments will provide an opportunity to disprove your perfectionistic beliefs. For example, if you tend to write papers that are too detailed, try leaving out some of the detail and seeing what happens. Regardless of the outcome, you will obtain valuable information. If there is no consequence, you will learn that your beliefs about the importance of including all of the details are not true. On the other hand, if your boss tells you that your most recent report was not detailed enough, you will learn that the amount of detail you had in your earlier reports was appropriate and you can behave accordingly in the future.</p>

    <p>Hypothesis testing can be used to test the validity of most perfectionistic predictions. By behaving in ways that do not meet your own high standards (for instance, purposely making small mistakes in your work, saying things incorrectly, leaving the house dirty, and so on), you will learn whether the standards are in fact necessary. Of course, you want to choose exercises that are relevant to your perfectionistic thoughts. If you are not overly concerned about the cleanliness of your house, there is no reason for you to purposely leave the house messy. Also, you should use good judgment when designing hypothesis-testing experiments. Don’t plan experiments that have a very good chance of backfiring and leading to serious negative consequences. For example, if you are a nurse who checks medications dozens of times because you worry about giving a patient an incorrect drug, don’t purposely give a patient the wrong medication just to see what happens! Instead, a good exercise might be to find out how often most nurses check medications before dispensing them to a patient and do what they do. In other words, check once or twice, but not dozens of times.</p>

    <p class="bh">Changing Your Social-Comparison Habits</p>

    <p>As mentioned in chapter 3, everyone compares themselves to other people as a way of evaluating their standing or performance in a particular area. Most people compare themselves to their peers. For example, if they want to evaluate whether they are doing a good job at work, they might compare themselves to their coworkers.</p>

    <p>People who are perfectionists may be more likely to compare themselves to people who are much more experienced and skilled in that particular area. For example, perfectionistic amateur musicians might compare themselves to professional musicians who have already achieved great success (as measured by their ability to play music, their income, or their popularity). The tendency to compare oneself to people who are perceived as significantly more skilled, attractive, intelligent, physically fit, or “better” in some other way can make an individual feel more depressed or anxious about not meeting his or her own high standards. Therefore, it may be helpful to try to limit your social comparisons to people who are more similar to you in a particular dimension.</p>

    <p class="bh">Looking at the Big Picture</p>

    <p>Perfectionism is sometimes associated with a tendency to focus on unimportant details rather than looking at the big picture. Looking at the big picture involves assessing the overall impact of a particular event, situation, or outcome on your life. Situations that seem so important in the moment rarely end up being particularly important, even a short time later. Below are some examples of perfectionistic statements followed by alternative statements that illustrate how to look at the big picture.</p>

    <p class="bh"/>

    <p class="bh">Using Coping Statements</p>

    <p>The process of changing perfectionistic thoughts and beliefs is complex. It involves using any of a number of techniques to identify your negative thoughts and replace them with more realistic alternative thoughts. Sometimes, you may not have the time to challenge your perfectionistic thoughts using some of the strategies already described in this chapter. Other times, you may feel so anxious, depressed, or angry that it is difficult to think clearly about the situation. Coping statements may be helpful in cases where it is difficult to use some of the other strategies discussed in this chapter. Coping statements are simple phrases that you can memorize and say to yourself when you find yourself thinking like a perfectionist. For example, saying to yourself, “It’s okay to make mistakes,” can make it easier to get through a stressful or difficult task. Similarly, the phrase, “It’s okay if some people don’t like me,” can make it easier to deal with social situations that are anxiety provoking. Reminding yourself that there are many different right ways to fold laundry can help decrease the frustration that occurs when your family members fold the laundry differently than you like it.</p>

    <p>Coping statements involve more than just “positive thinking.” In fact, coping statements should reflect thoughts that you actually can believe, and they should be realistic—not just positive. For example, if you typically find yourself becoming anxious when giving a presentation, it wouldn’t be helpful to prepare for a talk by saying to yourself, “I will not be anxious during this presentation.” On the other hand, it might help to remind yourself that even if you do become anxious, there will be no real consequences, other than the temporary discomfort that you feel. If you decide to use coping statements, we recommend that you record them on an index card and carry them with you. This will help prompt your memory until these statements become second nature.</p>

    <p class="bh">Tolerating Uncertainty and Ambiguity</p>

    <p>Perfectionists go to great pains to control many different aspects of their lives, including their own behavior, the behavior of other people, and the environment in which they live. Although most people feel more comfortable when they can predict and control events that occur (­particularly negative events), the need to know about and control events is often much stronger for people who have rigid, perfectionistic beliefs. For example, a person who is applying for a job may find it very difficult to wait until she finds out whether the job materializes. Similarly, arriving home to find a note from your partner saying that he or she will be home “later” may be frustrating if there is no specific time mentioned in the note. Because you often cannot control or predict things that occur, it can be helpful to find ways to tolerate some degree of uncertainty and ambiguity in your life.</p>

    <p>One way of dealing with uncertainty involves mentally preparing for several possible outcomes. To return to the examples described earlier, the person who is waiting to find out about the job can make some decisions about what she might do if she gets the job and what she might do if she doesn’t. Similarly, if you are impatiently waiting for your partner to come home but have no idea when to expect him or her, you can prepare for the possibility that he or she will return in the next few minutes, in an hour, or in several hours. By preparing for different possible outcomes, the uncertainty is likely to be less frustrating or anxiety provoking.</p>

    <p>Another way of combating the need for certainty and control is to ask yourself questions such as, “Why do I need to know what will happen?”, “Can I cope with not knowing?”, “Is it really as important as it feels for me to control this situation or to be able to predict exactly how it will turn out?”</p>

    <h2 class="sigilNotInTOC" id="heading_id_6">Difficulty Believing Your Alternative Thoughts</h2>

    <p class="paft">One of the most common complaints of individuals who try to use the strategies described in this chapter is what is sometimes called the “head/heart problem.” The head/heart problem occurs when an individual knows rationally that a particular style of thinking is incorrect or inappropriate, but nevertheless feels that the negative way of thinking is correct. In other words, the head is able to think about the situation in a realistic way, but the “heart” continues to react to the situation in a ­perfectionistic way. For example, you may realize rationally that there is generally very little to lose by making small mistakes. Nevertheless, you may continue to feel awful every time you do certain things incorrectly.</p>

    <p>As you think about the head/heart problem, remember two things. First, realize that your perfectionistic beliefs have probably been around for a long time. The techniques described in this chapter are skills that need to be built through practice. It will take a while for your perfectionistic beliefs to change. With practice, it should become easier to believe the new, more flexible ways of thinking. Second, it is possible that trying to think rationally about situations that trigger your perfectionism may not be enough. You may actually need to do something differently rather than just trying to think differently. The techniques described in the next chapter involve changing perfectionistic behaviors. Behavioral strategies are among the most powerful ways to change thoughts, because they create new learning experiences that directly ­disprove your perfectionistic thoughts.</p>
